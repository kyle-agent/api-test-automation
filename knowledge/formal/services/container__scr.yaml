# Layer 1 — per-service knowledge: container/scr
# Schema: knowledge/formal/FORMAT.md · validate: python knowledge/formal/validate.py

version: 1
service: container/scr

constraints:
  - id: scr-registry-max-2-per-account
    rule: "Container Registry는 Account당 최대 2개 — 가시성 유형별 1개씩 (userguide how-to 2026-06-12). regr 생성 시 기존 잔존 레지스트리가 있으면 quota 충돌 가능."
    provenance: docs
  - id: scr-registry-create-options
    rule: "레지스트리 생성 옵션 (userguide): 이름 영문 소문자 시작, 소문자/숫자 3~25자 · 엔드포인트 타입 프라이빗/프라이빗&퍼블릭 · 가시성 Public(anonymous pull)은 생성 시에만 설정 가능 · 프라이빗/퍼블릭 접근 제어는 미사용 시 같은 리전 전체에 노출(가이드 경고)."
    provenance: docs
  - id: scr-registry-states
    rule: "레지스트리 상태: Creating/Running/Editing/Terminating/Error/Unknown (userguide) — 설정 변경 중 Editing 상태에서 후속 쓰기 409 가능."
    provenance: docs

captures:
  scr-registry: $.id
  scr-repository: $.id

states:
  scr-registry: {field: $.state, ready: [Running, RUNNING, active, ACTIVE]}

quirks:
  - id: scr-auth-may-be-scp-keys
    note: "owner 2026-06-12: SCR docker 로그인 인증이 별도 콘솔 발급 키가 아니라 기존 SCP access/secret key 그대로일 가능성 — 검증되면 scr-auth-key credential이 현재 env로 충족되어 docker push(이미지/태그 면적)와 cloud-ml 체인이 함께 풀린다. 검증 방법: CI 러너에서 docker login <registry-endpoint> -u <access_key> -p <secret_key> 후 hello-world push (워크플로 1-step 실험)."
    provenance: docs
  - id: registry-delete-500-race
    note: "registry DELETE returns 500 for a few minutes right after creation (provisioning race), then succeeds — retry the delete on 500 for ~6 min; repository delete retries 409/500"
    provenance: VALIDATED
  - id: no-prerequisite-services
    note: "userguide: Container Registry has no prerequisite services (선행 서비스 없음); images are stored in Object Storage internally"
    provenance: docs
