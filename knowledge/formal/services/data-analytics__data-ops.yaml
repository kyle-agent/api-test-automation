# Layer 1 — per-service knowledge: data-analytics/data-ops (Apache Airflow on SKE)
# Schema: knowledge/formal/FORMAT.md · validate: python knowledge/formal/validate.py
# Source: userguide WebFetch 2026-06-14 — /userguide/analytics/data_ops/
#   overview/ + how_to_guides/data_ops_services/
# Recorded while ingesting the data-ops resource-task model (Lane B).

version: 1
service: data-analytics/data-ops

constraints:
  - id: runs-on-ske-not-dbaas
    rule: "Data Ops is an Apache Airflow-based managed workflow-orchestration service running ON A KUBERNETES ENGINE (SKE) cluster, not a DBaaS subnet cluster. Prerequisite chain (in order): ① SKE cluster, ② Ingress Controller installed on it, ③ File Storage. The dbaas instance_groups/subnet_id create body in the coverage-probe lifecycle is UNPROVEN and does not reflect the Airflow-on-K8s console form (Storage Class, Node Selector, executor type, workload selection, GitSync, account id/password, host alias)"
    provenance: docs
  - id: ingress-controller-one-per-cluster
    rule: "Exactly ONE Ingress Controller may be installed per Kubernetes cluster, and it must be installed BEFORE provisioning a Data Ops service. It is a console/YAML-apply precondition, not a graph resource node (same dss-ingress / dss-nginx mechanism as data-flow)"
    provenance: docs
  - id: region-restricted
    rule: "Data Ops is available only in kr-west1 and kr-east1; kr-south1/2/3 are unsupported"
    provenance: docs
  - id: ops-name-rules
    rule: "Data Ops / service name: start with lowercase letter, lowercase + digits + hyphen, must not end with hyphen, length 3-30. Domain: same rules, length 3-50. Final access URL = {ServiceName}.{Domain}. Pre-check collisions via GET /v1/data-ops/{name}/check-duplication and GET /v1/data-ops-services/{name}/check-duplication (free-form NAME path-param)"
    provenance: docs
  - id: airflow-account-credential-rules
    rule: "Airflow account: ID 6-30 chars, lowercase letters + digits only; password 8-50 chars containing uppercase + lowercase + digits + special chars (!@#$%^&*). User-supplied console-form credentials — no model default should be issued"
    provenance: docs
  - id: worker-executor-choice
    rule: "Worker Executor is Kubernetes (dynamic pods) OR Celery (static pods, requires a replica count). Recommended specs differ: KubernetesExecutor 43 CPU cores vs CeleryExecutor 25 CPU cores; both 50 GB memory / 100+ GB storage. Workload modules Web Server / Scheduler / Worker are mandatory. Requested resource scale must not exceed available K8s cluster capacity"
    provenance: docs
  - id: optional-field-limits
    rule: "Description optional, max 150 chars. Host Alias optional, up to 20 hostname/IP entries. Tags max 50 per service. DAGs GitSync repository optional for DAG source-control integration"
    provenance: docs

captures:
  data_ops: $.id                          # from POST /v1/data-ops (UNPROVEN; list fallback $.contents[0].id)
  data_ops_service: $.id                  # from POST /v1/data-ops-services (UNPROVEN; list fallback $.contents[0].id)
  cluster: $.cluster_id                   # from GET /v1/data-ops-services/{id} detail (best-effort, feeds ingress GETs)

states:
  data_ops_service: {field: $.status, ready: [Running]}    # Creating -> Running -> Updating -> Terminating -> Error

quirks:
  - id: create-body-unproven-dbaas-shape
    note: "No data/api_bodies.json entry exists for data-ops. The coverage-probe create body mirrors data-flow which mirrors the dbaas instance_groups/block_storage shape and was only sent with empty-string ids (guaranteed 4xx). The real Airflow-on-K8s body (executor type, workload, GitSync) is undocumented at the API level — promote to VALIDATED only after a real 2xx"
    provenance: docs
  - id: validate-resources-preflight
    note: "The console calls POST /v1/data-ops-services/clusters/{cluster_id}/validate-resources (create scope) and POST /v1/data-ops-services/{data_ops_service_id}/validate-resources (update scope) as a dry-run capacity preflight before create/update"
    provenance: docs
  - id: service-selects-existing-ops
    note: "Creation order is ops-first: a Data Ops Service must SELECT an existing Data Ops ('Data Ops Name — required selection'). The legacy model putting data_ops_service_id inside the create-ops body had the dependency direction reversed"
    provenance: docs
  - id: deletion-is-irreversible
    note: "Deletion (해지) is irreversible; running workloads stop immediately upon termination"
    provenance: docs
