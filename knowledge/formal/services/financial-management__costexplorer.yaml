# Layer 1 — per-service knowledge: financial-management/costexplorer
# Schema: knowledge/formal/FORMAT.md · validate: python knowledge/formal/validate.py
# Source: /userguide/financial_management/cost_management/{overview,how_to_guides/{explorer,usage,payment}}/ (2026-06-14)

version: 1
service: financial-management/costexplorer

constraints:
  - id: cost-analysis-window
    rule: "비용 분석(Cost Explorer) 조회 기간 최대 6개월 추이 — '월 1일 ~ 말일' 단위. 연/월 드롭다운으로 선택"
    provenance: docs
  - id: cost-granularity
    rule: "시각화 단위(granularity) 2종 — 일별(daily) / 월별(monthly). GET 쿼리 granularity 파라미터로 노출 추정(UNPROVEN)"
    provenance: docs
  - id: cost-grouping-dimensions
    rule: "그룹화(grouping) 차원 — 서비스군(service group)·서비스(service)·자원명(resource name)·지역(region)·서버 유형·약정 기간. 태그 key-value 필터 지원. group_by/filter 쿼리 파라미터로 노출 추정(UNPROVEN)"
    provenance: docs
  - id: cost-settlement-states
    rule: "미정산월=예상(예상 사용/청구 금액), 정산월=실청구(청구 금액). 데이터 카테고리: 총 예상 청구 금액·월 평균 청구 금액·비용 Top5·할인 내역(Planned Compute/SLA/Credit)"
    provenance: docs

captures: {}

states: {}

quirks:
  - id: reads-only-scope
    note: "조회 전용 서비스(owner 정책 2026-06-12) — 생성/삭제 자원 없음, capture 불필요. GET /v1/bills · /v1/usages · /v1/payments/monthly smoke 3/3 200 관측 이력"
    provenance: docs
  - id: query-params-all-optional
    note: "모든 쿼리 파라미터 optional(docs) — bare GET(파라미터 없음)가 200. time-range(year/month 또는 from/to YYYY-MM)·granularity(daily|monthly)·group_by·tag filter 는 userguide 문서화되어 있으나 apiref가 JS-rendered/console-only 라 정확한 필드명 UNPROVEN. 파라미터 변형은 C4 parameter-coverage 단계 소관"
    provenance: docs
  - id: timezone-refresh
    note: "타임존 Asia/Seoul(GMT+09:00), 비용 데이터 매일 자정 갱신. 상세 내역 Excel 다운로드(자원 id·시간별 사용량·할인 항목 포함) 지원 — 콘솔 기능"
    provenance: docs
