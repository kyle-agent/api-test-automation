# Layer 1 — per-service knowledge: security/secretsmanager
# Schema: knowledge/formal/FORMAT.md · validate: python knowledge/formal/validate.py
# Source: userguide /userguide/security/secrets_manager/{overview,how_to_guides}/ (fetched 2026-06-11)

version: 1
service: security/secretsmanager

constraints:
  - id: kms-key-required
    rule: "secret create REQUIRES an existing KMS key of an encrypt/decrypt-capable spec — only AES-256, RSA-2048 (encrypt+sign) or ARIA keys are selectable; sign-only (ECDSA) or HMAC keys are rejected. KMS key is a hard prerequisite edge (security/kms -> security/secretsmanager)"
    provenance: docs
  - id: create-fields
    rule: "create requires: Secret명, 유형 (secret type), 1-10 Key/Value pairs (value payload <= 64KB; encrypted secret value <= 65,536 bytes), 암호화 키 (KMS key id), and 퍼블릭 접근 제어 IP list (REQUIRED, up to 10 entries) — a create body without the public-access IP list is a plausible 400. 프라이빗 접근 제어 optional (unset = all same-region subnets allowed)"
    provenance: docs
  - id: quotas
    rule: "500,000 secrets per account-region; 100 versions per secret (oldest auto-pruned beyond 100, even labeled ones); 20 labels across a secret's versions; region-scoped service"
    provenance: docs
  - id: delete-has-waiting-period
    rule: "해지 requires a 해지 대기 기간 of 7-30 days (REQUIRED field on delete); the secret is unreadable during the wait and only permanently deleted after it; delete-then-recreate-same-name flows must account for this. 해지 취소 restores it"
    provenance: docs

captures: {}

states:
  secret: {field: $.status, ready: [Active]}   # Active / To be terminated (docs; field name guessed)

quirks:
  - id: deletion-is-scheduled
    note: "삭제가 즉시가 아니라 스케줄로 보임 — rev2 sweep(run 27401527554)에서 같은 regr secretsmanager 20개가 매 라운드 'deleted 2xx' 후에도 list에 계속 남음 (5라운드 반복). pending-deletion 상태가 리스트에 노출되는 듯 — reconciler가 해당 상태를 스킵하도록 개선 필요, 실제 소멸 시점은 콘솔 확인."
    provenance: docs
  - id: version-labels
    note: "versions carry labels CURRENT / PREVIOUS / custom; a custom label does NOT protect a version from the 100-version pruning"
    provenance: docs
  - id: no-name-rule-documented
    note: "userguide states no charset/length rule for Secret명 (unlike Secret Vault's 3-63 lowercase) — if smoke 400s on name, try lowercase-alnum first; needs live validation"
    provenance: docs
