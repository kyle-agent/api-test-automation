# Layer 1 — per-service knowledge: security/secretvault
# Schema: knowledge/formal/FORMAT.md · validate: python knowledge/formal/validate.py
# Source: userguide /userguide/security/secret_vault/{overview,how_to_guides}/ (fetched 2026-06-11)

version: 1
service: security/secretvault

constraints:
  - id: auth-key-prereq
    rule: "Secret Vault create REQUIRES a pre-existing IAM 인증키 whose 보안 인증방식 is set to 임시키 (temporary-key auth). Keys that are expired, expiring within 30 days, or already bound to another Secret Vault are NOT selectable — 1 auth key binds at most 1 Secret Vault. Most likely 400/409 source on create"
    provenance: docs
  - id: name-rule
    rule: "Secret명: lowercase letters and digits only, 3-63 chars"
    provenance: docs
  - id: create-fields
    rule: "create requires: Secret명, 유형, 인증키, Token 사용 기간 (defaults to the auth key's validity; max 7,300 days when key is 영구; IMMUTABLE after create), 임시키 교체 주기 (temp-key rotation, max 36h), 접근 허용 IP (required, max 10, single IPs must carry /32, and the SAME IPs must also be registered under IAM 인증키 보안설정 접근 허용 IP or access is denied)"
    provenance: docs
  - id: region-scoped-keys
    rule: "Secret Vault is region-based — an auth key already used by a Secret in another region cannot be selected"
    provenance: docs
  - id: delete-has-waiting-period
    rule: "해지 requires 해지 대기 기간 7-30 days; during the wait the temp key is deleted and no new temp keys can be issued; only the CREATOR can cancel the termination or rotate the temp key; cancel is impossible if the bound auth key was deleted or suspended"
    provenance: docs

captures: {}

states:
  secretvault: {field: $.status, ready: [Active]}   # Active / To be terminated / Expired (docs; field name guessed)

quirks:
  - id: expired-token-bricks-secret
    note: "when the Token expires the Secret goes Expired: NO actions (even reads) are possible and it auto-deletes after 7 days; token lifetime cannot be extended — a new service must be created"
    provenance: docs
  - id: temp-key-api
    note: "temporary keys are issued via OpenAPI GET /v1/temporarykey/{secretvault_id} using Token ID + Token Secret; temp keys are listed/deleted under the IAM auth-key detail tabs, created only via API (up to 5 temp keys per auth key)"
    provenance: docs
  - id: blocks-auth-key-deletion
    note: "an auth key with a live Secret Vault cannot be suspended or deleted — the Secret Vault must be terminated first in EVERY region of the account (reverse dependency to watch in teardown)"
    provenance: docs
