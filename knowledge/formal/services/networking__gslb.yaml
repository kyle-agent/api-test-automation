# Layer 1 — per-service knowledge: networking/gslb
# Schema: knowledge/formal/FORMAT.md · validate: python knowledge/formal/validate.py
# Source: userguide /userguide/networking/gslb/overview/ + /how_to_guides/
#         (fetched 2026-06-11)

version: 1
service: networking/gslb

constraints:
  - id: gslb-domain-quota-20-per-account
    rule: "account cap: max 20 GSLB domains per account (userguide)"
    provenance: docs
  - id: gslb-resource-quota-8-per-domain
    rule: "max 8 connectable resources per GSLB domain (userguide) — bounds any set-resources body"
    provenance: docs
  - id: gslb-monitoring-needs-allowlist
    rule: "GSLB health monitoring of a connection target only works if the target's Firewall and Security Group allow the GSLB monitoring traffic (userguide) — the PUT resources call itself succeeds without it, but health checks will fail"
    provenance: docs
  - id: gslb-no-prereq-services
    rule: "선행 서비스: none — GSLB has no prerequisite services (GSLB 서비스는 선행 서비스가 없습니다, userguide); global/account-scoped, VPC-free"
    provenance: docs
  - id: gslb-name-rules
    rule: "GSLB 도메인명: 4-40 chars, lowercase letters + digits only, and must not equal any name already in use (기존에 사용중인 이름과 동일하게 사용 불가) — uppercase or '-' in the name part is a 4xx; 용도(env) is auto-fixed to PUBLIC"
    provenance: docs
  - id: gslb-region-availability
    rule: "GSLB is only offered in kr-west1 and kr-east1 — NOT in kr-south1/2/3 (userguide 리전별 제공 현황) — region-gate any GSLB lifecycle; a south-region host is a guaranteed failure"
    provenance: docs
  - id: gslb-health-check-field-rules
    rule: "health-check protocol one of ICMP/TCP/HTTP/HTTPS; Service Port required for TCP/HTTP/HTTPS; HTTP(S) auth password must be 8-20 chars containing letters+digits+special(@$!%*#?&); Send String must not contain < > # (newlines as /r/n); Receive String is REQUIRED for HTTP(S) and may contain letters/digits ONLY"
    provenance: docs
  - id: gslb-ratio-weight-range
    rule: "algorithm is Ratio or Round robin; with Ratio every connection target needs a weight in 0-100"
    provenance: docs

captures:
  gslb: $.gslb.id

states: {}

quirks:
  - id: gslb-name-is-fqdn
    note: "the gslb name field is an FQDN (lifecycle networking-gslb-service uses regr{ualpha}.gslb.e.samsungsdscloud.com) — not a plain resource name; the 4-40 lowercase+digit rule applies to the user-chosen label"
    provenance: docs
  - id: gslb-console-states
    note: "console state machine: Creating -> Active (more states follow the usual Editing/Deleting/Error pattern, userguide truncated table)"
    provenance: docs
  - id: gslb-target-location
    note: "each connection target carries a monitoring LOCATION field (choose nearest to the target server) in addition to IP + description — required in the create body's target entries"
    provenance: docs
  - id: gslb-health-check-body-applied
    note: "networking-gslb-service health_check bodies (create + set-health-check) now send protocol=TCP + service_port='80' (2026-06-11, pending live validation) per gslb-health-check-field-rules: Service Port is REQUIRED for TCP/HTTP/HTTPS, and TCP avoids the HTTP(S)-only Receive String (alnum-only) / auth-password requirements — receive_string/send_string stay empty under TCP; values sent as STRINGS to match the API reference example typing"
    provenance: docs
  - id: gslb-region-gate-not-engine-enforced
    note: "the kr-west1/kr-east1-only gate (gslb-region-availability) is NOT enforceable by the engine today — regression/scenarios/engine.py has no region-guard/region-skip mechanism (checked 2026-06-11), so the gate is recorded in the networking-gslb-service _note; on a kr-south profile the lifecycle must be disabled/filtered manually. FUTURE WORK: a declarative 'regions' lifecycle key that the engine turns into an environmental skip. Default env stage-kr-west1 is in-gate, so no behavior change there"
    provenance: docs
