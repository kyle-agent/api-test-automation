# Layer 1 — per-service knowledge: application-service/queueservice
# Schema: knowledge/formal/FORMAT.md · validate: python knowledge/formal/validate.py
# Source: /userguide/application/queue_service/{overview,how_to_guides}/ (2026-06-14)

version: 1
service: application-service/queueservice

constraints:
  - id: queue-name-rule
    rule: "큐 이름 3-64자, 소문자(영문)로 시작, 허용문자 [a-z0-9-]. FIFO 유형은 '.fifo' 접미사 필수, Standard(기본) 유형은 '.fifo' 접미사 금지"
    provenance: docs
  - id: queue-type-fifo-vs-standard
    rule: "유형은 별도 필드가 아니라 이름 접미사로 결정 — '.fifo' = FIFO(수신 시간 순서 보장), 그 외 = Standard. content_based_deduplication / deduplication_scope 는 FIFO 전용"
    provenance: docs
  - id: message-retention-range
    rule: "message_retention_period 단위별 범위 — second 60-1209600, minute 1-20160, hour 1-336, day 1-14 (최대 14일)"
    provenance: docs
  - id: message-size-range
    rule: "message_size 1-256 KB per message"
    provenance: docs
  - id: data-key-reuse-range
    rule: "data_key_reuse_period (KMS 암호화) — minute 5-1440, hour 1-24 (최대 24시간)"
    provenance: docs
  - id: dedup-scope-message-group-limit
    rule: "deduplication_scope=MessageGroup 일 때 큐당 메시지 그룹 최대 100개 (FIFO 전용)"
    provenance: docs
  - id: tags-and-acl-and-description-limits
    rule: "큐당 태그 최대 50개; IP allowlist(ACL) 큐당 최대 150개; description 최대 100자"
    provenance: docs

captures:
  queue: "$.id"

states: {}

quirks:
  - id: no-prerequisites
    note: "선행 서비스 없음 (overview: 'Queue Service는 선행 서비스가 없습니다'). 생성 즉시 사용 가능 — ready 폴링 불필요"
    provenance: docs
  - id: region-availability
    note: "kr-west1, kr-east1 에서만 제공. kr-south1/2/3 미제공 (overview 2026-06-14)"
    provenance: docs
  - id: kms-encryption-optional
    note: "메시지 암호화는 KMS 연동(선택) — 신규 생성/사용 안함/기존 키 선택. ServiceWatch 모니터링 연동 지원"
    provenance: docs
