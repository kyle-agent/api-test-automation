# Layer 1 — per-service knowledge: networking/direct-connect
# Schema: knowledge/formal/FORMAT.md · validate: python knowledge/formal/validate.py
# Source: userguide /userguide/networking/direct_connect/overview/ +
#         /how_to_guides/ (fetched 2026-06-11)

version: 1
service: networking/direct-connect

constraints:
  - id: dc-quota-5-per-account
    rule: "account cap: max 5 Direct Connects per account (userguide)"
    provenance: docs
  - id: dc-one-per-vpc
    rule: "only ONE Direct Connect per VPC within a service zone (Account 기준으로 서비스존 내 VPC당 1:1 생성 가능, userguide) — a second create on the same VPC must fail; relevant when adopting the session-shared VPC"
    provenance: docs
  - id: dc-prereq-vpc
    rule: "선행 서비스: a VPC must exist before a Direct Connect can be created (userguide)"
    provenance: docs
  - id: dc-prereq-security-group
    rule: "선행 서비스: Security Group is listed as a prerequisite service for Direct Connect (userguide)"
    provenance: docs
  - id: dc-name-rules
    rule: "Direct Connect name: 3-20 chars, upper/lowercase letters and digits ONLY (영문 대소문자, 숫자) — NO hyphens/underscores per the create form; a regr-style name containing '-' is a likely 400 on create"
    provenance: docs
  - id: dc-create-required-fields
    rule: "create requires: name + Uplink bandwidth (포트 용량 1G or 10G) + VPC; optional: description, firewall_enabled, firewall log storage"
    provenance: docs

captures:
  direct-connect: $.direct_connect.id
  dc-routing-rule: $.routing_rule.id

states: {}

quirks:
  - id: dc-console-states
    note: "console state machine: Creating -> Active; also Deleting, Failed, Error (userguide) — poll for Active before adding routing rules"
    provenance: docs
  - id: dc-delete-blocked-while-connected
    note: "terminate is only possible when no connected services remain (연결된 서비스가 없는 경우 해지) — expect 4xx/409 while rules/firewall attachments are live"
    provenance: docs
  - id: dc-rules-are-routing
    note: "the 규칙 tab on a DC is ROUTING rules (목적지 IP 대역 + direction), not firewall rules — firewall rules live on the implicitly created DC_Firewall resource"
    provenance: docs
  - id: dc-physical-line-via-sr
    note: "the actual customer line attach/detach is a Support-Center SR through an SDS sales rep — NOT API-automatable; an API-created DC is control-plane-only until the line SR completes"
    provenance: docs
  - id: dc-second-create-negative-encoded
    note: "the dc-one-per-vpc 1:1 rule is encoded as a NEGATIVE step (2026-06-11, pending live validation): networking-direct-connect-routing step create-direct-connect-duplicate-must-4xx fires a second create on the same (shared) VPC with expect_status [400,409,422] ONLY — the engine treats expect_status as exhaustive, so an unexpected 2xx fails the 'dc' group and is the regression signal that the platform stopped enforcing 1:1 (the duplicate would then leak until the regrdc* name-prefix sweep)"
    provenance: docs
