# Resource-task model — security/secretvault (sec-sv group).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from
# security-secretvault-vault (enabled, coverage-only guarded) by extract.py,
# curated by hand. §1의 credential-precondition 사례: create가 콘솔 발급
# IAM 인증키(임시키 모드)를 요구한다 — API로 만들 수 없는 자격이므로
# requires의 {credential:...} 엔트리로 표현 (archivestorage 패턴).
version: 1
resources:
  secretvault-vault:
    code: "sec-sv-vault"
    service: security/secretvault
    requires:
      - {credential: iam-temp-auth-key,
         note: "보안 인증방식이 임시키 모드인 IAM 인증키 (미만료, 잔여 >=30d, 다른 vault에 미바인딩 — vault당 1키). 콘솔 발급 — 환경에 표시 없으면 env-skip"}
    create:
      endpoint: "POST /v1/secretvault"
      body: {access_key_id: "{opt.access_key_id}", acl_cidr: "{opt.acl_cidr}",
             description: "API regression suite", name: "regrsv{unique}",
             tags: [], temporary_key_ttl_nhours: 3, vault_token_ttl_ndays: 30}
      options:
        access_key_id: {type: string, required: true,
                        default: "b754b12b39da4ce29a40c5e324650bd0",
                        note: "iam-temp-auth-key credential의 실제 Access Key ID. 기본값은 소스 lifecycle의 doc placeholder — 실키가 아니므로 4xx (UNPROVEN)"}
        acl_cidr: {type: string, required: true, default: "10.0.0.0/25",
                   note: "접근 허용 IP (comma-separated CIDR, 최대 10, 단일 IP는 /32) — 같은 IP가 IAM 인증키 보안설정 접근 허용 IP에도 등록돼 있어야 접근 가능"}
    capture: {secret_vault_id: "$.secret_vault.id"}
    delete:
      endpoint: "PUT /v1/secretvault/{secret_vault_id}/terminated"
      json: {waiting_time_ndays: 7}
      destructive: true
    provenance: docs
    source: {lifecycle: security-secretvault-vault, steps: [create, terminate]}
    notes: "body는 api_docs 스키마 기반 UNPROVEN (라이브 2xx 없음), capture envelope $.secret_vault.id는 소스에서 capture_soft. name 규칙 ^[a-z0-9]{3,63}$; temporary_key_ttl_nhours 1-36; vault_token_ttl_ndays 30-7300 (생성 후 IMMUTABLE). 하드 DELETE 없음 — 해지는 PUT .../terminated (waiting_time_ndays 7-30, 해지 대기 후 영구 삭제); composer의 비-DELETE teardown + delete-body 지원은 R3 과제. vault가 살아있는 동안 바인딩된 인증키 정지/삭제 불가 (역방향 teardown 주의). Token 만료 시 Expired → 읽기 포함 모든 작업 불가, 7일 후 자동 삭제."
