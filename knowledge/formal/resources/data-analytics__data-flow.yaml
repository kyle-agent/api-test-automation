# Resource-task model — data-analytics/data-flow (da-df group).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from
# data-flow-service-and-flow-guarded (enabled, heavy, COVERAGE-ONLY — bodies
# best-effort from the shared SCP analytics-console shape, UNPROVEN -> docs).
#
# 2026-06-14 userguide ingest (WebFetch /userguide/analytics/data_flow/
# overview/ + how_to_guides/data_flow_services/ + how_to_guides/ingress_install/):
# Data Flow is an Apache NiFi-based stream/batch data-flow tool that runs ON A
# KUBERNETES ENGINE (SKE) CLUSTER — NOT on a DBaaS subnet cluster. This
# CONTRADICTS the dbaas instance_groups/subnet body shape inherited from the
# coverage-probe lifecycle (which only ever sent empty-string ids and never
# created a real cluster). The true console prerequisite chain is:
#   ① SKE standard cluster  ② Ingress Controller installed on that cluster
#   (max 1 per cluster, namespace dss-ingress, IngressClass dss-nginx)
#   ③ File Storage (network file sharing across NiFi clients).
# Regional availability: kr-west1, kr-east1 ONLY (kr-south1/2/3 unsupported).
# The dbaas-shaped create body below is kept verbatim from the source lifecycle
# for runtime parity but every dbaas-only field is flagged _note docs-only —
# the real API body (mirrors the console form: storage_class, node_selector,
# account id/password, workload module selection, host_alias) is UNPROVEN and
# has no data/api_bodies.json entry. See ESCALATE: docs-vs-reality.
version: 1
resources:
  data-flow:
    code: "da-df-flow"
    service: data-analytics/data-flow
    heavy: true
    # userguide order: the "Data Flow" logical entity is created first; a
    # "Data Flow Service" is then provisioned on a cluster and must select an
    # EXISTING Data Flow ("Data Flow Selection — Must choose existing Data
    # Flow"). So flow precedes service in the create order.
    requires: []
    create:
      endpoint: "POST /v1/data-flows"
      body:
        name: "regrdf{ualpha}"
        description: "API regression suite"
        tags: []
      options:
        name: {type: string, default: "regrdf{ualpha}",
               note: "userguide naming rule (data_flow_services page): 영문 소문자로 시작, 특수문자('-')로 끝나지 않게, 소문자/숫자/'-' 사용, 3~30자. {ualpha}=소문자 a-p로 패턴 충족. GET /v1/data-flows/{name}/check-duplication으로 사전 중복 점검."}
        description: {type: string, default: "API regression suite",
                     note: "userguide: 선택, 최대 150자."}
    capture: {data_flow_id: "$.id"}
    delete: {endpoint: "DELETE /v1/data-flows/{data_flow_id}", destructive: true}
    provenance: docs
    source: {lifecycle: data-flow-service-and-flow-guarded,
             steps: [create-data-flow, update-data-flow, delete-data-flow]}
    _note: "body는 소스 coverage-probe lifecycle verbatim (UNPROVEN): name/description/tags만 확정 필드로 추정. data_flow_service_id를 create-flow body에 넣던 종전 모델은 잘못 — userguide상 flow가 service보다 선행이고 service가 flow를 '선택'한다. capture envelope $.id는 read-coverage list($.contents[0].id) 관례에서 추론 (UNPROVEN)."
    notes: "flow = NiFi data-flow 논리 자원 (서비스 인스턴스가 올라타는 대상). userguide: GET /v1/data-flows/{name}/check-duplication 이름 중복 사전 점검, getdataflowservicesubversions(/v1/data-flow-services/data-flows/{data_flow_id}/sub-versions) sub-version 조회. update/delete는 소스 lifecycle에서 PUT/DELETE /v1/data-flows/{data_flow_id} (UNPROVEN)."

  data-flow-service:
    code: "da-df-service"
    service: data-analytics/data-flow
    heavy: true
    # TRUE userguide prerequisites: SKE cluster + File Storage (+ ingress
    # controller, modeled as a credential/precondition note — no graph node
    # exists for it). The legacy [subnet] edge mirrored the dbaas body and is
    # docs-only; this requires reflects the NiFi-on-K8s reality. Divergence
    # from cross-service.yaml (which still has subnet) is an expected WARNING.
    # IB-031: dropped redundant `filestorage-volume` — reachable transitively via ske-cluster→filestorage-volume; create body never references {filestorage-volume...}. Closure unchanged.
    requires: [ske-cluster, data-flow]
    create:
      endpoint: "POST /v1/data-flow-services"
      body:
        name: "regrdfsvc{ualpha}"
        description: "API regression suite"
        dbaas_engine_version_id: "{opt.engine_version_id}"
        subnet_id: ""   # DOCS-ONLY dbaas field; source coverage probe sent "" (NiFi-on-K8s body has no subnet)
        nat_enabled: false
        instance_name_prefix: "regrdf"
        timezone: "Asia/Seoul"
        allowable_ip_addresses: []
        instance_groups:
          - role_type: ACTIVE
            server_type_name: "{opt.server_type_name}"
            block_storage_groups:
              - {role_type: OS, size_gb: 104, volume_type: SSD}
            instances:
              - {role_type: ACTIVE, service_ip_address: "192.168.10.10/32"}
        tags: []
      options:
        engine_version_id: {type: string, required: true,
                            note: "DOCS-ONLY dbaas field — 소스 lifecycle은 빈 문자열을 보냈다(4xx 예상 coverage probe). NiFi-on-K8s 실제 create body에는 dbaas engine version 개념이 없다(userguide는 SKE 클러스터 위 NiFi/ZooKeeper/Registry 워크로드). 실값 출처 미확인 — ESCALATE docs-vs-reality."}
        server_type_name: {type: string, required: true,
                           note: "DOCS-ONLY dbaas field — 소스 lifecycle 빈 문자열. userguide 실 폼은 server_type_name이 아니라 Storage Class + Node Selector + 워크로드 모듈(Nifi/Nifi Registry/Zookeeper) 선택. POST /v1/data-flow-services/clusters/{cluster_id}/validate-resources가 콘솔 dry-run preflight."}
        account_id: {type: string, default: "regrdfadmin",
                     note: "DOCS-ONLY (body 미배선) — userguide: NiFi 계정 ID 6~30자. 콘솔 폼 필수 입력이나 현 coverage body에는 없음 (실 API body 미확인)."}
        account_password: {type: string,
                           note: "DOCS-ONLY (body 미배선) — userguide: NiFi 계정 password 8~50자, 대/소문자+숫자+특수문자 필수. 계정 자격 — 모델 기본값 부여 부적절(의도된 게이트). 실 API body 미확인."}
    capture: {data_flow_service_id: "$.id"}
    delete: {endpoint: "DELETE /v1/data-flow-services/{data_flow_service_id}",
             destructive: true}
    provenance: docs
    source: {lifecycle: data-flow-service-and-flow-guarded,
             steps: [create-data-flow-service, update-data-flow-service,
                     delete-data-flow-service]}
    _note: "create body 전체가 DOCS-ONLY-NOT-RUNTIME-PROVEN: dbaas_engine_version_id/subnet_id/instance_groups/block_storage_groups/instances는 dbaas 형상을 미러링한 UNPROVEN 템플릿이며, body 토큰 {subnet.subnet_id}는 requires에 subnet이 없으면 composer 미해결 — 이 노드의 requires가 [ske-cluster, filestorage-volume, data-flow]로 정정되면서 {subnet.subnet_id} 토큰도 실제 NiFi body로 교체 필요(현재는 소스 verbatim 보존, 합성 비활성 coverage-only). capture envelope $.id는 list($.contents[0].id) 관례 추론 (UNPROVEN)."
    notes: "billable NiFi-on-SKE 서비스. userguide 확정 (2026-06-14): 선행 = ① SKE 표준 클러스터 ② Ingress Controller(클러스터당 1개, namespace dss-ingress, IngressClass dss-nginx, NodePort 30708/31416 — how_to_guides/ingress_install) ③ File Storage. 권장 최소 사양 CPU 21코어/Mem 57GB/Storage 100GB+. 리전 제한 kr-west1·kr-east1만. 상태 머신 Creating→Running→Updating→Terminating→Error (services/data-analytics__data-flow.yaml states). 콘솔 create 폼 필드: Data Flow 선택(기존 flow), Storage Class, Node Selector, 계정 ID/PW, 워크로드 모듈(Nifi/Registry/Zookeeper), Host Alias(최대 20쌍, 선택), Description(≤150), Tags(서비스당 최대 50). modify=tag/alias/description/리소스 스케일/PW 수정; delete=네임스페이스 제거. 콘솔은 create 전 POST .../clusters/{cluster_id}/validate-resources dry-run preflight 호출. Ingress Controller는 자원 그래프 노드가 없어 credential/precondition로 노트화 — ESCALATE."
