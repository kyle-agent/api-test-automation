# Resource-task model — management/loggingaudit (mg-la group).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from loggingaudit-trail
# (enabled, guarded) by extract.py, curated by hand. start/stop trail and
# downloadlogs are operations on the trail, not resources — they stay in the
# hand-written lifecycle.
#
# 2026-06-14 ingest: the create body was the WRONG MODEL. The catalog endpoint
# POST /v1/trails takes TrailCreateRequestV1dot1 (data/api_docs.json), whose
# REQUIRED fields are account_id, bucket_name, bucket_region — NOT
# name/object_storage_bucket_name/is_multi_region/tags. The trail's display
# name is trail_name (5-26 chars, [A-Za-z0-9-] per the userguide trail page;
# UNCONFIRMED whether it is required at API level). Capture $.trail.id is
# CONFIRMED against the response model TrailShowResponseV1dot1{trail:
# Trail1dot1} and Trail1dot1.id. Body rewritten to the real model below.
#
# 2026-06-15 docs-mapper enrichment (notes/comments ONLY — no shape change).
# Userguide cited (constraints UNPROVEN at API level until a live 2xx):
#   [U1] /userguide/management/logging_audit/overview/
#   [U2] /userguide/management/logging_audit/how_to_guides/trail/
#   [U3] /userguide/management/logging_audit/how_to_guides/  (activity history)
# [U2] Trail console constraints confirmed verbatim:
#   - trail_name: "영문, 숫자와 특수문자(-)를 사용하여 5~26자로 입력" — 5-26
#     chars, English letters + digits + hyphen only. (Confirms the prior guess;
#     API-level required/optional still per spec = optional.)
#   - bucket: "활동 내역을 저장할 Object Storage 버킷명" required; bucket region
#     required and IMMUTABLE after creation ("생성 후 변경 불가").
#   - 대상 리전 (target region): default 전체(All); specific regions selectable;
#     MODIFIABLE after creation (≠ the immutable bucket region).
#   - 로그/자원 유형 (log types): default 전체(All); selectable; modifiable.
#   - 저장할 파일 유형: JSON or CSV.
#   - 로그파일 검증 (log file validation): optional; when on, stores a Digest
#     file in the same bucket to detect log file 변경/삭제.
# [U1] Activity history viewable 90 days; long-term retention requires a Trail
#      writing to Object Storage.
# [U3] Activity-history EXPORT (console, not the trail API) offers time-range
#      presets 전체/최근30분/최근1시간/최근12시간/직접입력 and JSON|CSV download —
#      this is the console activity-log download, distinct from the trail's
#      downloadlogs op; do not confuse with listlogs query params.
version: 1
resources:
  trail:
    code: "mg-la-trail"
    service: management/loggingaudit
    requires:
      # bucket_region must match where the bucket lives; bucket_name is a
      # pre-existing Object Storage bucket (userguide: "Object Storage required
      # for Trail creation"). Object Storage has no node in this model yet, so
      # the bucket is a docs-only precondition carried in options (_note).
      - {credential: account_id,
         note: "account_id (ACCOUNT_ID-xxxx) is a required body field — the caller's account id, supplied by the harness/credential context, not a graph node"}
    create:
      endpoint: "POST /v1/trails"
      # TrailCreateRequestV1dot1 required: account_id, bucket_name,
      # bucket_region. Optional sent: trail_name (display name), region_total_yn
      # (Y = all regions), log_type_total_yn (Y = all log types),
      # log_verification_yn (N), organization_trail_yn (N), trail_description,
      # trail_save_type (JSON|CSV). iam_role_id/log_group_name are ServiceWatch-
      # trail-only; log_archive_account_id is org-trail-only — all omitted.
      body:
        account_id: "{opt.account_id}"
        bucket_name: "{opt.bucket_name}"
        bucket_region: "{region}"
        trail_name: "regrtrail{unique}"
        trail_description: "API regression coverage probe"
        region_total_yn: "Y"
        log_type_total_yn: "Y"
        log_verification_yn: "N"
        organization_trail_yn: "N"
        trail_save_type: "JSON"
      options:
        account_id: {type: string, required: true, default: "{account_id}",
                     note: "_note: 본문 필수 account_id — 호출 계정 id(ACCOUNT_ID-xxxx). 엔진 builtin {account_id}가 없으면 크리덴셜 컨텍스트에서 채워야 함(라이브 검증 대상)"}
        bucket_name: {type: string, required: true,
                      default: "apitest-logsink",
                      note: "사전 존재하는 Object Storage 버킷명. userguide [U2] 확인: 버킷·버킷 리전 모두 필수이며 버킷 리전은 '생성 후 변경 불가'(IMMUTABLE) — bucket_region이 버킷 실제 리전과 불일치하면 생성 실패 예상(UNPROVEN). 워크플로 ensure-logsink가 만드는 공용 apitest-logsink 사용 — network-logging과 공유 (owner 2026-06-13)"}
        trail_name: {type: string, required: false, default: "regrtrail{unique}",
                     note: "_note: 트레일 표시명. userguide trail 페이지 [U2] 정확 문구 '영문, 숫자와 특수문자(-)를 사용하여 5~26자로 입력' — 5-26자, 영문/숫자/하이픈(-)만 (2026-06-15 [U2] 재확인). default regrtrail{unique}는 이 규칙 내. API 레벨 필수 여부는 스펙상 optional 표기 — 라이브 검증 대상(UNPROVEN)"}
        trail_save_type: {type: enum, values: [JSON, CSV], required: false,
                          default: JSON, vary: true,
                          note: "저장 포맷 — 생성 후 변경 가능. userguide [U2] '저장할 파일 유형 (JSON, CSV)' 정확 2값 확인 (2026-06-15)"}
        region_total_yn: {type: enum, values: ["Y", "N"], required: false,
                          default: "Y", vary: false,
                          note: "대상 리전 전체 여부(default Y). userguide [U2]: 대상 리전 default 전체(All), 특정 리전 선택 가능, 생성 후 변경 가능(버킷 리전과 달리 가변). N이면 region_names 목록 필요 — 미모델"}
        log_verification_yn: {type: enum, values: ["N", "Y"], required: false,
                              default: "N", vary: true,
                              note: "로그파일 검증(digest) 활성 — Y면 무결성 검증용 digest 파일을 같은 버킷에 저장해 로그파일 변경/삭제 여부 검출(userguide [U2] 로그파일 검증, 2026-06-15 확인)"}
    capture: {trail_id: "$.trail.id"}
    delete: {endpoint: "DELETE /v1/trails/{trail_id}", destructive: true}
    provenance: docs
    source: {lifecycle: loggingaudit-trail, steps: [create-trail, delete-trail]}
    notes: "CloudTrail-equivalent 감사 trail (90일 콘솔 보관 + Object Storage 장기 보관). 2026-06-14 정정: create body는 종전 {name, object_storage_bucket_name, is_multi_region, tags} 추정값이 아니라 docs TrailCreateRequestV1dot1 모델(필수 account_id/bucket_name/bucket_region; 표시명은 trail_name; multi-region은 region_total_yn/region_names). capture $.trail.id는 응답 모델 TrailShowResponseV1dot1{trail: Trail1dot1}, Trail1dot1.id로 CONFIRMED(라이브 2xx 후 VALIDATED 승격). start/stop은 body 없는 POST /v1/trails/{trail_id}/start|stop 오퍼레이션(자원 아님 — 핸드라이트 lifecycle에 유지). downloadlogs는 POST /v1/logs/download. Object Storage 버킷이 선행 필수(userguide Prerequisites) — cross-service 엣지 후보(아래 리포트). Landing Zone 선행 체인 구성요소이기도 함(cloudcontrol-landing-zone notes). _note(smoke-400 관련 아님): loggingaudit의 listlogs(GET /v1/logs)는 start_at/end_at(필수 시간범위)를, listtrails(GET /v1/trails)는 필수 없음 — service yaml constraints 참조."
