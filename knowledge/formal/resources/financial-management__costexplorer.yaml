# Resource-task model — financial-management/costexplorer (fm-cost group).
# 조회 전용 task (owner 정책 2026-06-12) — 서비스 단위 reads 묶음 노드.
version: 1
resources:
  cost-reads:
    lookup: true
    code: "fm-cost-reads"
    service: financial-management/costexplorer
    requires: []
    create:
      endpoint: "GET /v1/bills"
    verify:
      - {name: usages, endpoint: "GET /v1/usages", expect_status: [200]}
      - {name: payments-monthly, endpoint: "GET /v1/payments/monthly",
         expect_status: [200]}
    provenance: docs
    notes: |
      조회 전용 reads 묶음 — 쿼리 파라미터 전부 optional(docs). smoke가 3/3 200
      관측 이력 → 라이브 합성 통과 시 승격. capture 불필요(자원 id 없음).
      userguide(how_to_guides/explorer·usage·payment, 2026-06-14)에서 추출한
      쿼리 모델 (필드명은 console-rendered이라 UNPROVEN — bare GET는 200이므로
      파라미터 생략이 안전한 기본값):
      - time-range: 최대 6개월 추이, '월 1일~말일' 단위. 연/월 드롭다운 →
        GET /v1/bills·/v1/usages 는 조회 월을 year/month(또는 from/to YYYY-MM)
        쿼리로 받을 것으로 추정. payments/monthly 는 월 단위 납부 내역.
      - granularity: 일별(daily)/월별(monthly) 두 가지 시각화. GET 쿼리의
        granularity 파라미터로 노출될 것으로 추정 — UNPROVEN.
      - grouping dimensions(그룹화): 서비스군(service group)·서비스(service)·
        자원명(resource name)·지역(region)·서버 유형·약정 기간; 태그 key-value
        필터 지원. group_by/filter 쿼리로 노출될 것으로 추정 — UNPROVEN.
      - 데이터 카테고리: 총 예상 청구 금액·월 평균 청구 금액·비용 Top5·
        할인 내역(Planned Compute/SLA/Credit). 미정산월=예상, 정산월=실청구.
      - 타임존 Asia/Seoul(GMT+09:00), 매일 자정 데이터 갱신.
      cost_management overview(2026-06-14, WebFetch 200) 재확인 사항:
      - 비용 분석은 '월(month) 기준'으로 제공(granularity 월별이 1차 — 일별은
        탐색 시각화 옵션). 최대 6개월 추이 한도 확정.
      - 해지 수수료(Planned Compute cancellation fee) 및 Support plan 금액은
        '청구 정산이 완료된 월'에 조회된다(미정산월에는 미반영) — Top5/할인
        내역 해석 시 정산월 여부 주의(UNPROVEN field mapping).
      - 청구 리포트의 태그(tag) 정보는 이메일 발송 시점에만 제공(콘솔 인라인이
        아니라 리포트 메일 첨부) — group_by=tag 의 가용성과 무관, UNPROVEN.
      모든 쿼리 파라미터는 docs-only(_note); 노드는 파라미터 없는 bare GET로
      합성하여 3/3 200을 유지한다.
      WebFetch: cost_management/overview/ = 200; cost_management/how_to_guides/
      {explorer,usage,payment}/ = 503 (skip — 기존 인입분 유지, 재확인 불가).
    _note: "Query params (time-range year/month or from/to, granularity daily|monthly, group_by service-group|service|resource|region, tag filters) are documented in the userguide but field names UNPROVEN — apiref is JS-rendered/console-only. Node intentionally issues param-less GETs (smoke 3/3 200); param variants belong to C4 parameter-coverage, not this reads node."
