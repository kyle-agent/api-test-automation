# Resource-task model — networking/gslb (nw-gslb group).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from networking-gslb-service
# (light + enabled, but per its _note "NOT runtime-proven … pending live
# validation" and the capture is capture_soft — so C5 keeps everything docs
# until a live pass upgrades it; body copied verbatim from the lifecycle).
#
# docs-mapper enrichment (2026-06-15, networking subtree UP). Sources cited:
#   - https://docs.e.samsungsdscloud.com/userguide/networking/gslb/overview/
#   - https://docs.e.samsungsdscloud.com/userguide/networking/gslb/how_to_guides/
# All userguide-derived constraints below are UNPROVEN (notes only).
version: 1
resources:
  gslb:
    code: "nw-gslb-gslb"
    service: networking/gslb
    requires: []
    create:
      endpoint: "POST /v1/gslbs"
      body:
        algorithm: ROUND_ROBIN
        description: "API regression suite"
        env_usage: PUBLIC
        health_check:
          health_check_interval: ""
          health_check_probe_timeout: ""
          health_check_user_id: ""
          health_check_user_password: ""
          protocol: TCP
          receive_string: ""
          send_string: ""
          service_port: "80"
          timeout: ""
        name: "regr{ualpha}.gslb.e.samsungsdscloud.com"
        resources: []
        tags: []
    capture: {gslb_id: "$.gslb.id"}
    verify:
      - {name: read, endpoint: "GET /v1/gslbs/{gslb_id}",
         expect_status: [200]}
      - {name: read-resources, endpoint: "GET /v1/gslbs/{gslb_id}/resources",
         expect_status: [200]}
    delete: {endpoint: "DELETE /v1/gslbs/{gslb_id}", destructive: true}
    provenance: docs
    source: {lifecycle: networking-gslb-service, steps: [create-gslb, delete-gslb]}
    notes: "선행 서비스 없음 — 글로벌/계정 스코프, VPC-free (services constraint
      gslb-no-prereq-services). REGION GATE: kr-west1/kr-east1 전용 (kr-south
      불가, gslb-region-availability — 엔진에 region-guard가 없어 소스 lifecycle
      _note에 기록된 운영 게이트). name은 FQDN — 라벨부는 4-40자 소문자+숫자만
      (gslb-name-rules); health_check는 userguide 규칙 적용형: TCP + service_port
      '80' (TCP/HTTP(S)에 Service Port 필수, Receive String은 HTTP(S)에서만
      필수·영숫자만 — TCP라 빈 문자열 유지, gslb-health-check-body-applied).
      enum 추정치 (UNVALIDATED): algorithm=ROUND_ROBIN, env_usage=PUBLIC.
      capture는 소스에서 capture_soft($.gslb.id, creategslb response_example의
      top-level gslb.id — health_check.id는 sub-id) — envelope UNPROVEN이라
      docs. verify GET 2건이 gslb의 gap_getid 2건(showgslb, listgslbresources)을
      닫는다. 계정당 도메인 20개 cap, 도메인당 연결 자원 8개 cap —
      core/budgets에 'gslb' quota kind가 생기면 quota 필드로 승격.
      userguide 확증 (overview + how_to_guides, 2026-06-15, UNPROVEN):
      (1) name FQDN 라벨부 4-40자 소문자+숫자만, 중복 불가 — 기존 gslb-name-rules
      재확인.
      (2) env_usage('용도')는 생성 시 PUBLIC 자동 입력, userguide에 PUBLIC만 문서화
      — 현재 body의 PUBLIC이 옳다(이전 'UNVALIDATED 추정'에서 docs-confirmed로 강화).
      (3) algorithm은 Ratio 또는 Round Robin 2종 — body의 ROUND_ROBIN은 유효한
      enum. Ratio는 weight 0-100 범위.
      (4) health_check protocol은 ICMP/TCP/HTTP/HTTPS 중 선택(HTTPS 권장). TCP/HTTP
      (S)는 service_port 필수. send_string은 HTTP(S) 전용 필수이며 '<,>,#' 사용 불가
      (예: 'GET /www/example/index.html'); receive_string은 HTTP(S) 전용 필수이며
      영문 대소문자+숫자만 — 현재 body가 TCP라 두 문자열 빈값 유지가 올바름
      (gslb-health-check-body-applied 재확인).
      (5) 신규 precondition (PROVEN-by-docs): GSLB 모니터링이 동작하려면 대상 자원의
      Firewall 및 Security Group에 허용 규칙을 추가해야 한다 — live HC 통과 전제.
      과금은 도메인 수 + HC 자원 수 + 쿼리량 기준.
      region: kr-west1/kr-east1 전용(kr-south1/2/3 불가) — gslb-region-availability 재확인."
