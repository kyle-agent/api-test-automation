# Resource-task model — container/scr (ct-scr group, Container Registry).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from container-scr-registry
# (enabled, live-validated) + scr-image/tags-write-coverage (docker-push-born
# resources -> no_api, like networking__firewall.yaml).
#
# Node id: cross-service.yaml carries BOTH 'scr-registry' (VALIDATED edge) and
# 'container-registry' (docs edge, the key the ai-ml entries reference) — the
# model uses container-registry (the fan-out contract's key); the validator's
# scr-repository divergence warning vs the legacy 'scr-registry' edge is the
# expected alias artifact, reconcile the L2 duplicate during R3.
version: 1
resources:
  container-registry:
    code: "ct-scr-registry"
    service: container/scr
    requires: []
    create:
      endpoint: "POST /v1/container-registries"
      body: {name: "regrscr{unique}", private_acl_enabled: false,
             private_acl_resources: [], public_acl_resources: [],
             public_visible_enabled: false}
    capture: {reg_id: "$.id"}
    ready: {field: "$.state", until: [Running, RUNNING, active, ACTIVE],
            timeout: 180, interval: 10}
    delete: {endpoint: "DELETE /v1/container-registries/{reg_id}",
             retry_on_status: [500, 409], retries: 24, retry_interval: 15,
             destructive: true}
    # registry-delete-500-race (services quirk VALIDATED): 생성 직후 수분간
    # DELETE가 500 — run 27399448835에서 합성본도 재현, 재시도로 흡수
    verify:
      - {name: read, endpoint: "GET /v1/container-registries/{reg_id}",
         expect_status: [200]}
      - {name: check-dup, endpoint: "GET /v1/container-registries/check-duplication/name?name=regrscr{unique}",
         expect_status: [200]}
      - {name: connectable, endpoint: "GET /v1/container-registries/connectable-resources",
         expect_status: [200]}
      # private-acl PUT 보류: doc-정합 body에 500 ContactAdminForAssistance
      # 3회 재현 (runs 27401527554/27417986669/27421363609) — 제품 결함 후보.
      # 재시도형 verify(R3) 후 재도전. public-acl류는 userguide 보안 경고로 제외.
    provenance: VALIDATED
    source: {lifecycle: container-scr-registry,
             steps: [create, wait-running, delete, wait-gone]}
    notes: "선행 서비스 없음 (services quirk no-prerequisite-services). DELETE는 생성 직후 수 분간 500 레이스 — 소스는 500 재시도 12×30s + 404 폴링 (registry-delete-500-race VALIDATED); 합성기의 충돌-재시도 시맨틱에 500 포함 필요 (R3). 레지스트리의 인증키는 콘솔 발급 (credential class) — scr-image 노드의 {credential: scr-auth-key} 참조."

  scr-repository:
    code: "ct-scr-repository"
    service: container/scr
    requires: [container-registry]
    create:
      endpoint: "POST /v1/repositories"
      body:
        name: "regrrepo{unique}"
        description: "API regression suite"
        registry_id: "{container-registry.reg_id}"
        lifecycle_policy:
          lifecycle_policy_enabled: false
          outdated_rule_enabled: false
          outdated_rule_duration: 90
          outdated_rule_tag_expression: "*"
          untagged_rule_enabled: false
          untagged_rule_duration: 90
        lock_policy: {locked: false}
        pull_policy:
          critical_limit: 0
          high_limit: 0
          unmodified_excepted: false
          unscanned_image_pull_prevented: false
          vulnerable_image_pull_prevented: false
        scan_policy:
          auto_scan_enabled: false
          fixed_version_excepted: false
          language_excepted: false
          scan_policy_enabled: false
          secret_excepted: false
          severity_limit: High
        tags: []
    capture: {repo_id: "$.id"}
    delete: {endpoint: "DELETE /v1/repositories/{repo_id}", destructive: true}
    verify:
      - {name: read, endpoint: "GET /v1/repositories/{repo_id}",
         expect_status: [200]}
      - {name: check-dup, endpoint: "GET /v1/repositories/check-duplication/name?name=regrrepo{unique}",
         expect_status: [200]}
      - {name: images-empty, endpoint: "GET /v1/repositories/{repo_id}/images",
         expect_status: [200]}
      - {name: description, endpoint: "PUT /v1/repositories/{repo_id}/description",
         json: {description: "API regression suite"}, expect_status: [200, 202, 204]}
      - {name: lock-policy, endpoint: "PUT /v1/repositories/{repo_id}/lock-policy",
         json: {lock_policy: {locked: false}}, expect_status: [200, 202, 204]}
      - {name: pull-policy, endpoint: "PUT /v1/repositories/{repo_id}/pull-policy",
         json: {pull_policy: {critical_limit: 0, high_limit: 0, unmodified_excepted: false,
                              unscanned_image_pull_prevented: false,
                              vulnerable_image_pull_prevented: false}},
         expect_status: [200, 202, 204]}
      - {name: scan-policy, endpoint: "PUT /v1/repositories/{repo_id}/scan-policy",
         json: {scan_policy: {auto_scan_enabled: false, fixed_version_excepted: false,
                              language_excepted: false, scan_policy_enabled: false,
                              secret_excepted: false, severity_limit: "High"}},
         expect_status: [200, 202, 204]}
      - {name: lifecycle-policy, endpoint: "PUT /v1/repositories/{repo_id}/lifecycle-policy",
         json: {lifecycle_policy: {lifecycle_policy_enabled: false, outdated_rule_enabled: false,
                                   outdated_rule_duration: 90, outdated_rule_tag_expression: "*",
                                   untagged_rule_enabled: false, untagged_rule_count: 10}},
         expect_status: [200, 202, 204],
         note: "repo-레벨 정책/설명 PUT 7종 — body는 image-레벨 probe 검증 형태 + api_docs DTO (repo-레벨 라이브 미증명; userguide '리포지토리 관리하기' 2026-06-12). 이미지/태그-레벨 ops는 docker push(SCR 인증키) 전까지 불가"}
    provenance: VALIDATED
    source: {lifecycle: container-scr-registry, steps: [create-repo, delete-repo]}
    notes: "정책 블록(lifecycle/lock/pull/scan)은 모두 no-op/disabled 값의 VALIDATED 템플릿 — 동일 shape이 repo/image/tag 정책 PUT들에 재사용된다. 삭제는 409/500 재시도 6×20s (소스 시맨틱). registry보다 먼저 삭제."

  scr-image:
    code: "ct-scr-image"
    service: container/scr
    no_api: true
    requires:
      - scr-repository
      - {credential: scr-auth-key}
    provenance: docs
    source: {lifecycle: scr-image-write-coverage, steps: [seed-image-placeholder]}
    notes: "Open API create 없음: SCR 이미지 id는 repository로의 `docker push`로 태어난다 — REST POST가 존재하지 않는다 (scr-image-write-coverage _note). push에는 레지스트리의 콘솔 발급 인증키가 필요 → {credential: scr-auth-key} 사전조건 (cross-service container-registry note; 환경에 미표시면 env-skip, archivestorage 패턴). 카탈로그에 있는 것은 image의 정책/설명 PUT과 DELETE /v1/images/{id}뿐. 합성 경로는 R3에서 push 가능한 러너가 생겨야 열린다 — 그때까지 그래프 문서화 전용."

  scr-tag:
    code: "ct-scr-tag"
    service: container/scr
    no_api: true
    requires: [scr-image]
    provenance: docs
    source: {lifecycle: scr-tags-write-coverage, steps: [seed-tags-placeholder]}
    notes: "Open API create 없음: 태그(tags/'tagses') 역시 docker push 산물이다. 카탈로그에는 PUT .../check-vulnerability·lock-policy와 DELETE /v1/tagses(BULK, body {ids:[...]})·DELETE /v1/tagses/{tags_id}만 존재. scr-image처럼 R3 push 러너 전까지 composer 대상 불가."
