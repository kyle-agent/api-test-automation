# Resource-task model — management/support (mg-support group).
# 조회 전용 task (owner 정책 2026-06-12). 레코드 존재가 env 의존.
version: 1
resources:
  support-inquiry:
    lookup: true
    code: "mg-support-inquiry"
    service: management/support
    requires: []
    create:
      endpoint: "GET /v1/inquiries"
      options:
        known_inquiry_id: {type: string, required: true,
                           default: "sr-260613-00001-nuri-scp",
                           note: "owner 제공 실존 문의 id (2026-06-13)"}
    capture: {inquiry_id: "$.inquiries[0].id"}
    capture_soft: true  # 문의 이력 없으면 빈 리스트 (run 27428457582) — verify는 optional로 스킵
    verify:
      # owner 제공 실존 id — 리스트가 비어도 id-bound GET을 결정적으로 검증
      - {name: read-known,
         endpoint: "GET /v1/inquiries/{opt.known_inquiry_id}",
         expect_status: [200]}
      - {name: read, endpoint: "GET /v1/inquiries/{inquiry_id}",
         expect_status: [200, 404]}
    provenance: docs  # 소스 quota/support-reads는 capture_soft였고 리스트가 비어 있어 envelope 미증명 (run 27428457582)
    source: {lifecycle: support-reads, steps: [list-inquiries]}
    notes: "조회 전용 lookup task — 문의 이력 없으면 capture 실패(env 의존, 소스도 SOFT 처리). known_inquiry_id=sr-260613-00001-nuri-scp는 이 계정의 실존 문의 (owner 2026-06-13)."

  support-service-request:
    lookup: true
    code: "mg-support-sr"
    service: management/support
    requires: []
    create:
      endpoint: "GET /v1/service-requests"
      options:
        known_sr_id: {type: string, required: true, default: "SR0003870935",
                      note: "owner 제공 실존 서비스 요청 id (2026-06-13)"}
    capture: {service_request_id: "$.service_requests[0].id"}
    capture_soft: true  # 서비스 요청 이력 없으면 빈 리스트 — verify는 optional로 스킵
    verify:
      # owner 제공 실존 SR id(2026-06-13) — 리스트가 비어도 id-bound GET을
      # 결정적으로 검증 (capture 의존 없는 별도 verify)
      - {name: read-known,
         endpoint: "GET /v1/service-requests/{opt.known_sr_id}",
         expect_status: [200]}
      - {name: read, endpoint: "GET /v1/service-requests/{service_request_id}",
         expect_status: [200, 404]}
    provenance: docs  # 소스 quota/support-reads는 capture_soft였고 리스트가 비어 있어 envelope 미증명 (run 27428457582)
    source: {lifecycle: support-reads, steps: [list-service-requests]}
    notes: "조회 전용 lookup task — 이력 env 의존. known_sr_id=SR0003870935는 이 계정의 실존 SR (owner 2026-06-13) — 환경 데이터라 모델 옵션으로 보관."
