# Resource-task model — platform/product (pf-product group).
# 조회 전용 task (owner 정책 2026-06-12). envelope은 docs 추정 — 라이브 후 승격.
version: 1
resources:
  product-category:
    lookup: true
    code: "pf-product-category"
    service: platform/product
    requires: []
    create:
      endpoint: "GET /v1/product-categories"
    capture: {category_id: "$.product_categories[0].category_id"}  # 라이브 body(run 27444823109): 필드명 category_id (string enum, 예 FINANCIAL_MANAGEMENT)
    verify:
      - {name: read, endpoint: "GET /v1/product-categories/{category_id}",
         expect_status: [200]}
    provenance: VALIDATED  # gen-wave3-product 통과 — run 27447899572 (capture + id-bound read 200)
    notes: "조회 전용 lookup task — category 리스트 envelope 라이브 확인(run 27444823109): product_categories[].category_id."

  product:
    lookup: true
    code: "pf-product-product"
    service: platform/product
    requires: []
    create:
      endpoint: "GET /v1/products"
    capture: {product_id: "$.products[0].product_id"}  # category의 *_id 패턴 추론 — 라이브 body로 확정 예정
    verify:
      - {name: read, endpoint: "GET /v1/products/{product_id}",
         expect_status: [200]}
    provenance: VALIDATED  # gen-wave3-product 통과 — run 27447899572 (capture + id-bound read 200)
    notes: "조회 전용 lookup task — products[].product_id 패턴 추론이 라이브로 확정 (run 27447899572)."
