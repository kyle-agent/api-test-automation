# Resource-task model — networking/vpc (nw-vpc group).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · validated by knowledge/formal/validate.py
# · consumed by regression/scenarios/composer.py (R2a).
#
# Back-extracted from live lifecycles by knowledge/formal/resources/extract.py
# and curated by hand: literal cidrs became {opt.cidr} pick schemes, captured-var
# wiring became {<node>.<cap>} tokens, provenance follows C5 (VALIDATED only when
# the source body/capture is runtime-proven; UNPROVEN bodies stay docs).
version: 1
resources:
  vpc:
    code: "nw-vpc-vpc"
    service: networking/vpc
    adopt: vpc
    requires: []
    create:
      endpoint: "POST /v1/vpcs"
      body: {name: "regrvpc{unique}", description: "API regression suite",
             cidr: "{opt.cidr}", tags: []}
      options:
        cidr: {type: cidr, required: true, pick: unique-block,
               note: "live VPC들과 비겹침 (docs/domain-constraints 블록 할당; composer가 10.<160+k>.0.0/20을 할당)"}
        secondary_cidr: {type: string, default: "10.200.0.0/20",
                         note: "add-cidr verify용 보조 블록 — unique-block(10.16x)과 비겹침 고정값"}
    capture: {vpc_id: "$.vpc.id"}
    verify:
      - {name: add-cidr, endpoint: "POST /v1/vpcs/{vpc_id}/cidrs",
         json: {cidr: "{opt.secondary_cidr}"},
         expect_status: [200, 201, 202],
         note: "수작업 vpc-cidr-secondary 은퇴 갭: addvpccidr. 수작업은 [200..422] 관용이라 UNPROVEN이었음 — 하드 기대. 보조 CIDR은 표준 DELETE가 없어 VPC 삭제로 함께 제거"}
    ready: {field: "$.vpc.state", until: ACTIVE, timeout: 180, interval: 10}
    delete: {endpoint: "DELETE /v1/vpcs/{vpc_id}", destructive: true}
    quota: vpc
    provenance: VALIDATED
    source: {lifecycle: networking-vpc-subnet, steps: [create-vpc, get-vpc-active, delete-vpc]}

  subnet:
    code: "nw-vpc-subnet"
    service: networking/vpc
    adopt: subnet
    requires: [vpc]
    create:
      endpoint: "POST /v1/subnets"
      body: {name: "regrsub{unique}", description: "API regression suite",
             cidr: "{opt.cidr}", type: GENERAL, vpc_id: "{vpc.vpc_id}", tags: []}
      options:
        cidr: {type: cidr, required: true, pick: sub-block-of, of: vpc.cidr,
               note: "VPC cidr의 하위 /24 (composer가 부모 블록에서 8+j번째 /24를 절단)"}
    capture: {subnet_id: "$.subnet.id"}
    ready: {field: "$.subnet.state", until: ACTIVE, timeout: 180, interval: 10}
    verify:
      - {name: read-vips, endpoint: "GET /v1/subnets/{subnet_id}/vips",
         expect_status: [200]}
      - {name: read-sap-secondary-subnets,
         endpoint: "GET /v1/subnets/{subnet_id}/sap-secondary-subnets",
         expect_status: [200]}
    delete: {endpoint: "DELETE /v1/subnets/{subnet_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: networking-vpc-subnet, steps: [create-subnet, get-subnet-active, delete-subnet]}

  port:
    code: "nw-vpc-port"
    service: networking/vpc
    requires: [subnet]
    create:
      endpoint: "POST /v1/ports"
      body: {name: "regrport{unique}", description: "API regression suite",
             security_groups: ["{opt.security_group}"],
             subnet_id: "{subnet.subnet_id}", tags: []}
      options:
        security_group: {type: ref, target: security-group, required: false,
                         note: "선택 시 composer가 security-group 노드를 선행 생성해 id를 주입; 미선택 시 security_groups: [] (validated 형태)"}
    capture: {port_id: "$.port.id"}
    ready: {field: "$.port.state", until: [ACTIVE, CREATED, RUNNING, DOWN],
            timeout: 180, interval: 10}
    delete: {endpoint: "DELETE /v1/ports/{port_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: networking-vpc-subnet, steps: [create-port, delete-port]}
    notes: "ready until 목록은 heavy-shared-networking port-wait의 validated 관측값"

  internet-gateway:
    code: "nw-vpc-igw"
    service: networking/vpc
    requires: [vpc]
    create:
      endpoint: "POST /v1/internet-gateways"
      body: {description: "API regression suite",
             firewall_enabled: "{opt.firewall_enabled}",
             firewall_loggable: false, type: IGW, vpc_id: "{vpc.vpc_id}", tags: []}
      options:
        firewall_enabled: {type: enum, values: [false, true], default: false,
                           vary: true,
                           note: "true면 firewall이 암묵 생성된다 (R3 carrier-capture: firewall 노드가 GET /v1/firewalls?vpc_name=...&product_type=IGW lookup으로 회수). 기본 false가 VALIDATED 생성형; true 변형은 docs — firewall 과금(flavor) 동반하므로 firewall 체인 합성에서만 켠다"}
    capture: {internet_gateway_id: "$.internet_gateway.id"}
    ready: {field: "$.internet_gateway.state",
            until: [ACTIVE, ATTACHED, CREATED, RUNNING], timeout: 300, interval: 15}
    verify:
      - {name: list, endpoint: "GET /v1/internet-gateways?vpc_id={vpc.vpc_id}",
         expect_status: [200]}
      - {name: set, endpoint: "PUT /v1/internet-gateways/{internet_gateway_id}",
         json: {description: "API regression suite (updated)"},
         expect_status: [200, 202],
         note: "수작업 체인 은퇴 갭: listinternetgateways + setinternetgateway (set body는 description-only 추정 — 라이브 본문이 정정)"}
    delete: {endpoint: "DELETE /v1/internet-gateways/{internet_gateway_id}",
             destructive: true}
    provenance: VALIDATED
    source: {lifecycle: networking-vpc-internet-gateway,
             steps: [create-igw, wait-igw-active, delete-igw]}
    notes: "firewall_enabled: true로 만들면 firewall이 암묵 생성된다 (firewall 노드 참조) — 옵션 기본 false는 VALIDATED body와 동일형. IGW 삭제가 암묵 firewall도 함께 제거한다 (firewall 노드는 delete 없음)."

  nat-gateway:
    code: "nw-vpc-natgw"
    service: networking/vpc
    requires: [subnet, public-ip]
    create:
      endpoint: "POST /v1/nat-gateways"
      body: {description: "API regression suite",
             publicip_id: "{public-ip.publicip_id}",
             subnet_id: "{subnet.subnet_id}", tags: []}
    capture: {nat_gateway_id: "$.nat_gateway.id"}
    ready: {field: "$.nat_gateway.state",
            until: [ACTIVE, CREATED, RUNNING, AVAILABLE], timeout: 300, interval: 15}
    delete: {endpoint: "DELETE /v1/nat-gateways/{nat_gateway_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-networking,
             steps: [natgw-create, natgw-wait, natgw-delete]}

  public-ip:
    code: "nw-vpc-public-ip"
    service: networking/vpc
    requires: []
    create:
      endpoint: "POST /v1/publicips"
      body: {description: "API regression suite", type: IGW, tags: []}
    capture: {publicip_id: "$.publicip.id"}
    ready: {field: "$.publicip.state",
            until: [ACTIVE, CREATED, RUNNING, AVAILABLE], timeout: 300, interval: 15}
    delete: {endpoint: "DELETE /v1/publicips/{publicip_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: networking-vpc-publicip, steps: [create, delete]}
    notes: "경로는 /v1/publicips (붙여쓰기) — 모델 노드 id는 cross-service의 public-ip 표기를 따른다"

  private-nat:
    code: "nw-vpc-private-nat"
    service: networking/vpc
    requires:
      - one_of: [direct-connect, transit-gateway]
        bind: uplink
    create:
      endpoint: "POST /v1/private-nats"
      body: {name: "regrpnat{unique}", description: "API regression private-nat",
             cidr: "192.167.0.0/24", service_resource_id: "{dep.uplink}",
             service_type: "{opt.service_type}", tags: []}
      options:
        service_type: {type: enum, values: [TRANSIT_GATEWAY, DIRECT_CONNECT],
                       required: true,
                       note: "one_of 분기와 일치해야 한다 (기본 분기 = transit-gateway = 첫 enum 값; direct-connect 분기 선택 시 DIRECT_CONNECT로 지정)"}
    capture: {private_nat_id: "$.private_nat.id"}
    delete: {endpoint: "DELETE /v1/private-nats/{private_nat_id}", destructive: true}
    provenance: docs
    source: {lifecycle: vpc-private-nat, steps: [create-private-nat, delete-private-nat]}
    notes: "§1의 OR-의존 사례 (direct connect OR transit gateway). 소스 lifecycle은 service_resource_id에 {unique} placeholder를 보내 4xx — 실소유 uplink 자원 주입은 이 모델이 처음 제공하므로 body는 UNPROVEN(docs). capture envelope $.private_nat.id UNPROVEN. 분기 결정(2026-06-13, gap report 그룹 1 #2): direct-connect는 물리 회선 의심(owner 확인 대기)이라 transit-gateway 경로로 검증 — composer 기본 분기도 TGW다 (_branch_cost: tgw closure 1 create vs dc 2 [dc+vpc]; 합성 시 choices={'private-nat': 'transit-gateway'}를 명시해 의도를 고정). service_type 기본값 TRANSIT_GATEWAY(첫 enum)와 정합."

  vpc-endpoint:
    code: "nw-vpc-endpoint"
    service: networking/vpc
    requires: [vpc, subnet, filestorage-volume]
    create:
      endpoint: "POST /v1/vpc-endpoints"
      # R3 FS wiring (2026-06-13, gap report 그룹 1 #3): resource_key must be a
      # REAL filestorage volume id (run 27395331657: placeholder -> 400
      # scp-network.vpc-endpoint.subnet-not-found "VPC Endpoint Type Subnet not
      # found" — the API resolves the TARGET service's subnet from
      # resource_key). Cross-file requires on storage__filestorage.yaml's
      # filestorage-volume injects {volume_id}. resource_info is free text
      # describing the resource key (api_docs: string, max 200) — use the
      # volume's name template.
      body: {name: "regrvpce{unique}", description: "API regression vpc endpoint",
             endpoint_ip_address: "{opt.endpoint_ip_address}",
             resource_info: "regrfs{unique}",
             resource_key: "{filestorage-volume.volume_id}",
             resource_type: "{opt.target}",
             subnet_id: "{subnet.subnet_id}", vpc_id: "{vpc.vpc_id}", tags: []}
      options:
        target: {type: enum, values: [FS, OBS, SCR], default: FS,
                 required: true, vary: true,
                 note: "유효 enum은 라이브 ValidationError가 직접 알려줌(run 27394211896): 'VPC Endpoint Resource Type should be a valid types(FS, OBS, SCR)' — dns는 유효 타입이 아님 (VALIDATED enum). resource_key가 FS 볼륨 id로 배선되어 있으므로 OBS/SCR 변형은 각자의 실 자원 키로 재배선 전에는 합성 금지"}
        endpoint_ip_address: {type: string, required: true, default: "10.124.0.20",
                              note: "선택한 subnet cidr 내부의 빈 IP여야 한다 — 기본값은 공유 subnet(10.124.0.0/24, engine._SHARED_SUBNET_CIDR) 재호밍 규칙을 따른다; adopt 없이 자가 생성 subnet(10.160.8.0/24)으로 합성 시 override 필요"}
    capture: {vpc_endpoint_id: "$.vpc_endpoint.id"}
    delete: {endpoint: "DELETE /v1/vpc-endpoints/{vpc_endpoint_id}", destructive: true}
    provenance: docs
    source: {lifecycle: vpc-endpoint, steps: [create-vpc-endpoint, delete-vpc-endpoint]}
    notes: "endpoint_type(=resource_type) enum FS/OBS/SCR 라이브 증명; 실 FS volume_id 주입은 이 배선이 처음 제공 — body/capture UNPROVEN(docs). FS 볼륨은 VPC 무관(standalone NFS)이라 'TARGET 서비스 subnet' 해석이 볼륨 쪽에서 어떻게 풀리는지는 라이브 정제 대상."

  privatelink-service:
    code: "nw-vpc-privatelink-service"
    service: networking/vpc
    requires: [vpc, subnet]
    create:
      endpoint: "POST /v1/privatelink-services"
      body: {name: "regrpls{ualpha}", description: "API regression suite",
             approval_type: AUTO, connected_resource_type: IP,
             connected_resource_ip_address: "{opt.connected_resource_ip}",
             service_ip_address: "{opt.service_ip}",
             subnet_id: "{subnet.subnet_id}", tags: []}
      options:
        service_ip: {type: string, required: true, default: "10.163.8.5",
                     note: "선택한 subnet cidr 내부의 빈 IP여야 한다 (PrivateLinkServiceCreateRequest.service_ip_address required) — 기본값은 gen-wave5 privatelink 체인의 subnet 10.163.8.0/24에 묶인 값"}
        connected_resource_ip: {type: string, required: false, default: "10.163.8.10",
                                note: "connected_resource_type=IP일 때의 대상 자원 IP — docs상 optional이나 IP 타입이면 사실상 필수로 추정 (UNPROVEN). LB 타입은 connected_resource_id(LB)가 필요해 의도적으로 IP 고정"}
    capture: {privatelink_service_id: "$.privatelink_service.id"}
    ready: {field: "$.privatelink_service.state", until: [ACTIVE],
            timeout: 300, interval: 10}
    verify:
      - {name: read, endpoint: "GET /v1/privatelink-services/{privatelink_service_id}",
         expect_status: [200]}
      - {name: read-list, endpoint: "GET /v1/privatelink-services",
         expect_status: [200]}
    delete: {endpoint: "DELETE /v1/privatelink-services/{privatelink_service_id}",
             destructive: true}
    provenance: docs
    source: {lifecycle: generated__wave5-appsvc,
             steps: [create-privatelink-service, wait-privatelink-service,
                     delete-privatelink-service]}
    notes: "UNPROVEN (docs DTO PrivateLinkServiceCreateRequest 그대로 — 라이브 2xx 미관측, R3 과제였던 privatelink-service 노드 신설). approval_type AUTO + connected_resource_type IP 조합이 LB/실서버 없이 자기완결로 만들 수 있는 최소 형태 — 엔드포인트 요청이 자동 승인되어 apigw/scf privatelink-endpoint 패밀리의 2xx 확률을 높인다. state enum CREATING/ACTIVE/DELETING/DELETED/ERROR (PrivateLinkServiceDetail). 과금 여부 미확인 — 라이프사이클 내 생성·즉시 삭제 전제."

  vpc-peering:
    code: "nw-vpc-peering"
    service: networking/vpc
    requires:
      - {ref: vpc, count: 2}
    create:
      endpoint: "POST /v1/vpc-peerings"
      body: {name: "regrpeer{unique}", description: "API regression vpc peering",
             requester_vpc_id: "{vpc.vpc_id}", approver_vpc_id: "{vpc.2.vpc_id}",
             tags: []}
    capture: {vpc_peering_id: "$.vpc_peering.id"}
    verify:
      - {name: approve,
         endpoint: "PUT /v1/vpc-peerings/{vpc_peering_id}/approval",
         json: {type: CREATE_APPROVE},
         expect_status: [200, 201, 202, 400]}
      - {name: read-routing-rules,
         endpoint: "GET /v1/vpc-peerings/{vpc_peering_id}/routing-rules",
         expect_status: [200]}
    delete: {endpoint: "DELETE /v1/vpc-peerings/{vpc_peering_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: vpc-peering,
             steps: [create-vpc-peering, approve-vpc-peering, delete-vpc-peering]}
    notes: "§1의 다중성 사례 (VPC 2개; composer가 vpc#2 인스턴스 + {vpc_id_2}를 배선). create 202 라이브 관측. 승인 body는 {type: CREATE_APPROVE}로 VALIDATED (구 {action: APPROVE}는 ValidationError로 CREATING 고착 → cap-poisoning 근원). 상태기계: 생성 직후 CREATING에서는 승인/수정/삭제가 400 — 소스 lifecycle은 승인 400 재시도 8회로 통과하므로 verify의 expect_status에 400 허용, 합성본에 재시도 정책을 옮기는 것은 R3 과제. approver_vpc_account_id는 소스에서 capture_soft($.vpc.account_id, envelope UNPROVEN)였고 동일 계정 페어링이라 생략 — 미검증 capture를 vpc 노드에 보태지 않기 위함."

  transit-gateway:
    code: "nw-vpc-tgw"
    service: networking/vpc
    requires: []
    create:
      endpoint: "POST /v1/transit-gateways"
      body: {name: "regrtgw{ualpha}", description: "API regression transit gateway",
             tags: []}
    capture: {transit_gateway_id: "$.transit_gateway.id"}
    ready: {field: "$.transit_gateway.state",
            until: [ACTIVE, CREATED, RUNNING, AVAILABLE], timeout: 300, interval: 15}
    verify:
      - {name: read-routing-rules,
         endpoint: "GET /v1/transit-gateways/{transit_gateway_id}/routing-rules",
         expect_status: [200]}
      - {name: read-vpc-connections,
         endpoint: "GET /v1/transit-gateways/{transit_gateway_id}/vpc-connections",
         expect_status: [200]}
    delete: {endpoint: "DELETE /v1/transit-gateways/{transit_gateway_id}",
             destructive: true}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-networking, steps: [tgw-create, tgw-wait, tgw-delete]}
