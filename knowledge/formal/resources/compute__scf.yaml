# Resource-task model — compute/scf (cp-scf group, Cloud Functions).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from
# compute-scf-cloud-function-cronjob-trigger (enabled, live-validated spine)
# and scf-privatelink-apigateway-coverage (coverage-only -> docs).
#
# docs-mapper enrichment (UNPROVEN, 2026-06-15) — userguide cites:
#   overview:       https://docs.e.samsungsdscloud.com/userguide/compute/cloud_functions/overview/
#   how_to_guides:  https://docs.e.samsungsdscloud.com/userguide/compute/cloud_functions/how_to_guides/
# docs facts: runtimes GO 1.21/1.23/1.25, Java 17, Node.js 18/20/22/24,
#   PHP 8.1/8.4/8.5, Python 3.9/3.10/3.11/3.14 (body runtime 'Node.js:20' valid);
#   regions kr-west1/kr-east1 only (kr-south* unavailable); EoTS runtime은 2026.7
#   이후 신규/수정 불가(기존 함수는 호출만 유지). Notes/comments only — no
#   requires/create/body/capture/delete shapes changed.
version: 1
resources:
  scf-function:
    code: "cp-scf-function"
    service: compute/scf
    requires: []
    create:
      endpoint: "POST /v1/cloud-functions"
      body: {name: "regrscf{unique}", runtime: "Node.js:20",
             content: "exports.handler = async () => ({ statusCode: 200, body: 'regr' });",
             tags: []}
    capture: {cloud_function_id: "$.id"}
    ready: {field: "$.cloud_function.state",
            until: [READY, RUNNING, ACTIVE, Running], timeout: 300, interval: 10}
    verify:
      # 함수 하위 read family — 모두 READ-ONLY (Deploying 뒤집기 없음), 함수
      # id만으로 주소화된다. gap_getid 일괄 폐쇄 (id-bound GET coverage).
      - {name: read-codes,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/codes",
         expect_status: [200]}
      - {name: read-configurations,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/configurations",
         expect_status: [200]}
      - {name: read-config,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/configurations/config",
         expect_status: [200]}
      - {name: read-environment-variables,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/configurations/environment-variables",
         expect_status: [200]}
      - {name: read-privatelink-endpoints,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/configurations/privatelink-endpoints",
         expect_status: [200]}
      - {name: read-privatelink-services,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/configurations/privatelink-services",
         expect_status: [200],
         note: "READ는 안전 — Creating 고착을 일으키는 것은 PUT enable뿐 (노드 노트)"}
      - {name: read-resource-policies,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/configurations/resource-policies",
         expect_status: [200]}
      - {name: read-url,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/configurations/url",
         expect_status: [200]}
      - {name: read-logs,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/logs?time=1h",
         expect_status: [200, 400],
         note: "run 27399448835: 'must select either time or period' — docs엔 전부 optional로 기재된 미문서 필수 (undiscoverable-params 클래스). time 포맷 1h 추정"}
      - {name: read-metrics,
         endpoint: "GET /v1/cloud-functions/{cloud_function_id}/metrics?time=1h",
         expect_status: [200, 400],
         note: "logs와 동일 — time 포맷 미문서"}
    delete: {endpoint: "DELETE /v1/cloud-functions/{cloud_function_id}",
             retry_on_status: [500, 409], retries: 6, retry_interval: 20,
             destructive: true}
    provenance: VALIDATED
    source: {lifecycle: compute-scf-cloud-function-cronjob-trigger,
             steps: [create, wait-ready, delete, wait-gone]}
    notes: "VPC-FREE standalone (선행 서비스 없음 — services constraint prereq-optional-only). kr-west1/kr-east1 전용 — 남부 리전 4xx는 entitlement (region-availability). 모든 config/code/trigger write가 상태를 Deploying으로 뒤집는다 — write 사이마다 READY 재폴링 필수 (소스는 그룹마다 wait-ready 전치; deploying-after-every-change quirk). privatelink-service를 켜면 Creating 고착으로 삭제가 CloudFunctionNotDeletableError 400 — teardown 전 PL enable 금지 (소스 run #5 교훈). 삭제는 409/500 재시도 6×20s + 404 폴링."

  scf-cronjob-trigger:
    code: "cp-scf-cronjob-trigger"
    service: compute/scf
    requires: [scf-function]
    create:
      endpoint: "POST /v1/triggers/cronjob"
      body: {cloud_function_id: "{scf-function.cloud_function_id}",
             schedule: "0 0 * * 0", timezone: "Asia/Seoul"}
    capture: {trigger_id: "$.triggers[0].trigger_id"}
    verify:
      - {name: read, endpoint: "GET /v1/triggers/{trigger_id}",
         expect_status: [200]}
    delete:
      endpoint: "DELETE /v1/triggers/{trigger_id}"
      # 라이브 400 (run 27417986669): "Trigger type must be 'apigateway' or
      # 'cron'" — 수작업본의 'cronjob'은 관대한 expect([..,400])에 가려 조용히
      # 400나고 있었음 (관대한 expect가 결함을 숨긴 사례)
      json: {cloud_function_id: "{scf-function.cloud_function_id}", trigger_type: "cron"}
      destructive: true
      # 소스 delete-trigger와 동일 body — body 없이는 400 (run 27401527554)
    provenance: VALIDATED
    source: {lifecycle: compute-scf-cloud-function-cronjob-trigger,
             steps: [create-trigger, delete-trigger]}
    notes: "CRONJOB 트리거 — apigateway/VPC 의존 없음 (apigateway 트리거는 scf-apigateway-trigger 노드가 cross-file requires로 모델). capture envelope $.triggers[0].trigger_id (ARRAY). schedule은 5-field cron, timezone은 tz name. 소스의 delete는 body {cloud_function_id, trigger_type: cronjob}를 best-guess로 보내며 400 허용 + 409/500 재시도 — 모델 delete 스키마는 body를 못 싣는다 (R3에서 합성기 동치 비교 시 확인). 함수가 Deploying이면 트리거 write 4xx — scf-function 노트의 READY 재폴링 시맨틱 적용."

  scf-privatelink-endpoint:
    code: "cp-scf-privatelink-endpoint"
    service: compute/scf
    requires: [scf-function, privatelink-service]
    create:
      endpoint: "POST /v1/cloud-functions/{scf-function.cloud_function_id}/configurations/privatelink-endpoints"
      body: {endpoint: {alias: "regrple{unique}",
                        service_id: "{privatelink-service.privatelink_service_id}"}}
    capture: {endpoint_id: "$.endpoint.endpoint_id"}
    delete: {endpoint: "DELETE /v1/cloud-functions/{scf-function.cloud_function_id}/configurations/privatelink-endpoints/{endpoint_id}",
             destructive: true}
    provenance: docs
    source: {lifecycle: generated__wave5-appsvc,
             steps: [create-scf-privatelink-endpoint, delete-scf-privatelink-endpoint]}
    notes: "UNPROVEN. R3 해소 (2026-06-13): 구 flat body {subnet_id, endpoint_service_id, name}는 docs DTO와 불일치 — 실제 PrivateLinkEndpointCreateRequest는 중첩 {endpoint: EndpointCreateRequest{alias, service_id}} (subnet 없음)라 verbatim으로 교체, service_id는 신설 networking privatelink-service 노드 ref로 배선. 응답 envelope $.endpoint.endpoint_id (PrivateLinkEndpoint{endpoint: Endpoint}) — docs 파생. request/approval/connection PUT({type} 단일 enum: CANCEL|RE_REQUEST / APPROVE|REJECT / DISCONNECT|RECONNECT)은 상태기계 의존 lifecycle 영역(gen-wave5 gated probes). 경고 유지: 함수의 privatelink-SERVICE enable(PUT .../privatelink-services {privatelink_service_enabled: true})은 함수를 Creating에 고착시켜 teardown을 막는다 — endpoint family만 모델링, service enable 금지(disable=false probe만 lifecycle에서). config write 후 READY 재폴링 시맨틱 적용. [docs-mapper UNPROVEN 2026-06-15, userguide how_to_guides '트리거 설정하기'/'Private 연결 구성']: PrivateLink는 '선택적 준비 서비스'로 PrivateLink Service와 연계하여 사용 — overview는 PL Service/API Gateway를 optional prereq로만 기술하고 endpoint create의 구체 제약/네이밍은 overview에 없음(detail은 'PrivateLink 서비스 연계하기' 하위로 defer). Deploying 상태에서는 함수의 트리거/구성 변경이 차단된다는 docs 진술이 'config write 후 READY 재폴링' 시맨틱을 뒷받침."

  scf-apigateway-trigger:
    code: "cp-scf-apigateway-trigger"
    service: compute/scf
    requires: [scf-function, apigw-api, apigw-deployment]
    create:
      endpoint: "POST /v1/triggers/apigateway"
      body: {apigateway_api_id: "{apigw-api.api_id}",
             apigateway_stage_name: dev,
             cloud_function_id: "{scf-function.cloud_function_id}"}
    capture: {trigger_id: "$.triggers[0].trigger_id"}
    verify:
      - {name: read, endpoint: "GET /v1/triggers/{trigger_id}",
         expect_status: [200]}
      - {name: read-list,
         endpoint: "GET /v1/triggers?cloud_function_id={scf-function.cloud_function_id}",
         expect_status: [200],
         note: "listcloudfunctiontriggers는 cloud_function_id query가 docs상 required — bare GET은 4xx 예상"}
    delete:
      endpoint: "DELETE /v1/triggers/{trigger_id}"
      # cronjob 트리거의 검증된 quirk 그대로 (run 27417986669): DELETE는
      # body {cloud_function_id, trigger_type}를 요구하고 trigger_type 리터럴은
      # "apigateway" 또는 "cron"만 유효
      json: {cloud_function_id: "{scf-function.cloud_function_id}",
             trigger_type: "apigateway"}
      destructive: true
    provenance: docs
    source: {lifecycle: generated__wave5-appsvc,
             steps: [create-apigateway-trigger, delete-apigateway-trigger]}
    notes: "UNPROVEN body (docs DTO ApigatewayTriggerCreateRequest verbatim — 구 coverage probe의 {api_gateway_id, resource_id, method_type, auth_type} 추측 body는 폐기). apigateway_api_id 패턴 ^[0-9a-f]{24}$ = apigw-api capture와 일치, apigateway_stage_name dev는 apigw-deployment(stage_type=new)가 만든 stage — cross-file requires (ske-cluster→filestorage-volume 패턴). 트리거 write 전 함수 READY 필수 (deploying-after-every-change quirk). capture envelope $.triggers[0].trigger_id는 cronjob 트리거와 동일 ARRAY envelope (TriggerCreateResponse). [docs-mapper UNPROVEN 2026-06-15, userguide how_to_guides '트리거 설정하기']: 함수는 Cronjob과 API Gateway 두 가지 트리거 메커니즘만 지원. Deploying 상태(함수 생성/코드(inline·JAR) 수정/트리거 추가·수정/구성 변경 중)에서는 트리거 수정 불가 — 트리거 write 전 READY 재폴링 필수의 docs 근거. Cronjob 경고: 함수 timeout 완료 전 cron이 재호출하면 nested execution으로 실행 횟수·시간 증가 → 고비용 발생 (cost/blast-radius 주의, cronjob 노드 schedule 0 0 * * 0 주1회는 이 위험 낮음)."
