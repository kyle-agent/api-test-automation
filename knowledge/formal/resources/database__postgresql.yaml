# Resource-task model — database/postgresql (db-postgresql group).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from
# database-postgresql-cluster (enabled+heavy; live-proven — the backup-histories
# /unset-backup 401 quirk was observed against a real RUNNING cluster, run
# 27258520218; cross-service.yaml postgresql-cluster is VALIDATED).
#
# PG body shape diverges from MySQL: database_encoding/database_locale instead
# of character_set/case_sensitive, audit_enabled is a BOOLEAN, and there is no
# service_watch_log_collection field (source body, kept verbatim).
#
# 2026-06-13 확장 (owner 승인 같은 날): replica 체인(동일 리전) ·
# restore · patch/kernel-upgrade · parameter/sg-rules/storage sub-op들.
# 액션 노드들은 container__ske.yaml의 ske-cluster-upgrade 패턴
# (create=동작 호출 + ready=RUNNING 재폴링, capture/delete 없음)을 따른다.
version: 1
resources:
  # 읽기 전용 LOOKUP — 소스 find-engine-version 스텝 verbatim (필터 객체
  # capture, contents[0]). postgresql-cluster의 engine_version_id 기본값.
  pg-engine-version:
    lookup: true
    code: "db-postgresql-engine-version"
    service: database/postgresql
    requires: []
    create:
      endpoint: "GET /v1/engine-versions"
    capture:
      engine_version_id: {list: "$.contents", get: "id"}
    verify:
      - {name: read, endpoint: "GET /v1/engine-versions", expect_status: [200]}
    provenance: VALIDATED
    source: {lifecycle: database-postgresql-cluster, steps: [find-engine-version]}
    notes: "EngineListResponse $.contents[] {id, major_version, name, software_version, end_of_service} (api_docs). contents[0] 순서는 미문서 — 최신이 먼저라는 보장 없음(소스 스텝과 동일한 선택). 16.x 고정이 필요한 업그레이드 체인은 별도 노드 pg-engine-version-16을 쓴다 (capture 누락 시 엔진이 step을 hard-fail 시키므로 분리 — 16.x EoS rot이 이 공용 lookup을 오염시키지 않게)."

  # 구버전(16.x) 전용 LOOKUP — kernel-upgrade/patch 체인에서만 ref 옵션으로
  # 끌려 들어온다. where_prefix는 엔진 _capture의 문자열-prefix 매칭.
  pg-engine-version-16:
    lookup: true
    code: "db-postgresql-engine-version-16"
    service: database/postgresql
    requires: []
    create:
      endpoint: "GET /v1/engine-versions"
    capture:
      engine_version_id_16:
        list: "$.contents"
        where_prefix: {major_version: "16"}
        get: "id"
    verify:
      - {name: read, endpoint: "GET /v1/engine-versions?eos_included=false",
         expect_status: [200]}
    provenance: docs
    notes: "Engine.major_version prefix '16' 필터 (라이브 현황 owner 2026-06-13: 17.6 최신, 16.10 가용). 16.x가 카탈로그에서 사라지면 capture가 None → 엔진 assert로 이 노드를 쓰는 lifecycle만 hard-fail (의도된 폭발 반경: gen-heavy-pg-upgrade). 버전 rot 시 이 필터를 재확인."

  # 읽기 전용 LOOKUP — 소스 find-server-type verbatim: 이름(NAME)을 캡처
  # (id 아님). ServerTypeListResponse $.contents[] {name, cpu_core, ...}.
  pg-server-type:
    lookup: true
    code: "db-postgresql-server-type"
    service: database/postgresql
    requires: []
    create:
      endpoint: "GET /v1/server-types"
    capture:
      db_server_type: {list: "$.contents", get: "name"}
    verify:
      - {name: read, endpoint: "GET /v1/server-types", expect_status: [200]}
    provenance: VALIDATED
    source: {lifecycle: database-postgresql-cluster, steps: [find-server-type]}
    notes: "postgresql 호스트의 /v1/server-types — compute server-type 노드와 별개 (DBaaS 전용 타입 목록, NAME으로 소비). contents[0] 선택은 소스와 동일."

  postgresql-cluster:
    code: "db-postgresql-cluster"
    service: database/postgresql
    heavy: true
    requires: [subnet, pg-engine-version, pg-server-type]
    create:
      endpoint: "POST /v1/clusters"
      body:
        name: "regrpg{ualpha}"
        instance_name_prefix: regrpg
        dbaas_engine_version_id: "{opt.engine_version_id}"
        ha_enabled: false
        nat_enabled: false
        subnet_id: "{subnet.subnet_id}"
        timezone: Asia/Seoul
        allowable_ip_addresses: []
        origin_cluster_id: ""
        vip_public_ip_id: ""
        virtual_ip_address: ""
        tags: []
        init_config_option:
          audit_enabled: false
          database_encoding: UTF-8
          database_locale: C
          database_name: regrpg
          database_port: 2866
          database_user_name: regruser
          database_user_password: "Regr1ss!2026Xy"
          backup_option:
            archive_frequency_minute: "60"
            retention_period_day: "7"
            starting_time_hour: "2"
        maintenance_option:
          period_hour: "5"
          starting_day_of_week: MON
          starting_time: "0000"
        instance_groups:
          - role_type: ACTIVE
            server_type_name: "{opt.server_type}"
            block_storage_groups:
              - {role_type: OS, size_gb: 104, volume_type: SSD}
            instances:
              - {role_type: ACTIVE, service_ip_address: "", public_ip_id: ""}
      options:
        engine_version_id: {type: string, required: true,
                            default: "{pg-engine-version.engine_version_id}",
                            note: "기본 = lookup contents[0] (소스 find-engine-version 패턴). 업그레이드 체인은 {pg-engine-version-16.engine_version_id_16}로 override + engine_version_16 ref 옵션 활성화 (owner 2026-06-13: 구버전 생성→업그레이드 전략, SKE 선례)"}
        server_type: {type: string, required: true,
                      default: "{pg-server-type.db_server_type}",
                      note: "기본 = lookup contents[0] NAME (id 아님; 소스 find-server-type 스텝)"}
        engine_version_16: {type: ref, target: pg-engine-version-16,
                            required: false,
                            note: "body 미사용 closure-puller — 값을 아무거나 주면 pg-engine-version-16 lookup이 선행 생성되어 engine_version_id override 토큰이 배선된다"}
    capture: {cluster_id: "$.resource.id"}
    ready: {field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    verify:
      - {name: read, endpoint: "GET /v1/clusters/{cluster_id}",
         expect_status: [200]}
      # setsecuritygrouprules — UpdateSecurityGroupRulesRequest는 add/del 둘 다
      # optional array (api_docs). 빈 목록 = 무변경 no-op (수작업 probe body
      # verbatim). 비동기 202 가능성 때문에 [200,202].
      - {name: setsecuritygrouprules,
         endpoint: "POST /v1/clusters/{cluster_id}/security-group-rules",
         json: {add_ip_addresses: ["10.10.10.10/32"], del_ip_addresses: []},
         expect_status: [200, 202]}
      - {name: read-after-sg, endpoint: "GET /v1/clusters/{cluster_id}",
         expect_status: [200]}
    delete: {endpoint: "DELETE /v1/clusters/{cluster_id}", destructive: true,
             retry_on_status: [400, 401, 409, 500, 503],
             retries: 20, retry_interval: 60}
    provenance: VALIDATED
    source: {lifecycle: database-postgresql-cluster,
             steps: [create-cluster, wait-cluster, delete-cluster]}
    notes: "HEAVY 과금 (~30-50분). 소스는 subnet adopt: subnet#db 공유. 비동기 쓰기 AsyncResponse {request_id, resource:{id}} — request_id는 생성 응답에서만 오고 수작업 lifecycle은 capture_soft '$.request_id'로 받아 showrequest GET /v1/requests/{request_id}를 optional로 찔렀다. 모델 capture는 노드 단위 hard/soft 전환만 가능해서(per-key soft 불가; capture_soft: true로 바꾸면 cluster_id까지 soft가 되어 replica/restore 노드를 먹일 수 없음 — composer 제약) showrequest는 모델화 SKIP, 수작업 lifecycle 잔존 커버리지로 남긴다. dbaas_parameter_group_id는 cluster detail DTO(PostgresqlClusterDetailResponse)에 없다 — GET /v1/parameter-groups lookup(pg-parameter-group 노드)에서만 발견 가능. delete 재시도 [400,401,409,500,503]×20×60s는 수작업 delete-cluster verbatim (PUT backup-histories / DELETE backups 401 quirk family와 같은 백엔드 auth/race quirk, services/database__postgresql.yaml). 알려진 quirk: PUT backup-histories / DELETE backups 401. requires는 body 소비 기준 subnet + lookup 2종 (cross-service 발산 경고 의도)."

  # detail-LOOKUP — 클러스터 상세에서 instance_group/block_storage_group id를
  # 캡처 (lookup-on-detail 패턴: capture는 create 응답에서만 가능하므로
  # create=GET detail). 소스 probe capture-subop-ids가 라이브 RUNNING
  # 클러스터에서 같은 envelope으로 캡처함 (run 27258520218).
  pg-instance-group:
    lookup: true
    code: "db-postgresql-instance-group"
    service: database/postgresql
    requires: [postgresql-cluster]
    create:
      endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}"
    capture:
      instance_group_id: "$.instance_groups[0].id"
      block_storage_group_id: "$.instance_groups[0].block_storage_groups[0].id"
    verify:
      - {name: detail-read,
         endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}",
         expect_status: [200]}
    provenance: VALIDATED
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [capture-subop-ids]}
    notes: "InstanceGroupResponse {id, block_storage_groups[].id, ...} (api_docs show DTO). addblockstorages/setblockstoragesize/setservertype 액션 노드들이 여기 매달린다."

  # 읽기 전용 LOOKUP — listparametergroups + listparameters 커버리지.
  # dbaas_parameter_group_id는 여기서만 발견 가능 (cluster detail에 없음).
  pg-parameter-group:
    lookup: true
    code: "db-postgresql-parameter-group"
    service: database/postgresql
    requires: []
    create:
      endpoint: "GET /v1/parameter-groups"
    capture:
      dbaas_parameter_group_id: {list: "$.contents", get: "id"}
    verify:
      # listparameters — dbaas_parameter_group_id는 REQUIRED query (api_docs)
      - {name: listparameters,
         endpoint: "GET /v1/parameters?dbaas_parameter_group_id={dbaas_parameter_group_id}&size=20&page=0",
         expect_status: [200]}
    provenance: docs
    source: {lifecycle: database-postgresql-cluster,
             steps: [list-parameter-groups, list-parameters]}
    notes: "ParameterGroupListResponse $.contents[] {id, major_version, name, ...}. contents[0]는 임의 메이저 버전 그룹일 수 있으나 listparameters 쿼리 검증에는 충분. major_version 쿼리는 optional."

  # detail-LOOKUP — 클러스터의 현재 파라미터에서 수정 가능한(is_modifiable)
  # 첫 항목의 id+applied_value를 캡처 → 같은 값으로 set (safe no-op write).
  pg-parameter:
    lookup: true
    code: "db-postgresql-parameter"
    service: database/postgresql
    requires: [postgresql-cluster]
    create:
      endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}/parameters"
    capture:
      param_id:
        list: "$.contents"
        where_prefix: {is_modifiable: "True"}
        get: "id"
      param_value:
        list: "$.contents"
        where_prefix: {is_modifiable: "True"}
        get: "applied_value"
    verify:
      # ParametersRequest {parameters: [ParameterRequest {id, new_value,
      #  old_value} 전부 REQUIRED]} (api_docs verbatim). 같은-값 set = no-op.
      - {name: setparametervalues,
         endpoint: "PUT /v1/clusters/{postgresql-cluster.cluster_id}/parameters",
         json: {parameters: [{id: "{param_id}", new_value: "{param_value}",
                              old_value: "{param_value}"}]},
         expect_status: [200, 202]}
      # syncparametervalues — body 없음. 409는 '적용할 변경 없음' (수작업
      # sync-parameters의 관용 expect에서 승계; same-value set 뒤라 가능성 높음)
      - {name: syncparametervalues,
         endpoint: "POST /v1/clusters/{postgresql-cluster.cluster_id}/parameters/sync",
         expect_status: [200, 202, 409]}
    provenance: docs
    source: {lifecycle: database-postgresql-cluster,
             steps: [set-parameters, sync-parameters]}
    notes: "create=GET listparametervalues (per-cluster) — ParametersResponse $.contents[] ParameterDTO {id, applied_value, is_modifiable, ...}. where_prefix 'True'는 엔진 _capture의 str(bool) prefix 매칭. applied_value가 빈 문자열인 항목이 첫 매치면 set이 400 날 수 있음 — 라이브 정제 예상."

  # ---- 액션 노드들 (SKE upgrade 패턴: create=호출, ready=RUNNING 재폴링,
  # ---- capture/delete 없음. async reconcile 경합 방지로 각자 재폴링) ------
  pg-add-block-storage:
    code: "db-postgresql-add-block-storage"
    service: database/postgresql
    heavy: true
    requires: [postgresql-cluster, pg-instance-group]
    create:
      endpoint: "POST /v1/instance-groups/{pg-instance-group.instance_group_id}/block-storage-groups"
      body: {role_type: DATA, size_gb: 104, volume_type: SSD}
    ready: {endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [add-block-storages]}
    notes: "AddBlockStoragesRequest {role_type REQ enum(OS,DATA,ARCHIVE,TEMP,BACKUP), size_gb REQ 16-5120, volume_type opt enum(SSD,...) default SSD} (api_docs verbatim). DATA 볼륨 추가는 비가역(제거 API 없음) — 합성 1회용 클러스터에서만. 클러스터 삭제로 회수."

  pg-resize-block-storage:
    code: "db-postgresql-resize-block-storage"
    service: database/postgresql
    heavy: true
    requires: [postgresql-cluster, pg-instance-group]
    create:
      endpoint: "POST /v1/block-storage-groups/{pg-instance-group.block_storage_group_id}/resize"
      body: {size_gb: 112}
    ready: {endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [resize-block-storage]}
    notes: "ResizeBlockStorageGroupRequest {size_gb REQ} (api_docs). 104→112 GB 증설 (수작업 body verbatim) — 축소 불가(비가역), 1회용 클러스터 전용."

  pg-resize-server-type:
    code: "db-postgresql-resize-server-type"
    service: database/postgresql
    heavy: true
    requires: [postgresql-cluster, pg-instance-group, pg-server-type]
    create:
      endpoint: "POST /v1/instance-groups/{pg-instance-group.instance_group_id}/resize"
      body: {server_type_name: "{opt.server_type}"}
      options:
        server_type: {type: string, required: true,
                      default: "{pg-server-type.db_server_type}",
                      note: "기본 = lookup contents[0] = 생성 시 타입과 동일할 가능성 — same-type resize가 400이면 합성 시 다른 타입 NAME으로 override (라이브 정제 예상)"}
    ready: {endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [resize-instance-group]}
    notes: "InstanceGroupResizeRequest {server_type_name REQ} (api_docs verbatim). composer create expect는 [200,201,202] 고정이라 same-type 400을 관용할 수 없음 — masked-defect 방지 차원에서 의도된 hard."

  # log-export — LogExportConfigCreateRequest의 access_key/secret_key는
  # 계정 자격(콘솔/IAM 발급)이라 모델 기본값 불가 → required 옵션 게이트.
  pg-log-export-config:
    code: "db-postgresql-log-export-config"
    service: database/postgresql
    requires: [postgresql-cluster]
    create:
      endpoint: "POST /v1/clusters/{postgresql-cluster.cluster_id}/log-export-configs"
      body:
        access_key: "{opt.access_key}"
        bucket_name: "{opt.bucket_name}"
        delete_on_export: false
        log_type: "{opt.log_type}"
        schedule_day_of_month: "28"
        schedule_day_of_week: MON
        schedule_frequency_type: DAY
        schedule_hour: "12"
        secret_key: "{opt.secret_key}"
      options:
        access_key: {type: string, required: true,
                     note: "OBS 접근 access key — 계정 자격, 기본값 없음(의도된 게이트). SCR docker probe처럼 SCP access key가 통하는지는 미검증"}
        secret_key: {type: string, required: true,
                     note: "OBS 접근 secret key — 계정 자격, 기본값 없음(의도된 게이트)"}
        bucket_name: {type: string, default: "apitest-logsink",
                      note: "공유 OBS 싱크 (워크플로가 보장; trails/network-logging과 동일 — owner). PG log export가 다른 버킷 요건이면 라이브 정제"}
        log_type: {type: string, default: "general",
                   note: "DTO Example은 'alert'; 수작업 probe는 'general' — string 자유형 (enum 아님, api_docs)"}
    delete: {endpoint: "DELETE /v1/clusters/{postgresql-cluster.cluster_id}/log-export-configs/{opt.log_type}",
             destructive: true}
    provenance: docs
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [register-log-export-config]}
    notes: "LogExportConfigCreateRequest 9필드 전부 REQUIRED (nullable이어도 키는 필수, api_docs verbatim): access_key, bucket_name, delete_on_export, log_type, schedule_day_of_month('^(-1|1-31)$'), schedule_day_of_week, schedule_frequency_type('DAY'), schedule_hour('0-23'), secret_key. userguide 확정 (2026-06-13, managing): 대상은 Object Storage Bucket — \"감사(Audit) 로그 중 장기 보관이 필요한 로그 데이터를 Object Storage로 내보낼 수 있도록 지원\", \"DB Log 내보내기 기능을 사용하기 위해서는 Object Storage 생성이 필요\", 인증키(Access/Secret key) 콘솔 필수 입력 + \"인증키가 만료될 경우, 로그가 Bucket에 저장되지 않습니다\". delete_on_export=false로 DB측 로그 보존. teardown = unregisterlogexportconfig DELETE .../log-export-configs/{log_type}."

  # ---- replica 체인 (owner 승인 2026-06-13, 동일 리전: "한 리전에서 가능하면
  # ---- 하고 안되면 이야기 해줘"). userguide 확정 (2026-06-13 WebFetch,
  # ---- userguide/database/postgresql/how_to_guides/readreplica/): 표준
  # ---- Replica는 동일 리전·동일 subnet (region/subnet 입력 자체가 없음,
  # ---- cross-region은 별도 Other Region 변형), DB당 최대 5개.
  # ---- 단 switchover는 replica 동작이 아니라 **HA(Active↔Standby) 전용**
  # ---- ("HA 구성된 경우에는 Switch-over를 통해 Active-Standby 서버를 전환할
  # ---- 수 있습니다") — ha_enabled:false인 본 모델 기본 클러스터에서는 제외.
  # ---- 실행 순서는 requires 엣지로 강제: replica → sync-replica-state →
  # ---- reset-replica → promote(비가역, 마지막) → teardown(replica 먼저) ----
  pg-replica:
    code: "db-postgresql-replica"
    service: database/postgresql
    heavy: true
    requires: [postgresql-cluster, pg-server-type]
    create:
      endpoint: "POST /v1/clusters/{postgresql-cluster.cluster_id}/replicas"
      body:
        allowable_ip_addresses: []
        replica_count: 1
        replicas:
          - name: "regrrep{ualpha}"
            instance_groups:
              - role_type: ACTIVE
                server_type_name: "{opt.server_type}"
                block_storage_groups:
                  - {role_type: DATA, size_gb: 104, volume_type: SSD}  # replica는 DATA만 허용 (run 27470602788; cluster는 OS로 작동)
                instances:
                  - {role_type: ACTIVE, service_ip_address: "", public_ip_id: ""}
        tags: []
      options:
        server_type: {type: string, required: true,
                      default: "{pg-server-type.db_server_type}",
                      note: "replica 인스턴스 그룹 타입 — origin과 동일 기본"}
      retry_on_status: [400, 409]
      retries: 12
      retry_interval: 60
    capture: {replica_cluster_id: "$.resource.id"}
    ready: {endpoint: "GET /v1/clusters/{replica_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    delete: {endpoint: "DELETE /v1/clusters/{replica_cluster_id}",
             destructive: true,
             retry_on_status: [400, 401, 409, 500, 503],
             retries: 20, retry_interval: 60}
    provenance: VALIDATED  # replica family live-proven — run 27472090705 (create/sync/reset/promote/teardown all green)
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [create-replica]}
    notes: "HEAVY — 두 번째 과금 클러스터. ReplicasCreateRequest verbatim (api_docs): allowable_ip_addresses REQ(nullable), replica_count REQ int, replicas REQ [{name REQ ^[a-z][a-z0-9\\-]*[a-z0-9]$ 3-20, instance_groups REQ}], maintenance_option/tags opt. replicas[].name = 복제 클러스터 이름이라 {ualpha}(소문자 a-p)로 패턴 충족. role_type ACTIVE는 probe 초안 승계 — 거부되면 REPLICA enum이 차순위 후보 (InstanceGroupRequest/InstanceRequest enum에 둘 다 존재). 응답 AsyncResponse $.resource.id = replica cluster id (ReplicaItem에는 id가 없어 create 응답이 유일한 출처). userguide 확정 (2026-06-13): 표준 Replica는 동일 리전·동일 subnet (입력 필드 없음 — origin 상속; cross-region은 replicas/other-region 별도), \"하나의 Database당 최대 5개\", storage 유형은 \"원본 DB에서 설정한 Storage 유형에 따라 동일하게 적용. 용량 설정은 불가\" — block_storage_groups가 무시되거나 OS 104GB 일치 필요 가능성 (라이브 정제). create 409 재시도는 직전 async 쓰기(sg-rules verify 등) reconcile 경합 대비."

  pg-sync-replica-state:
    code: "db-postgresql-sync-replica-state"
    service: database/postgresql
    heavy: true
    requires: [postgresql-cluster, pg-replica]
    create:
      endpoint: "POST /v1/clusters/{postgresql-cluster.cluster_id}/sync-replica-state"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 900, interval: 30}
    verify:
      - {name: replicas-list,
         endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}/replicas",
         expect_status: [200]}
    provenance: VALIDATED  # replica family live-proven — run 27472090705 (create/sync/reset/promote/teardown all green)
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [sync-replica-state]}
    notes: "path param은 ORIGIN cluster id ({origin_cluster_id}, api_docs). body 없음, 202 AsyncResponse. listreplicas verify로 replica_state 노출 확인 (ReplicaItem {name, replica_state, synced_at})."

  # HA 전용 — replica 체인에는 넣지 않는다 (userguide: "Switch Over: DB의
  # Active 서버와 Standby 서버를 바꿀 수 있습니다" — HA 구성 클러스터의
  # Active↔Standby 전환). 본 모델 기본 body는 ha_enabled:false라 합성
  # replica 체인에서 제외; HA 변형 클러스터가 모델링되면 그 체인에 합류.
  pg-switchover:
    code: "db-postgresql-switchover"
    service: database/postgresql
    heavy: true
    requires: [postgresql-cluster]
    create:
      endpoint: "POST /v1/clusters/{postgresql-cluster.cluster_id}/switchover"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [switchover-cluster]}
    notes: "userguide 확정 (2026-06-13): switchover는 HA(Active-Standby) 클러스터의 서버 전환 — replica 토폴로지 동작이 아님. ha_enabled:false 클러스터에서는 4xx 예상 → owner 승인 체인(switchover→switchover-back OR reset-replica)에서 reset-replica 분기를 채택하고 본 노드는 HA 변형 대기 게이트로 남긴다 (postgresql-cluster body가 ha_enabled true + ACTIVE_STANDBY instance_groups 변형을 갖출 때까지 합성 제외). path param cluster_id = 해당 HA 클러스터 자신."

  pg-reset-replica:
    code: "db-postgresql-reset-replica"
    service: database/postgresql
    heavy: true
    requires: [pg-replica, pg-sync-replica-state]
    create:
      endpoint: "POST /v1/clusters/{pg-replica.replica_cluster_id}/reset-replica"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{pg-replica.replica_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: VALIDATED  # replica family live-proven — run 27472090705 (create/sync/reset/promote/teardown all green)
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [reset-replica]}
    notes: "Replica 재구성 — userguide: \"네트워크 장애 혹은 Master Cluster와의 Replication 지연이 발생하는 경우, Replica 재구성 기능을 통해 Master Cluster의 데이터를 다시 복제할 수 있습니다\" (콘솔에서 replica 자원 선택 후 수행). path param replica_cluster_id = REPLICA role 클러스터 (api_docs/CLI 확정). 건강한 replica에 대한 재구성은 전체 재복제라 ready 재폴링 1800s. body 없음, 202."

  # 비가역 — replica를 독립 클러스터로 승격(Master 승격). requires 엣지로
  # 체인 '마지막' 강제 (teardown 직전). 승격 후 둘 다 삭제.
  pg-promote:
    code: "db-postgresql-promote"
    service: database/postgresql
    heavy: true
    requires: [pg-replica, pg-reset-replica]
    create:
      endpoint: "POST /v1/clusters/{pg-replica.replica_cluster_id}/promote"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{pg-replica.replica_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: VALIDATED  # replica family live-proven — run 27472090705 (create/sync/reset/promote/teardown all green)
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [promote-replica]}
    notes: "IRREVERSIBLE — userguide: \"Master 승격 시, 기존 Master Cluster와 동기화가 중단됩니다\" (재접속 경로 없음, 새 replica 생성만 가능). 1회용 합성 클러스터에서만; requires로 reset-replica 이후 '마지막' 보장. 승격 뒤 origin과 (전)replica 둘 다 teardown으로 삭제 (interval-scheduled: replica delete가 origin delete보다 먼저). CLI promotereplicacluster의 param cluster_id = replica id."

  # restore — 백업으로부터 새 클러스터 생성. backup_history_number/
  # backup_recovery_time 생략 시 최신 백업 기준 추정 (api_docs 둘 다 optional).
  pg-restore:
    code: "db-postgresql-restore"
    service: database/postgresql
    heavy: true
    requires: [postgresql-cluster, pg-server-type]
    create:
      endpoint: "POST /v1/clusters/{postgresql-cluster.cluster_id}/restore"
      body:
        name: "regrrst{ualpha}"
        instance_name_prefix: regrrst
        server_type_name: "{opt.server_type}"
        allowable_ip_addresses: []
        tags: []
      options:
        server_type: {type: string, required: true,
                      default: "{pg-server-type.db_server_type}",
                      note: "ClusterRestoreRequest.server_type_name REQUIRED — origin과 동일 기본"}
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    capture: {restore_cluster_id: "$.resource.id"}
    ready: {endpoint: "GET /v1/clusters/{restore_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    delete: {endpoint: "DELETE /v1/clusters/{restore_cluster_id}",
             destructive: true,
             retry_on_status: [400, 401, 409, 500, 503],
             retries: 20, retry_interval: 60}
    provenance: docs
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [create-restore]}
    notes: "HEAVY — 백업 기반 새 과금 클러스터. ClusterRestoreRequest verbatim (api_docs): name REQ ^[a-zA-Z]*$ 3-20, instance_name_prefix REQ, server_type_name REQ; backup_history_number/backup_recovery_time/block_storage_groups/maintenance_option/tags optional. userguide 확정 (2026-06-13, backupandrestore): ① 백업은 즉시가 아니라 예약 수행 — \"백업을 설정한 경우에는 설정한 시간 이후 지정된 시간에 백업이 수행되며\" (시작 '시'만 선택, 분은 랜덤); ② 복구 유형 2종 = '백업 시점(권장)' (backup_history_number, listbackuphistories에서 선택) / '사용자 지정 시점' PITR (backup_recovery_time) — PITR 가능 범위는 \"최초 백업 시작 시점부터\" 현재-archive주기 이전까지, 즉 **완료된 첫 백업이 선행 필수**; ③ \"신규 서버가 생성되고\" = 새 클러스터 (subnet/region 입력 없음, origin 네트워크 상속); ④ DATA 디스크 용량 이상 여유 필요, storage 유형은 원본과 동일 강제. 따라서 생성 직후(full 백업 02시 예약, proven body) 즉시 restore는 백업 부재로 실패 — 별도 윈도우 필요 (gen-heavy-pg-restore enabled:false 게이트). 둘 다 생략 시 동작(최신 백업? 400?)은 미문서 — 라이브 정제. 응답 AsyncResponse $.resource.id = 신규 클러스터 id."

  # ---- patch / kernel-upgrade (owner 2026-06-13: 구버전 16.x 생성 후 업그레이드
  # ---- 전략 — postgresql-cluster의 engine_version_16 ref 옵션으로 게이트) ----
  pg-patch:
    code: "db-postgresql-patch"
    service: database/postgresql
    heavy: true
    requires: [postgresql-cluster]
    create:
      endpoint: "PUT /v1/clusters/{postgresql-cluster.cluster_id}/patch"
      body:
        backup_before_upgrade: false
        software_version: "{opt.target_software_version}"
      options:
        target_software_version: {type: string, required: true,
                                  note: "패치 대상 마이너 버전 — 기본값 없음(의도된 게이트): 클러스터의 현재 마이너보다 높아야 하며, engine-versions 목록이 메이저당 최신 마이너만 노출하면(라이브 16.10/17.6) 생성 직후 패치 대상이 없을 수 있다. 합성 시 명시"}
    ready: {endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 3600, interval: 60}
    provenance: docs
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [patch-minor-version]}
    notes: "MinorPatchRequest {backup_before_upgrade REQ bool, software_version REQ string} (api_docs verbatim). userguide 확정 (2026-06-13, managing): \"동일한 Major 버전 내에서 Minor 버전 업그레이드 기능만 지원합니다\" — 16.x→17.x는 불가; \"서비스 상태 동기화를 통해 서비스 상태를 먼저 조회한 후\" 수행 권고 (sync-state 선행); replica 구성 시 \"Master DB 버전이 Replica 버전보다 높을 수 없습니다\" (replica 먼저 패치); backup_before_upgrade=true의 사전 백업은 \"버전 업그레이드 완료 후에 자동으로 삭제\". backup_before_upgrade=false: 1회용 클러스터라 사전 백업 불요(+완료 백업 미존재 시 true가 막힐 리스크 회피). 라이브 16.10/17.6이 메이저당 최신 마이너만이면 패치 대상 마이너가 없어 게이트 유지. IRREVERSIBLE 마이너 롤."

  pg-kernel-upgrade:
    code: "db-postgresql-kernel-upgrade"
    service: database/postgresql
    heavy: true
    requires: [postgresql-cluster]
    create:
      endpoint: "PUT /v1/clusters/{postgresql-cluster.cluster_id}/kernel-upgrade"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{postgresql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 3600, interval: 60}
    provenance: docs
    source: {lifecycle: postgresql-cluster-subops-guarded,
             steps: [upgrade-kernel]}
    notes: "body 없음 (api_docs — upgradekernel). OS Kernel 업그레이드 — userguide (2026-06-13, managing): \"OS 업그레이드가 진행되는 동안 서비스가 중단됩니다\", \"업그레이드가 실패할 경우 이전 구성으로 원복\", \"업그레이드 완료 후 기존 OS로 복구할 수 없습니다\" (성공 시 IRREVERSIBLE). 전제: cluster detail v1.1의 is_kernel_patchable=true (구버전 이미지일 때만 의미 — owner 전략: 16.x 생성 후 업그레이드; postgresql-cluster options.engine_version_16 + engine_version_id override로 구성). 최신 16.10 이미지가 이미 최신 커널이면 4xx 예상 — composer create expect [200,201,202] 고정이라 hard-fail로 드러난다 (라이브 정제 예상)."
