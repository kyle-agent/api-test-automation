# Resource-task model — database/mysql (db-mysql group).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from database-mysql-cluster
# (enabled+heavy; live-proven — cluster reached RUNNING and the unset-backup 401
# quirk was observed against the real cluster, run 27258520218 / 2026-06-10;
# cross-service.yaml mysql-cluster is VALIDATED).
#
# The vpc/subnet steps of the source lifecycle are NOT re-modeled here — they
# are the networking__vpc.yaml nodes; the composer wires {subnet.subnet_id}.
#
# 2026-06-13 확장 — database__postgresql.yaml 레퍼런스 패턴 미러링 (replica
# 체인 · restore · patch/kernel-upgrade · parameter/sg-rules/storage sub-op ·
# lookup 노드들; PG owner 승인 2026-06-13이 replica/restore에 이전 적용).
# mysql 전용 추가 면: start/stop/restart(액션 노드), archive PUT + archive/sync
# POST, sync-state POST — 클러스터 verify로 폴딩 (setter들이 heavy 클러스터를
# 필요로 해서 별도 light 체인 대신 replica 체인이 함께 행사). 검증된 create
# body는 VERBATIM 유지 (mysql: character_set/case_sensitive +
# service_watch_log_collection, audit_enabled는 빈 문자열 — PG형과 다름).
version: 1
resources:
  # 읽기 전용 LOOKUP — 소스 find-engine-version 스텝 verbatim (contents[0]).
  # mysql-cluster의 engine_version_id 기본값. PG pg-engine-version 미러.
  mysql-engine-version:
    code: "db-mysql-engine-version"
    service: database/mysql
    requires: []
    create:
      endpoint: "GET /v1/engine-versions"
    capture:
      engine_version_id: {list: "$.contents", get: "id"}
    verify:
      - {name: read, endpoint: "GET /v1/engine-versions", expect_status: [200]}
    provenance: VALIDATED
    source: {lifecycle: database-mysql-cluster, steps: [find-engine-version]}
    notes: "EngineListResponse $.contents[] {id, major_version, name, software_version, end_of_service} (api_docs — PG와 동일 DTO). contents[0] 순서 미문서(최신 보장 없음, 소스 스텝과 동일 선택). 구버전 고정이 필요한 업그레이드 체인은 mysql-engine-version-8을 쓴다 (PG pg-engine-version-16 분리 패턴: 버전 rot이 공용 lookup을 오염시키지 않게)."

  # 구버전 전용 LOOKUP — kernel-upgrade/patch 체인에서만 ref 옵션으로 끌려
  # 들어온다. PG pg-engine-version-16 미러 — 단 mysql 라이브 구버전 유무는
  # owner 미확인 (PG만 16.10/17.6 확인됨) → 이 노드를 쓰는 체인은 합성만
  # 해두고 비활성 (_disabled_reason "owner가 콘솔에서 엔진 구버전 유무 확인 대기").
  mysql-engine-version-8:
    code: "db-mysql-engine-version-8"
    service: database/mysql
    requires: []
    create:
      endpoint: "GET /v1/engine-versions"
    capture:
      engine_version_id_8:
        list: "$.contents"
        where_prefix: {major_version: "8.0"}
        get: "id"
    verify:
      - {name: read, endpoint: "GET /v1/engine-versions?eos_included=false",
         expect_status: [200]}
    provenance: docs
    notes: "Engine.major_version prefix '8.0' 필터 — MySQL 메이저 표기 추정 (8.0 vs 8.4; api_docs Example 공란, 라이브 카탈로그 owner 미확인). 8.0이 유일/최신 메이저면 '구버전 생성→업그레이드' 전략이 성립하지 않으므로 owner 콘솔 확인 후 prefix 재조정 (의도된 폭발 반경: gen-heavy-mysql-upgrade — capture None이면 엔진 assert로 그 체인만 hard-fail)."

  # 읽기 전용 LOOKUP — 소스 find-server-type verbatim: 이름(NAME) 캡처 (id
  # 아님). PG pg-server-type 미러.
  mysql-server-type:
    code: "db-mysql-server-type"
    service: database/mysql
    requires: []
    create:
      endpoint: "GET /v1/server-types"
    capture:
      db_server_type: {list: "$.contents", get: "name"}
    verify:
      - {name: read, endpoint: "GET /v1/server-types", expect_status: [200]}
    provenance: VALIDATED
    source: {lifecycle: database-mysql-cluster, steps: [find-server-type]}
    notes: "mysql 호스트의 /v1/server-types — compute server-type 노드와 별개 (DBaaS 전용 타입 목록, NAME으로 소비). contents[0] 선택은 소스와 동일."

  mysql-cluster:
    code: "db-mysql-cluster"
    service: database/mysql
    heavy: true
    requires: [subnet, mysql-engine-version, mysql-server-type]
    create:
      endpoint: "POST /v1/clusters"
      body:
        name: "regrdb{ualpha}"
        instance_name_prefix: regrdb
        dbaas_engine_version_id: "{opt.engine_version_id}"
        ha_enabled: false
        nat_enabled: false
        service_watch_log_collection: true
        subnet_id: "{subnet.subnet_id}"
        timezone: Asia/Seoul
        allowable_ip_addresses: []
        origin_cluster_id: ""
        vip_public_ip_id: ""
        virtual_ip_address: ""
        tags: []
        init_config_option:
          audit_enabled: ""
          database_case_sensitive: false
          database_character_set: utf8mb4
          database_name: regrdb
          database_port: 2866
          database_user_name: regruser
          database_user_password: "Regr1ss!2026Xy"
          backup_option:
            archive_frequency_minute: "60"
            retention_period_day: "7"
            starting_time_hour: "2"
        maintenance_option:
          period_hour: "5"
          starting_day_of_week: MON
          starting_time: "0000"
        instance_groups:
          - role_type: ACTIVE
            server_type_name: "{opt.server_type}"
            block_storage_groups:
              - {role_type: OS, size_gb: 104, volume_type: SSD}
            instances:
              - {role_type: ACTIVE, service_ip_address: "", public_ip_id: ""}
      options:
        engine_version_id: {type: string, required: true,
                            default: "{mysql-engine-version.engine_version_id}",
                            note: "기본 = lookup contents[0] (소스 find-engine-version 패턴). 업그레이드 체인은 {mysql-engine-version-8.engine_version_id_8}로 override + engine_version_8 ref 옵션 활성화 (PG 전략 미러; owner 구버전 확인 대기)"}
        server_type: {type: string, required: true,
                      default: "{mysql-server-type.db_server_type}",
                      note: "기본 = lookup contents[0] NAME (id 아님; 소스 find-server-type 스텝)"}
        engine_version_8: {type: ref, target: mysql-engine-version-8,
                           required: false,
                           note: "body 미사용 closure-puller — 값을 아무거나 주면 mysql-engine-version-8 lookup이 선행 생성되어 engine_version_id override 토큰이 배선된다 (PG engine_version_16 패턴)"}
    capture: {cluster_id: "$.resource.id"}
    ready: {field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    verify:
      - {name: read, endpoint: "GET /v1/clusters/{cluster_id}",
         expect_status: [200]}
      # setsecuritygrouprules — UpdateSecurityGroupRulesRequest add/del 둘 다
      # optional array (api_docs, PG와 동일 DTO). 빈 목록 = 무변경 no-op.
      - {name: setsecuritygrouprules,
         endpoint: "POST /v1/clusters/{cluster_id}/security-group-rules",
         json: {add_ip_addresses: [], del_ip_addresses: []},
         expect_status: [200, 202]}
      - {name: read-after-sg, endpoint: "GET /v1/clusters/{cluster_id}",
         expect_status: [200]}
      # ---- mysql 폴딩 setter 면 (PG 미러에 추가; heavy 클러스터가 필요해
      # ---- 별도 light 체인 대신 여기서 행사) -------------------------------
      # showarchiveconfig — 404 관용은 소스 verify-backup-config verbatim
      # (생성 직후 archive 미존재 가능).
      - {name: showarchiveconfig,
         endpoint: "GET /v1/clusters/{cluster_id}/archive",
         expect_status: [200, 404]}
      # setarchiveconfig — ArchiveConfigSetRequest {archive_enabled REQ bool,
      # retention_period_day opt int default 1} (api_docs verbatim). body는
      # subops-guarded set-archive probe 초안 verbatim (mariadb/epas와 공유).
      - {name: setarchiveconfig,
         endpoint: "PUT /v1/clusters/{cluster_id}/archive",
         json: {archive_enabled: true, retention_period_day: 1},
         expect_status: [200, 202]}
      # syncarchiveconfig — body 없음, 202 AsyncResponse. 409는 '적용할 변경
      # 없음' 관용 (PG sync-parameters 관용 idiom 승계).
      - {name: syncarchiveconfig,
         endpoint: "POST /v1/clusters/{cluster_id}/archive/sync",
         expect_status: [200, 202, 409]}
      # syncclusterstate — 소스 sync-cluster-state expect [200,201,202,409]
      # verbatim (409 관용 라이브 idiom). setter 뒤 상태 재동기화로 마지막.
      - {name: syncclusterstate,
         endpoint: "POST /v1/clusters/{cluster_id}/sync-state",
         expect_status: [200, 201, 202, 409]}
    delete: {endpoint: "DELETE /v1/clusters/{cluster_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: database-mysql-cluster,
             steps: [create-cluster, wait-cluster, delete-cluster]}
    notes: "HEAVY 과금 (~20-40분, 단일노드 ha_enabled:false). service_ip_address는 빈 문자열로 플랫폼 자동 할당(고정 IP는 충돌/예약 위험 — 소스 _note). 소스는 subnet을 adopt: subnet#db로 공유 — 합성기 adopt 최적화 대상. 비동기 쓰기는 AsyncResponse {request_id, resource:{id}}: request_id는 capture_soft로만 (envelope docs-derived; GET /v1/requests/{request_id}의 유일한 키) — PG와 동일한 composer 제약(per-key soft 불가)으로 showrequest는 모델화 SKIP, 수작업 lifecycle 잔존 커버리지로 남긴다. set-maintenance/set-backup/set-parameters(name/value형)는 수작업 database-mysql-cluster가 라이브로 검증한 잔존 커버리지 — 모델 폴딩은 task 범위(archive/sync-state)만. dbaas_parameter_group_id는 cluster detail DTO에 없다 — GET /v1/parameter-groups lookup(mysql-parameter-group)에서만 발견 가능. 삭제는 소스에서 cleanup 등록 + 클러스터 종료가 느림(자식 비동기) — vpc/subnet teardown에 409 재시도 필요. 알려진 quirk: DELETE /v1/clusters/{id}/backups 간헐 401 (백엔드 auth quirk family, services/database__mysql.yaml). requires는 body 소비 기준 subnet + lookup 2종 (cross-service 발산 경고 의도, PG와 동일)."

  # detail-LOOKUP — 클러스터 상세에서 instance_group/block_storage_group id
  # 캡처 (lookup-on-detail 패턴: capture는 create 응답에서만 가능하므로
  # create=GET detail). PG pg-instance-group 미러.
  mysql-instance-group:
    code: "db-mysql-instance-group"
    service: database/mysql
    requires: [mysql-cluster]
    create:
      endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}"
    capture:
      instance_group_id: "$.instance_groups[0].id"
      block_storage_group_id: "$.instance_groups[0].block_storage_groups[0].id"
    verify:
      - {name: detail-read,
         endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
         expect_status: [200]}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded,
             steps: [capture-subop-ids]}
    notes: "InstanceGroupResponse {id, block_storage_groups[].id, ...} (api_docs show DTO — PG와 동일 envelope; PG는 run 27258520218에서 라이브 캡처). mysql guarded probe는 instance_group_id만 캡처했고 block_storage_group_id jsonpath는 docs 미러 — 라이브 정제 예상. addblockstorages/setblockstoragesize/setservertype 액션 노드들이 여기 매달린다."

  # 읽기 전용 LOOKUP — listparametergroups + listparameters 커버리지.
  # dbaas_parameter_group_id는 여기서만 발견 가능 (cluster detail에 없음;
  # services/database__mysql.yaml list-parameters-needs-group-id).
  mysql-parameter-group:
    code: "db-mysql-parameter-group"
    service: database/mysql
    requires: []
    create:
      endpoint: "GET /v1/parameter-groups"
    capture:
      dbaas_parameter_group_id: {list: "$.contents", get: "id"}
    verify:
      # listparameters — dbaas_parameter_group_id는 REQUIRED query (api_docs)
      - {name: listparameters,
         endpoint: "GET /v1/parameters?dbaas_parameter_group_id={dbaas_parameter_group_id}&size=20&page=0",
         expect_status: [200]}
    provenance: docs
    source: {lifecycle: database-mysql-cluster,
             steps: [list-parameter-groups, list-parameters]}
    notes: "ParameterGroupListResponse $.contents[] {id, major_version, name, ...} (PG와 동일 DTO). contents[0]는 임의 메이저 그룹일 수 있으나 listparameters 쿼리 검증에는 충분. 소스 스텝들은 optional이라 라이브 2xx 기록 없음 → docs."

  # detail-LOOKUP — 클러스터의 현재 파라미터에서 수정 가능한(is_modifiable)
  # 첫 항목의 id+applied_value를 캡처 → 같은 값으로 set (safe no-op write).
  # PG pg-parameter 미러.
  mysql-parameter:
    code: "db-mysql-parameter"
    service: database/mysql
    requires: [mysql-cluster]
    create:
      endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}/parameters"
    capture:
      param_id:
        list: "$.contents"
        where_prefix: {is_modifiable: "True"}
        get: "id"
      param_value:
        list: "$.contents"
        where_prefix: {is_modifiable: "True"}
        get: "applied_value"
    verify:
      # ParametersRequest {parameters: [ParameterRequest {id, new_value,
      #  old_value} 전부 REQUIRED]} (api_docs verbatim). 같은-값 set = no-op.
      - {name: setparametervalues,
         endpoint: "PUT /v1/clusters/{mysql-cluster.cluster_id}/parameters",
         json: {parameters: [{id: "{param_id}", new_value: "{param_value}",
                              old_value: "{param_value}"}]},
         expect_status: [200, 202]}
      - {name: syncparametervalues,
         endpoint: "POST /v1/clusters/{mysql-cluster.cluster_id}/parameters/sync",
         expect_status: [200, 202, 409]}
    provenance: docs
    source: {lifecycle: database-mysql-cluster,
             steps: [list-parameter-values-before, set-parameter-values,
                     verify-parameter-values]}
    notes: "create=GET listparametervalues — ParametersResponse $.contents[] {id, applied_value, is_modifiable, ...}. 주의: 수작업 set-parameter-values는 {parameters:[{name:'max_connections', value:'256'}]} (name/value형)로 라이브 2xx를 받았다 — api_docs DTO(id/new_value/old_value)와 불일치하는 검증된 변형. 모델은 PG 미러로 docs DTO + 같은-값 set을 따른다 (값 고정 없는 safe no-op); docs DTO가 라이브에서 거부되면 name/value형이 검증된 차순위. where_prefix 'True'는 엔진 _capture의 str(bool) prefix 매칭."

  # ---- 액션 노드들 (SKE upgrade 패턴: create=호출, ready=재폴링,
  # ---- capture/delete 없음) — PG 미러 ------------------------------------
  mysql-add-block-storage:
    code: "db-mysql-add-block-storage"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster, mysql-instance-group]
    create:
      endpoint: "POST /v1/instance-groups/{mysql-instance-group.instance_group_id}/block-storage-groups"
      body: {role_type: DATA, size_gb: 104, volume_type: SSD}
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded,
             steps: [add-block-storages]}
    notes: "AddBlockStoragesRequest {role_type REQ enum(OS,DATA,ARCHIVE,TEMP,BACKUP), size_gb REQ 16-5120, volume_type opt default SSD} (api_docs verbatim — PG와 동일 DTO). DATA 볼륨 추가는 비가역(제거 API 없음) — 1회용 클러스터 전용, 클러스터 삭제로 회수."

  mysql-resize-block-storage:
    code: "db-mysql-resize-block-storage"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster, mysql-instance-group]
    create:
      endpoint: "POST /v1/block-storage-groups/{mysql-instance-group.block_storage_group_id}/resize"
      body: {size_gb: 112}
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    notes: "ResizeBlockStorageGroupRequest {size_gb REQ} (api_docs — PG와 동일 DTO). 104→112 GB 증설 (PG 수작업 body verbatim) — 축소 불가(비가역), 1회용 클러스터 전용. mysql guarded probe에는 이 스텝이 없어 source 생략 (mariadb/epas guarded resize-block-storage와 동일 면)."

  mysql-resize-server-type:
    code: "db-mysql-resize-server-type"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster, mysql-instance-group, mysql-server-type]
    create:
      endpoint: "POST /v1/instance-groups/{mysql-instance-group.instance_group_id}/resize"
      body: {server_type_name: "{opt.server_type}"}
      options:
        server_type: {type: string, required: true,
                      default: "{mysql-server-type.db_server_type}",
                      note: "기본 = lookup contents[0] = 생성 시 타입과 동일할 가능성 — same-type resize가 400이면 합성 시 다른 타입 NAME으로 override (라이브 정제 예상; PG와 동일 주의)"}
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    notes: "InstanceGroupResizeRequest {server_type_name REQ} (api_docs verbatim — PG와 동일 DTO). composer create expect [200,201,202] 고정이라 same-type 400은 hard — masked-defect 방지 의도. mysql guarded probe에 resize-instance-group 스텝이 없어 source 생략."

  # log-export — access_key/secret_key는 계정 자격(콘솔/IAM 발급)이라 모델
  # 기본값 불가 → required 옵션 게이트. PG pg-log-export-config 미러.
  mysql-log-export-config:
    code: "db-mysql-log-export-config"
    service: database/mysql
    requires: [mysql-cluster]
    create:
      endpoint: "POST /v1/clusters/{mysql-cluster.cluster_id}/log-export-configs"
      body:
        access_key: "{opt.access_key}"
        bucket_name: "{opt.bucket_name}"
        delete_on_export: false
        log_type: "{opt.log_type}"
        schedule_day_of_month: "28"
        schedule_day_of_week: MON
        schedule_frequency_type: DAY
        schedule_hour: "12"
        secret_key: "{opt.secret_key}"
      options:
        access_key: {type: string, required: true,
                     note: "OBS 접근 access key — 계정 자격, 기본값 없음(의도된 게이트)"}
        secret_key: {type: string, required: true,
                     note: "OBS 접근 secret key — 계정 자격, 기본값 없음(의도된 게이트)"}
        bucket_name: {type: string, default: "apitest-logsink",
                      note: "공유 OBS 싱크 (워크플로가 보장; trails/network-logging과 동일 — owner). 엔진별 버킷 요건 다르면 라이브 정제"}
        log_type: {type: string, default: "general",
                   note: "DTO Example은 'alert'; PG 수작업 probe는 'general' — string 자유형 (enum 아님, api_docs)"}
    delete: {endpoint: "DELETE /v1/clusters/{mysql-cluster.cluster_id}/log-export-configs/{opt.log_type}",
             destructive: true}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded,
             steps: [register-log-export-config]}
    notes: "LogExportConfigCreateRequest 9필드 전부 REQUIRED (nullable이어도 키는 필수, api_docs verbatim — PG와 동일 DTO). PG userguide 확정(2026-06-13)을 준용: 대상은 Object Storage Bucket, 인증키 만료 시 적재 중단. delete_on_export=false로 DB측 로그 보존. teardown = unregisterlogexportconfig DELETE .../log-export-configs/{log_type}."

  # ---- start/stop/restart (mysql 전용 추가 면; PG 모델에는 없음) ----------
  # 상태 전이 동작이라 verify 폴딩 대신 액션 노드 (SKE 패턴 + 재폴링).
  # stop→start→restart 순서를 requires 엣지로 강제. replica 체인에는 합성하지
  # 않는다 — origin 정지 중 replica 생성/동기화 경합 회피 (별도 윈도우용).
  mysql-stop:
    code: "db-mysql-stop"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster]
    create:
      endpoint: "POST /v1/clusters/{mysql-cluster.cluster_id}/stop"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [STOPPED],
            timeout: 1800, interval: 30}
    provenance: docs
    notes: "body 없음, 202 AsyncResponse (api_docs). ready until STOPPED는 docs 추정 (DBaaS service_state enum 미문서 — 라이브 정제 예상; mariadb/epas guarded probe stop-cluster는 무폴링 wide-expect라 증거 없음). 정지 중 과금 정책 미확인 — 1회용 클러스터 전용."

  mysql-start:
    code: "db-mysql-start"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster, mysql-stop]
    create:
      endpoint: "POST /v1/clusters/{mysql-cluster.cluster_id}/start"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    notes: "body 없음, 202 (api_docs). requires 엣지로 stop 이후 보장 — RUNNING 클러스터에 start는 4xx 예상."

  mysql-restart:
    code: "db-mysql-restart"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster, mysql-start]
    create:
      endpoint: "POST /v1/clusters/{mysql-cluster.cluster_id}/restart"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: database-mysql-cluster, steps: [restart-cluster]}
    notes: "body 없음, 202 (api_docs). 수작업 restart-cluster 스텝은 optional이라 2xx 기록 불확실 → docs. requires 엣지로 start 이후 (stop→start→restart 풀 사이클)."

  # ---- replica 체인 (PG owner 승인 2026-06-13 이전 적용, 동일 리전) --------
  # 실행 순서는 requires 엣지로 강제: replica → sync-replica-state →
  # reset-replica → promote(비가역, 마지막) → teardown(replica 먼저).
  mysql-replica:
    code: "db-mysql-replica"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster, mysql-server-type]
    create:
      endpoint: "POST /v1/clusters/{mysql-cluster.cluster_id}/replicas"
      body:
        allowable_ip_addresses: []
        replica_count: 1
        replicas:
          - name: "regrdbrep{ualpha}"
            instance_groups:
              - role_type: ACTIVE
                server_type_name: "{opt.server_type}"
                block_storage_groups:
                  - {role_type: OS, size_gb: 104, volume_type: SSD}
                instances:
                  - {role_type: ACTIVE, service_ip_address: "", public_ip_id: ""}
        tags: []
      options:
        server_type: {type: string, required: true,
                      default: "{mysql-server-type.db_server_type}",
                      note: "replica 인스턴스 그룹 타입 — origin과 동일 기본"}
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    capture: {replica_cluster_id: "$.resource.id"}
    ready: {endpoint: "GET /v1/clusters/{replica_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    delete: {endpoint: "DELETE /v1/clusters/{replica_cluster_id}",
             destructive: true,
             retry_on_status: [400, 401, 409, 500, 503],
             retries: 20, retry_interval: 60}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded, steps: [create-replica]}
    notes: "HEAVY — 두 번째 과금 클러스터. ReplicasCreateRequest verbatim (api_docs — PG와 동일 DTO): allowable_ip_addresses REQ(nullable), replica_count REQ int, replicas REQ [{name REQ ^[a-z][a-z0-9-]*[a-z0-9]$ 3-20, instance_groups REQ}]. instances에 service_ip_address 포함은 mysql 검증 본체 instance 형 미러. 응답 AsyncResponse $.resource.id = replica cluster id (PG 근거 준용). PG userguide 확정 준용: 표준 Replica 동일 리전·동일 subnet(origin 상속), DB당 최대 5개, storage 유형 원본 강제. create 409 재시도는 직전 async setter verify(archive/sync-state 등) reconcile 경합 대비 — mysql은 폴딩 setter가 PG보다 많아 재시도 예산 8×30s 소진 시 라이브 정제. delete 재시도 스택은 PG 수작업 delete-cluster verbatim 승계 (backup 401 quirk family 공유 백엔드)."

  mysql-sync-replica-state:
    code: "db-mysql-sync-replica-state"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster, mysql-replica]
    create:
      endpoint: "POST /v1/clusters/{mysql-cluster.cluster_id}/sync-replica-state"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 900, interval: 30}
    verify:
      - {name: replicas-list,
         endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}/replicas",
         expect_status: [200]}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded,
             steps: [sync-replica-state]}
    notes: "path param은 ORIGIN cluster id ({origin_cluster_id}, api_docs). body 없음, 202 AsyncResponse. listreplicas verify로 replica_state 노출 확인 (ReplicaItem {name, replica_state, synced_at} — PG와 동일 DTO)."

  # HA 전용 — replica 체인에는 넣지 않는다 (PG userguide 확정 준용: switchover
  # 는 HA Active↔Standby 전환). 검증 본체 ha_enabled:false라 합성 제외 게이트.
  mysql-switchover:
    code: "db-mysql-switchover"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster]
    create:
      endpoint: "POST /v1/clusters/{mysql-cluster.cluster_id}/switchover"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded, steps: [switchover-cluster]}
    notes: "PG userguide 확정(2026-06-13) 준용: switchover는 HA(Active-Standby) 클러스터의 서버 전환 — replica 토폴로지 동작 아님. ha_enabled:false 본체에서는 4xx 예상 → HA 변형 클러스터가 모델링될 때까지 합성 제외 게이트."

  mysql-reset-replica:
    code: "db-mysql-reset-replica"
    service: database/mysql
    heavy: true
    requires: [mysql-replica, mysql-sync-replica-state]
    create:
      endpoint: "POST /v1/clusters/{mysql-replica.replica_cluster_id}/reset-replica"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mysql-replica.replica_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded, steps: [reset-replica]}
    notes: "Replica 재구성 — path param replica_cluster_id = REPLICA role 클러스터 (api_docs). 건강한 replica 재구성은 전체 재복제라 ready 1800s. body 없음, 202. PG userguide 근거 준용."

  # 비가역 — replica를 독립 클러스터로 승격. requires 엣지로 체인 '마지막'
  # 강제 (teardown 직전). 승격 후 둘 다 삭제.
  mysql-promote:
    code: "db-mysql-promote"
    service: database/mysql
    heavy: true
    requires: [mysql-replica, mysql-reset-replica]
    create:
      endpoint: "POST /v1/clusters/{mysql-replica.replica_cluster_id}/promote"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mysql-replica.replica_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded,
             steps: [promote-replica-cluster]}
    notes: "IRREVERSIBLE — 승격 시 기존 Master와 동기화 중단 (PG userguide 준용; 재접속 경로 없음). 1회용 합성 클러스터 전용; requires로 reset-replica 이후 '마지막' 보장. 승격 뒤 origin과 (전)replica 둘 다 teardown 삭제 (interval-scheduled: replica delete가 origin delete보다 먼저)."

  # restore — 백업으로부터 새 클러스터 생성. 합성은 backup-timing 게이트로
  # 비활성 (PG와 동일: 백업은 예약 수행이라 생성 직후 restore 대상 없음).
  mysql-restore:
    code: "db-mysql-restore"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster, mysql-server-type]
    create:
      endpoint: "POST /v1/clusters/{mysql-cluster.cluster_id}/restore"
      body:
        name: "regrdbrst{ualpha}"
        instance_name_prefix: regrdbrst
        server_type_name: "{opt.server_type}"
        allowable_ip_addresses: []
        tags: []
      options:
        server_type: {type: string, required: true,
                      default: "{mysql-server-type.db_server_type}",
                      note: "ClusterRestoreRequest.server_type_name REQUIRED — origin과 동일 기본"}
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    capture: {restore_cluster_id: "$.resource.id"}
    ready: {endpoint: "GET /v1/clusters/{restore_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    delete: {endpoint: "DELETE /v1/clusters/{restore_cluster_id}",
             destructive: true,
             retry_on_status: [400, 401, 409, 500, 503],
             retries: 20, retry_interval: 60}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded, steps: [create-restore]}
    notes: "HEAVY — 백업 기반 새 과금 클러스터. ClusterRestoreRequest verbatim (api_docs — PG와 동일 DTO): name REQ ^[a-zA-Z]*$ 3-20, instance_name_prefix REQ, server_type_name REQ; backup_history_number/backup_recovery_time optional (둘 다 생략 시 동작 미문서). PG userguide 확정 준용: 백업은 예약 수행(02시 full), PITR 윈도우는 첫 완료 백업부터 — 생성 직후 restore는 실패 예상 (gen-heavy-mysql-restore enabled:false 게이트). 응답 AsyncResponse $.resource.id = 신규 클러스터 id."

  # ---- patch / kernel-upgrade (owner의 PG 전략 미러 — mysql 구버전 라이브
  # ---- 유무 미확인이라 합성 체인은 비활성 게이트) --------------------------
  mysql-patch:
    code: "db-mysql-patch"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster]
    create:
      endpoint: "PUT /v1/clusters/{mysql-cluster.cluster_id}/patch"
      body:
        backup_before_upgrade: false
        software_version: "{opt.target_software_version}"
      options:
        target_software_version: {type: string, required: true,
                                  note: "패치 대상 마이너 버전 — 기본값 없음(의도된 게이트): 현재 마이너보다 높아야 하며 engine-versions가 메이저당 최신만 노출하면 생성 직후 대상이 없을 수 있다. 합성 시 명시"}
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 3600, interval: 60}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded, steps: [patch-minor-version]}
    notes: "MinorPatchRequest {backup_before_upgrade REQ bool, software_version REQ string} (api_docs verbatim — PG와 동일 DTO). PG userguide 준용: 동일 메이저 내 마이너 업그레이드만; replica 구성 시 replica 먼저 패치. backup_before_upgrade=false: 1회용 클러스터 + 완료 백업 미존재 시 true가 막힐 리스크 회피. IRREVERSIBLE 마이너 롤."

  mysql-kernel-upgrade:
    code: "db-mysql-kernel-upgrade"
    service: database/mysql
    heavy: true
    requires: [mysql-cluster]
    create:
      endpoint: "PUT /v1/clusters/{mysql-cluster.cluster_id}/kernel-upgrade"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mysql-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 3600, interval: 60}
    provenance: docs
    source: {lifecycle: mysql-cluster-subops-guarded, steps: [upgrade-kernel]}
    notes: "body 없음 (api_docs — upgradekernel). OS Kernel 업그레이드 — PG userguide 준용: 진행 중 서비스 중단, 실패 시 원복, 성공 시 IRREVERSIBLE. 전제: is_kernel_patchable=true (구버전 이미지일 때만 의미). mysql 구버전 라이브 유무 owner 미확인 → gen-heavy-mysql-upgrade는 'owner가 콘솔에서 엔진 구버전 유무 확인 대기'로 비활성."
