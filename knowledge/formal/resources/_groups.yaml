# Resource-task model groups (contract C1, docs/RESOURCE-MODEL-PLAN.md §2.5/§3)
# — service bundles for the Planning UI and bundle composition.
#
# Code convention: <cat>-<group>-<resource> (e.g. nw-vpc-subnet). Group keys are
# the first TWO segments (<cat>-<group>), so a node belongs to the group named
# by its `group:` field or its code prefix (nw-vpc-subnet -> nw-vpc).
# Category abbreviations (fixed — reuse on fan-out):
#   nw=networking  cp=compute  st=storage  db=database  sec=security
#   mg=management  ct=container  ai=ai-ml  da=data-analytics
#   ap=application-service  dt=devops-tools  fm=financial-management
version: 1
groups:
  "nw-vpc": {label: "네트워크 — VPC 묶음 (vpc/subnet/gateway/endpoint/peering)", category: networking}
  "nw-sg": {label: "네트워크 — Security Group", category: networking}
  "nw-lb": {label: "네트워크 — Load Balancer 체인", category: networking}
  "nw-dns": {label: "네트워크 — Private DNS", category: networking}
  "nw-dc": {label: "네트워크 — Direct Connect", category: networking}
  "cp-vs": {label: "컴퓨트 — Virtual Server 묶음 (keypair/server/volume/image/asg)", category: compute}
  "cp-scf": {label: "컴퓨트 — Cloud Functions", category: compute}
  "cp-bm": {label: "컴퓨트 — Bare Metal Server", category: compute}
  "cp-gpu": {label: "컴퓨트 — Multi-node GPU Cluster", category: compute}
  "ct-ske": {label: "컨테이너 — Kubernetes Engine (cluster/nodepool)", category: container}
  "ct-scr": {label: "컨테이너 — Container Registry (registry/repository/image/tag)", category: container}
  "st-fs": {label: "스토리지 — File Storage", category: storage}
  "sec-kms": {label: "보안 — KMS (transit key)", category: security}
  "sec-cert": {label: "보안 — Certificate Manager", category: security}
  "sec-sm": {label: "보안 — Secrets Manager", category: security}
  "sec-sv": {label: "보안 — Secret Vault", category: security}
  "sec-ci": {label: "보안 — Config Inspection", category: security}
  "mg-iam": {label: "관리 — IAM (group/policy/role/credentials)", category: management}
  "mg-idc": {label: "관리 — IAM Identity Center (SSO)", category: management}
  "mg-org": {label: "관리 — Organization (계정 계층)", category: management}
  "mg-cc": {label: "관리 — Cloud Control (landing zone)", category: management}
  "mg-cm": {label: "관리 — Cloud Monitoring", category: management}
  "mg-la": {label: "관리 — Logging & Audit (trail)", category: management}
  "mg-nl": {label: "관리 — Network Logging", category: management}
  "mg-rm": {label: "관리 — Resource Manager", category: management}
  "mg-sw": {label: "관리 — ServiceWatch (logs/alerts/dashboards)", category: management}
