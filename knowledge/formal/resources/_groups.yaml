# Resource-task model groups (contract C1, docs/RESOURCE-MODEL-PLAN.md §2.5/§3)
# — service bundles for the Planning UI and bundle composition.
#
# Code convention: <cat>-<group>-<resource> (e.g. nw-vpc-subnet). Group keys are
# the first TWO segments (<cat>-<group>), so a node belongs to the group named
# by its `group:` field or its code prefix (nw-vpc-subnet -> nw-vpc).
# Category abbreviations (fixed — reuse on fan-out):
#   nw=networking  cp=compute  st=storage  db=database  sec=security
#   mg=management  ct=container  ai=ai-ml  da=data-analytics
version: 1
groups:
  "nw-vpc": {label: "네트워크 — VPC 묶음 (vpc/subnet/gateway/endpoint/peering)", category: networking}
  "nw-sg": {label: "네트워크 — Security Group", category: networking}
  "nw-lb": {label: "네트워크 — Load Balancer 체인", category: networking}
  "nw-dns": {label: "네트워크 — Private DNS", category: networking}
  "nw-dc": {label: "네트워크 — Direct Connect", category: networking}
  "st-fs": {label: "스토리지 — File Storage (volume/snapshot/schedule/replication)", category: storage}
  "st-pfs": {label: "스토리지 — Parallel File Storage (volume/snapshot)", category: storage}
  "st-bs": {label: "스토리지 — Baremetal Block Storage (volume/group/snapshot)", category: storage}
  "st-backup": {label: "스토리지 — Backup (agent/policy)", category: storage}
  "st-as": {label: "스토리지 — Archive Storage (영구 제외: 전용 인증키 미발급)", category: storage}
  "db-mysql": {label: "데이터베이스 — MySQL DBaaS 클러스터", category: database}
  "db-postgresql": {label: "데이터베이스 — PostgreSQL DBaaS 클러스터", category: database}
  "db-mariadb": {label: "데이터베이스 — MariaDB DBaaS 클러스터", category: database}
  "db-epas": {label: "데이터베이스 — EPAS DBaaS 클러스터", category: database}
  "db-sqlserver": {label: "데이터베이스 — SQL Server DBaaS 클러스터 (라이선스 필요)", category: database}
  "db-cache": {label: "데이터베이스 — CacheStore (Redis) DBaaS 클러스터", category: database}
