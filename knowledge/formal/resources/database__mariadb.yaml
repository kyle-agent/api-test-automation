# Resource-task model вҖ” database/mariadb (db-mariadb group).
# Schema: docs/RESOURCE-MODEL-PLAN.md В§1 В· extracted from the maria-* leg of
# heavy-shared-dbaas (enabled+heavy; live-proven вҖ” run e3ba190 observed the
# real mariadb cluster created and then taking ~90min to vanish on delete,
# which is the recorded basis for the shared lifecycle's slimmed -gone polls).
# The mariadb-cluster-subops-guarded lifecycle creates nothing (soft-captures
# an existing cluster) and contributes step-shape sources here (bodies UNPROVEN).
#
# 2026-06-13 нҷ•мһҘ вҖ” database__postgresql.yaml л ҲнҚјлҹ°мҠӨ нҢЁн„ҙ лҜёлҹ¬л§Ғ (replica
# мІҙмқё В· restore В· patch/kernel-upgrade В· parameter/sg-rules/storage sub-op В·
# lookup л…ёл“ңл“Ө; PG owner мҠ№мқё 2026-06-13мқҙ replica/restoreм—җ мқҙм „ м Ғмҡ©).
# mariadb м „мҡ© м¶”к°Җ л©ҙ: start/stop/restart(м•Ўм…ҳ л…ёл“ң), archive PUT +
# archive/sync POST, sync-state POST, setbackup POST, setmaintenance
# POST+DELETE, setauditlog PUT вҖ” setterл“ӨмқҖ нҒҙлҹ¬мҠӨн„° verifyлЎң нҸҙл”© (heavy
# нҒҙлҹ¬мҠӨн„° н•„мҡ” вҶ’ replica мІҙмқёмқҙ н•Ёк»ҳ н–үмӮ¬). setter bodyл“ӨмқҖ mysql мҲҳмһ‘м—…
# database-mysql-cluster мІҙмқём—җм„ң кІҖмҰқлҗң нҳ•мқ„ verbatim мқҙм „ (мқҙ м—”м§„м—җм„ңлҠ”
# лҜёкІҖмҰқ вҶ’ provenance docs). кІҖмҰқлҗң create bodyлҠ” VERBATIM мң м§Җ (mariadb:
# instancesм—җ service_ip_address м—ҶмқҢ, character_set utf8).
version: 1
resources:
  # мқҪкё° м „мҡ© LOOKUP вҖ” мҶҢмҠӨ maria-find-version мҠӨн…қ verbatim (contents[0]).
  mariadb-engine-version:
    code: "db-mariadb-engine-version"
    service: database/mariadb
    requires: []
    create:
      endpoint: "GET /v1/engine-versions"
    capture:
      engine_version_id: {list: "$.contents", get: "id"}
    verify:
      - {name: read, endpoint: "GET /v1/engine-versions", expect_status: [200]}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-dbaas, steps: [maria-find-version]}
    notes: "EngineListResponse $.contents[] (api_docs вҖ” PGмҷҖ лҸҷмқј DTO). мҶҢмҠӨ мҠӨн…қмқҖ optionalмқҙм§Җл§Ң run e3ba190м—җм„ң нҒҙлҹ¬мҠӨн„° мғқм„ұм—җ maria_verлҘј кіөкёүн–ҲмңјлҜҖлЎң лқјмқҙлёҢ нҶөкіј нҷ•м •. contents[0] мҲңм„ң лҜёл¬ём„ң. кө¬лІ„м „ кі м • м—…к·ёл Ҳмқҙл“ң мІҙмқёмқҖ mariadb-engine-version-10 л¶„лҰ¬ л…ёл“ң (PG -16 нҢЁн„ҙ)."

  # кө¬лІ„м „ м „мҡ© LOOKUP вҖ” PG pg-engine-version-16 лҜёлҹ¬. mariadb лқјмқҙлёҢ кө¬лІ„м „
  # мң л¬ҙ owner лҜёнҷ•мқё вҶ’ мқҙ л…ёл“ңлҘј м“°лҠ” мІҙмқёмқҖ н•©м„ұл§Ң н•ҙл‘җкі  л№„нҷңм„ұ.
  mariadb-engine-version-10:
    code: "db-mariadb-engine-version-10"
    service: database/mariadb
    requires: []
    create:
      endpoint: "GET /v1/engine-versions"
    capture:
      engine_version_id_10:
        list: "$.contents"
        where_prefix: {major_version: "10"}
        get: "id"
    verify:
      - {name: read, endpoint: "GET /v1/engine-versions?eos_included=false",
         expect_status: [200]}
    provenance: docs
    notes: "Engine.major_version prefix '10' н•„н„° вҖ” MariaDB л©”мқҙм Җ н‘ңкё° м¶”м • (10.x vs 11.x; api_docs Example кіөлһҖ, лқјмқҙлёҢ м№ҙнғҲлЎңк·ё owner лҜёнҷ•мқё). 10.xк°Җ мң мқј/мөңмӢ  л©”мқҙм Җл©ҙ кө¬лІ„м „ м „лһө л¶Ҳм„ұлҰҪ вҖ” owner мҪҳмҶ” нҷ•мқё нӣ„ prefix мһ¬мЎ°м • (мқҳлҸ„лҗң нҸӯл°ң л°ҳкІҪ: gen-heavy-mariadb-upgrade)."

  # мқҪкё° м „мҡ© LOOKUP вҖ” мҶҢмҠӨ maria-find-stype verbatim: NAME мәЎмІҳ (id м•„лӢҳ).
  mariadb-server-type:
    code: "db-mariadb-server-type"
    service: database/mariadb
    requires: []
    create:
      endpoint: "GET /v1/server-types"
    capture:
      db_server_type: {list: "$.contents", get: "name"}
    verify:
      - {name: read, endpoint: "GET /v1/server-types", expect_status: [200]}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-dbaas, steps: [maria-find-stype]}
    notes: "mariadb нҳёмҠӨнҠёмқҳ /v1/server-types вҖ” DBaaS м „мҡ© нғҖмһ… лӘ©лЎқ, NAMEмңјлЎң мҶҢл№„. run e3ba190 нҒҙлҹ¬мҠӨн„° мғқм„ұм—җ maria_stype кіөкёүмңјлЎң лқјмқҙлёҢ нҶөкіј нҷ•м •."

  mariadb-cluster:
    code: "db-mariadb-cluster"
    service: database/mariadb
    heavy: true
    requires: [subnet, mariadb-engine-version, mariadb-server-type]
    create:
      endpoint: "POST /v1/clusters"
      body:
        name: "regrm{ualpha}"
        instance_name_prefix: regrm
        dbaas_engine_version_id: "{opt.engine_version_id}"
        ha_enabled: false
        nat_enabled: false
        service_watch_log_collection: true
        subnet_id: "{subnet.subnet_id}"
        timezone: Asia/Seoul
        allowable_ip_addresses: []
        origin_cluster_id: ""
        vip_public_ip_id: ""
        virtual_ip_address: ""
        tags: []
        init_config_option:
          audit_enabled: false
          database_character_set: utf8
          database_name: regrmaria
          database_port: 2866
          database_user_name: regruser
          database_user_password: "Regr1ss@2026"
          backup_option:
            archive_frequency_minute: "60"
            retention_period_day: "7"
            starting_time_hour: "2"
        maintenance_option:
          period_hour: "5"
          starting_day_of_week: MON
          starting_time: "0000"
        instance_groups:
          - role_type: ACTIVE
            server_type_name: "{opt.server_type}"
            block_storage_groups:
              - {role_type: OS, size_gb: 104, volume_type: SSD}
            instances:
              - {role_type: ACTIVE, public_ip_id: ""}
      options:
        engine_version_id: {type: string, required: true,
                            default: "{mariadb-engine-version.engine_version_id}",
                            note: "кё°ліё = lookup contents[0] (мҶҢмҠӨ maria-find-version нҢЁн„ҙ). м—…к·ёл Ҳмқҙл“ң мІҙмқёмқҖ {mariadb-engine-version-10.engine_version_id_10}лЎң override + engine_version_10 ref мҳөм…ҳ нҷңм„ұнҷ” (PG м „лһө лҜёлҹ¬; owner кө¬лІ„м „ нҷ•мқё лҢҖкё°)"}
        server_type: {type: string, required: true,
                      default: "{mariadb-server-type.db_server_type}",
                      note: "кё°ліё = lookup contents[0] NAME (id м•„лӢҳ; мҶҢмҠӨ maria-find-stype мҠӨн…қ)"}
        engine_version_10: {type: ref, target: mariadb-engine-version-10,
                            required: false,
                            note: "body лҜёмӮ¬мҡ© closure-puller вҖ” к°’мқ„ м•„л¬ҙкұ°лӮҳ мЈјл©ҙ mariadb-engine-version-10 lookupмқҙ м„ н–ү мғқм„ұлҗҳм–ҙ engine_version_id override нҶ нҒ°мқҙ л°°м„ лҗңлӢӨ (PG engine_version_16 нҢЁн„ҙ)"}
    capture: {cluster_id: "$.resource.id"}
    ready: {field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    verify:
      - {name: read, endpoint: "GET /v1/clusters/{cluster_id}",
         expect_status: [200]}
      # setsecuritygrouprules вҖ” add/del л‘ҳ лӢӨ optional array (api_docs, PGмҷҖ
      # лҸҷмқј DTO). л№Ҳ лӘ©лЎқ = л¬ҙліҖкІҪ no-op.
      - {name: setsecuritygrouprules,
         endpoint: "POST /v1/clusters/{cluster_id}/security-group-rules",
         json: {add_ip_addresses: ["10.10.10.10/32"], del_ip_addresses: []},
         expect_status: [200, 202]}
      - {name: read-after-sg, endpoint: "GET /v1/clusters/{cluster_id}",
         expect_status: [200]}
      # ---- mariadb нҸҙл”© setter л©ҙ (PG лҜёлҹ¬м—җ м¶”к°Җ) -------------------------
      # showarchiveconfig вҖ” 404 кҙҖмҡ©мқҖ mysql verify-backup-config verbatim.
      - {name: showarchiveconfig,
         endpoint: "GET /v1/clusters/{cluster_id}/archive",
         expect_status: [200, 404],
         retry_on_status: [400, 409], retries: 10, retry_interval: 30}
      # setarchiveconfig вҖ” ArchiveConfigSetRequest {archive_enabled REQ bool,
      # retention_period_day opt default 1} (api_docs verbatim). bodyлҠ”
      # subops-guarded set-archive probe мҙҲм•Ҳ verbatim.
      - {name: setarchiveconfig,
         endpoint: "PUT /v1/clusters/{cluster_id}/archive",
         json: {archive_enabled: true, retention_period_day: 1},
         expect_status: [200, 202],
         retry_on_status: [400, 409], retries: 10, retry_interval: 30}
      - {name: syncarchiveconfig,
         endpoint: "POST /v1/clusters/{cluster_id}/archive/sync",
         expect_status: [200, 202, 409],
         retry_on_status: [400, 409], retries: 10, retry_interval: 30}
      # setbackup вҖ” BackupSettingRequest 3н•„л“ң м „л¶Җ REQUIRED (api_docs
      # verbatim: archive_frequency_minute ^(5|10|30|60)$, retention 7-35,
      # hour 0-23). bodyлҠ” mysql мҲҳмһ‘м—… set-backup verbatim мқҙм „.
      - {name: setbackup,
         endpoint: "POST /v1/clusters/{cluster_id}/backups",
         json: {archive_frequency_minute: "30", retention_period_day: "8",
                starting_time_hour: "3"},
         expect_status: [200, 202],
         retry_on_status: [400, 409], retries: 10, retry_interval: 30}
      # setauditlog вҖ” AuditLogRequest {use_audit_log REQ bool} (api_docs
      # verbatim; mariadb/epas/pgм—җл§Ң мһҲлҠ” op вҖ” mysql м№ҙнғҲлЎңк·ём—җ м—ҶмқҢ).
      # мғқм„ұ body audit_enabled:falseм—җм„ң мјңлҠ” мӢӨліҖкІҪ вҖ” 1нҡҢмҡ© нҒҙлҹ¬мҠӨн„° н—Ҳмҡ©.
      - {name: setauditlog,
         endpoint: "PUT /v1/clusters/{cluster_id}/audit-log",
         json: {use_audit_log: true},
         expect_status: [200, 202],
         retry_on_status: [400, 409], retries: 10, retry_interval: 30}
      # setmaintenance вҖ” MaintenanceRequest 4н•„л“ң м „л¶Җ REQUIRED (api_docs
      # verbatim). bodyлҠ” mysql мҲҳмһ‘м—… set-maintenance лқјмқҙлёҢ-2xx verbatim
      # мқҙм „ (run 27258520218 non-optional нҶөкіј).
      - {name: setmaintenance,
         endpoint: "POST /v1/clusters/{cluster_id}/maintenance",
         json: {start_day_of_week: SUN, start_minute: "00",
                start_time: "03", term_hour: "4"},
         expect_status: [200, 202],
         retry_on_status: [400, 409], retries: 10, retry_interval: 30}
      # unsetmaintenance вҖ” body м—ҶмқҢ (mysql мҲҳмһ‘м—… unset-maintenance expect
      # verbatim). set м§Ғнӣ„ н•ҙм ң: 1нҡҢмҡ© нҒҙлҹ¬мҠӨн„°лқј мңҲлҸ„мҡ° л¶Җмһ¬ л¬ҙн•ҙ.
      - {name: unsetmaintenance,
         endpoint: "DELETE /v1/clusters/{cluster_id}/maintenance",
         expect_status: [200, 202, 204],
         retry_on_status: [400, 409], retries: 10, retry_interval: 30}
      # syncclusterstate вҖ” mysql мҲҳмһ‘м—… sync-cluster-state expect verbatim
      # (409 = ліҖкІҪ м—ҶмқҢ кҙҖмҡ©). setterл“Ө л’Ө мғҒнғң мһ¬лҸҷкё°нҷ”лЎң л§Ҳм§Җл§ү.
      - {name: syncclusterstate,
         endpoint: "POST /v1/clusters/{cluster_id}/sync-state",
         expect_status: [200, 201, 202, 409],
         retry_on_status: [400, 409], retries: 10, retry_interval: 30}
    delete: {endpoint: "DELETE /v1/clusters/{cluster_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-dbaas,
             steps: [maria-create, maria-wait, maria-delete]}
    notes: "HEAVY кіјкёҲ. capture ліҖмҲҳлҠ” мҶҢмҠӨмқҳ maria_cidлҘј л…ёл“ң н‘ңмӨҖ cluster_idлЎң к°ңлӘ…(кіөмң  lifecycleмқҳ м¶©лҸҢнҡҢн”ј лӘ…лӘ… вҖ” envelope $.resource.id лҸҷмқј). мҶҢмҠӨ bodyлҠ” instancesм—җ service_ip_addressк°Җ м—ҶлӢӨ(мһҗлҸҷ н• лӢ№; mysql/pg н‘ңмӨҖнҳ•кіјмқҳ м°Ёмқҙ) вҖ” verbatim мң м§Җ. мӮӯм ңк°Җ л§Өмҡ° лҠҗлҰј: run e3ba190м—җм„ң мҶҢл©ёк№Ңм§Җ ~90л¶„ вҖ” кё°мЎҙ delete мӢңл§ЁнӢұ мң м§Җ(мһ¬мӢңлҸ„ мҠӨнғқ м¶”к°Җ м•Ҳ н•Ё): -gone нҸҙмқҖ 900s мәЎ + мһ”м—¬лҠ” subnet мӮӯм ң 409 мһ¬мӢңлҸ„лЎң нқЎмҲҳ(мҶҢмҠӨ _note); н•©м„ұ teardownмқҖ composer кё°ліё(мқҳмЎҙ л…ёл“ң мһҲлҠ” deleteм—җ 409Г—40Г—30s)м—җ л§ЎкёҙлӢӨ вҖ” 90л¶„ drainмқҙ к·ё мҳҲмӮ°(20л¶„)мқ„ л„ҳмңјл©ҙ cleanup нҢЁмҠӨк°Җ л°ұмҠӨнҶұ (лқјмқҙлёҢ м •м ң мҳҲмғҒ). нҸҙл”© setter bodyл“ӨмқҖ mysql мІҙмқё кІҖмҰқнҳ• мқҙм „мқҙм§Җл§Ң mariadbм—җм„ңлҠ” лҜёкІҖмҰқ вҖ” guarded sub-opк°Җ placeholder idм—җ 500мқ„ лҚҳм§„ л№„лҢҖм№ӯ(HANDOFF-fail-new-triage В§B)лҸ„ мһҲм–ҙ лқјмқҙлёҢ м •м ң мҳҲмғҒ. м•Ңл Өм§„ quirk family: backups/backup-histories 401 (services/database__*.yaml). MySQLкіј л§Ҳм°¬к°Җм§ҖлЎң л№„лІҲ м •мұ…/2866 нҸ¬нҠё; character_setмқҖ utf8 (mysqlмқҖ utf8mb4). requiresлҠ” body мҶҢл№„ кё°мӨҖ subnet + lookup 2мў… (cross-service л°ңмӮ° кІҪкі  мқҳлҸ„)."

  # detail-LOOKUP вҖ” нҒҙлҹ¬мҠӨн„° мғҒм„ём—җм„ң instance_group/block_storage_group id
  # мәЎмІҳ (lookup-on-detail нҢЁн„ҙ). PG pg-instance-group лҜёлҹ¬.
  mariadb-instance-group:
    code: "db-mariadb-instance-group"
    service: database/mariadb
    requires: [mariadb-cluster]
    create:
      endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}"
    capture:
      instance_group_id: "$.instance_groups[0].id"
      block_storage_group_id: "$.instance_groups[0].block_storage_groups[0].id"
    verify:
      - {name: detail-read,
         endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
         expect_status: [200]}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded,
             steps: [capture-subop-ids]}
    notes: "InstanceGroupResponse {id, block_storage_groups[].id, ...} (api_docs show DTO вҖ” PG run 27258520218 лқјмқҙлёҢ мәЎмІҳмҷҖ лҸҷмқј envelope; mariadb мһҗмІҙлҠ” лҜёкІҖмҰқ). addblockstorages/setblockstoragesize/setservertype м•Ўм…ҳ л…ёл“ңл“Өмқҙ м—¬кё° л§ӨлӢ¬лҰ°лӢӨ."

  # мқҪкё° м „мҡ© LOOKUP вҖ” listparametergroups + listparameters м»ӨлІ„лҰ¬м§Җ.
  mariadb-parameter-group:
    code: "db-mariadb-parameter-group"
    service: database/mariadb
    requires: []
    create:
      endpoint: "GET /v1/parameter-groups"
    capture:
      dbaas_parameter_group_id: {list: "$.contents", get: "id"}
    verify:
      # listparameters вҖ” dbaas_parameter_group_idлҠ” REQUIRED query (api_docs)
      - {name: listparameters,
         endpoint: "GET /v1/parameters?dbaas_parameter_group_id={dbaas_parameter_group_id}&size=20&page=0",
         expect_status: [200]}
    provenance: docs
    notes: "ParameterGroupListResponse $.contents[] {id, major_version, name, ...} (api_docs вҖ” PGмҷҖ лҸҷмқј DTO). dbaas_parameter_group_idлҠ” cluster detail DTOм—җ м—Ҷм–ҙ м—¬кё°м„ңл§Ң л°ңкІ¬ к°ҖлҠҘ (PGмҷҖ лҸҷмқј). guarded probeм—җ лҸҷл“ұ мҠӨн…қмқҙ м—Ҷм–ҙ source мғқлһө."

  # detail-LOOKUP вҖ” мҲҳм • к°ҖлҠҘн•ң мІ« нҢҢлқјлҜён„°мқҳ id+applied_value мәЎмІҳ вҶ’ к°ҷмқҖ
  # к°’мңјлЎң set (safe no-op write). PG pg-parameter лҜёлҹ¬.
  mariadb-parameter:
    code: "db-mariadb-parameter"
    service: database/mariadb
    requires: [mariadb-cluster]
    create:
      endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}/parameters"
    capture:
      param_id:
        list: "$.contents"
        where_prefix: {is_modifiable: "True"}
        get: "id"
      param_value:
        list: "$.contents"
        where_prefix: {is_modifiable: "True"}
        get: "applied_value"
    verify:
      # ParametersRequest {parameters: [ParameterRequest {id, new_value,
      #  old_value} м „л¶Җ REQUIRED]} (api_docs verbatim). к°ҷмқҖ-к°’ set = no-op.
      - {name: setparametervalues,
         endpoint: "PUT /v1/clusters/{mariadb-cluster.cluster_id}/parameters",
         json: {parameters: [{id: "{param_id}", new_value: "{param_value}",
                              old_value: "{param_value}"}]},
         expect_status: [200, 202]}
      - {name: syncparametervalues,
         endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/parameters/sync",
         expect_status: [200, 202, 409]}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded,
             steps: [set-parameters, sync-parameters]}
    notes: "create=GET listparametervalues вҖ” ParametersResponse $.contents[] {id, applied_value, is_modifiable, ...} (PGмҷҖ лҸҷмқј DTO). where_prefix 'True'лҠ” м—”м§„ _captureмқҳ str(bool) prefix л§Өм№ӯ. applied_value л№Ҳ л¬ёмһҗм—ҙ мІ« л§Өм№ҳ мӢң set 400 к°ҖлҠҘ вҖ” лқјмқҙлёҢ м •м ң мҳҲмғҒ (PGмҷҖ лҸҷмқј мЈјмқҳ)."

  # ---- м•Ўм…ҳ л…ёл“ңл“Ө (SKE нҢЁн„ҙ: create=нҳём¶ң, ready=мһ¬нҸҙл§Ғ) вҖ” PG лҜёлҹ¬ ---------
  mariadb-add-block-storage:
    code: "db-mariadb-add-block-storage"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster, mariadb-instance-group]
    create:
      endpoint: "POST /v1/instance-groups/{mariadb-instance-group.instance_group_id}/block-storage-groups"
