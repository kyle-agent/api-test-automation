# Resource-task model — database/mariadb (db-mariadb group).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from the maria-* leg of
# heavy-shared-dbaas (enabled+heavy; live-proven — run e3ba190 observed the
# real mariadb cluster created and then taking ~90min to vanish on delete,
# which is the recorded basis for the shared lifecycle's slimmed -gone polls).
# The mariadb-cluster-subops-guarded lifecycle creates nothing (soft-captures
# an existing cluster) and contributes step-shape sources here (bodies UNPROVEN).
#
# 2026-06-13 확장 — database__postgresql.yaml 레퍼런스 패턴 미러링 (replica
# 체인 · restore · patch/kernel-upgrade · parameter/sg-rules/storage sub-op ·
# lookup 노드들; PG owner 승인 2026-06-13이 replica/restore에 이전 적용).
# mariadb 전용 추가 면: start/stop/restart(액션 노드), archive PUT +
# archive/sync POST, sync-state POST, setbackup POST, setmaintenance
# POST+DELETE, setauditlog PUT — setter들은 클러스터 verify로 폴딩 (heavy
# 클러스터 필요 → replica 체인이 함께 행사). setter body들은 mysql 수작업
# database-mysql-cluster 체인에서 검증된 형을 verbatim 이전 (이 엔진에서는
# 미검증 → provenance docs). 검증된 create body는 VERBATIM 유지 (mariadb:
# instances에 service_ip_address 없음, character_set utf8).
version: 1
resources:
  # 읽기 전용 LOOKUP — 소스 maria-find-version 스텝 verbatim (contents[0]).
  mariadb-engine-version:
    code: "db-mariadb-engine-version"
    service: database/mariadb
    requires: []
    create:
      endpoint: "GET /v1/engine-versions"
    capture:
      engine_version_id: {list: "$.contents", get: "id"}
    verify:
      - {name: read, endpoint: "GET /v1/engine-versions", expect_status: [200]}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-dbaas, steps: [maria-find-version]}
    notes: "EngineListResponse $.contents[] (api_docs — PG와 동일 DTO). 소스 스텝은 optional이지만 run e3ba190에서 클러스터 생성에 maria_ver를 공급했으므로 라이브 통과 확정. contents[0] 순서 미문서. 구버전 고정 업그레이드 체인은 mariadb-engine-version-10 분리 노드 (PG -16 패턴)."

  # 구버전 전용 LOOKUP — PG pg-engine-version-16 미러. mariadb 라이브 구버전
  # 유무 owner 미확인 → 이 노드를 쓰는 체인은 합성만 해두고 비활성.
  mariadb-engine-version-10:
    code: "db-mariadb-engine-version-10"
    service: database/mariadb
    requires: []
    create:
      endpoint: "GET /v1/engine-versions"
    capture:
      engine_version_id_10:
        list: "$.contents"
        where_prefix: {major_version: "10"}
        get: "id"
    verify:
      - {name: read, endpoint: "GET /v1/engine-versions?eos_included=false",
         expect_status: [200]}
    provenance: docs
    notes: "Engine.major_version prefix '10' 필터 — MariaDB 메이저 표기 추정 (10.x vs 11.x; api_docs Example 공란, 라이브 카탈로그 owner 미확인). 10.x가 유일/최신 메이저면 구버전 전략 불성립 — owner 콘솔 확인 후 prefix 재조정 (의도된 폭발 반경: gen-heavy-mariadb-upgrade)."

  # 읽기 전용 LOOKUP — 소스 maria-find-stype verbatim: NAME 캡처 (id 아님).
  mariadb-server-type:
    code: "db-mariadb-server-type"
    service: database/mariadb
    requires: []
    create:
      endpoint: "GET /v1/server-types"
    capture:
      db_server_type: {list: "$.contents", get: "name"}
    verify:
      - {name: read, endpoint: "GET /v1/server-types", expect_status: [200]}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-dbaas, steps: [maria-find-stype]}
    notes: "mariadb 호스트의 /v1/server-types — DBaaS 전용 타입 목록, NAME으로 소비. run e3ba190 클러스터 생성에 maria_stype 공급으로 라이브 통과 확정."

  mariadb-cluster:
    code: "db-mariadb-cluster"
    service: database/mariadb
    heavy: true
    requires: [subnet, mariadb-engine-version, mariadb-server-type]
    create:
      endpoint: "POST /v1/clusters"
      body:
        name: "regrm{ualpha}"
        instance_name_prefix: regrm
        dbaas_engine_version_id: "{opt.engine_version_id}"
        ha_enabled: false
        nat_enabled: false
        service_watch_log_collection: true
        subnet_id: "{subnet.subnet_id}"
        timezone: Asia/Seoul
        allowable_ip_addresses: []
        origin_cluster_id: ""
        vip_public_ip_id: ""
        virtual_ip_address: ""
        tags: []
        init_config_option:
          audit_enabled: false
          database_character_set: utf8
          database_name: regrmaria
          database_port: 2866
          database_user_name: regruser
          database_user_password: "Regr1ss@2026"
          backup_option:
            archive_frequency_minute: "60"
            retention_period_day: "7"
            starting_time_hour: "2"
        maintenance_option:
          period_hour: "5"
          starting_day_of_week: MON
          starting_time: "0000"
        instance_groups:
          - role_type: ACTIVE
            server_type_name: "{opt.server_type}"
            block_storage_groups:
              - {role_type: OS, size_gb: 104, volume_type: SSD}
            instances:
              - {role_type: ACTIVE, public_ip_id: ""}
      options:
        engine_version_id: {type: string, required: true,
                            default: "{mariadb-engine-version.engine_version_id}",
                            note: "기본 = lookup contents[0] (소스 maria-find-version 패턴). 업그레이드 체인은 {mariadb-engine-version-10.engine_version_id_10}로 override + engine_version_10 ref 옵션 활성화 (PG 전략 미러; owner 구버전 확인 대기)"}
        server_type: {type: string, required: true,
                      default: "{mariadb-server-type.db_server_type}",
                      note: "기본 = lookup contents[0] NAME (id 아님; 소스 maria-find-stype 스텝)"}
        engine_version_10: {type: ref, target: mariadb-engine-version-10,
                            required: false,
                            note: "body 미사용 closure-puller — 값을 아무거나 주면 mariadb-engine-version-10 lookup이 선행 생성되어 engine_version_id override 토큰이 배선된다 (PG engine_version_16 패턴)"}
    capture: {cluster_id: "$.resource.id"}
    ready: {field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    verify:
      - {name: read, endpoint: "GET /v1/clusters/{cluster_id}",
         expect_status: [200]}
      # setsecuritygrouprules — add/del 둘 다 optional array (api_docs, PG와
      # 동일 DTO). 빈 목록 = 무변경 no-op.
      - {name: setsecuritygrouprules,
         endpoint: "POST /v1/clusters/{cluster_id}/security-group-rules",
         json: {add_ip_addresses: ["10.10.10.10/32"], del_ip_addresses: []},
         expect_status: [200, 202]}
      - {name: read-after-sg, endpoint: "GET /v1/clusters/{cluster_id}",
         expect_status: [200]}
      # ---- mariadb 폴딩 setter 면 (PG 미러에 추가) -------------------------
      # showarchiveconfig — 404 관용은 mysql verify-backup-config verbatim.
      - {name: showarchiveconfig,
         endpoint: "GET /v1/clusters/{cluster_id}/archive",
         expect_status: [200, 404]}
      # setarchiveconfig — ArchiveConfigSetRequest {archive_enabled REQ bool,
      # retention_period_day opt default 1} (api_docs verbatim). body는
      # subops-guarded set-archive probe 초안 verbatim.
      - {name: setarchiveconfig,
         endpoint: "PUT /v1/clusters/{cluster_id}/archive",
         json: {archive_enabled: true, retention_period_day: 1},
         expect_status: [200, 202]}
      - {name: syncarchiveconfig,
         endpoint: "POST /v1/clusters/{cluster_id}/archive/sync",
         expect_status: [200, 202, 409]}
      # setbackup — BackupSettingRequest 3필드 전부 REQUIRED (api_docs
      # verbatim: archive_frequency_minute ^(5|10|30|60)$, retention 7-35,
      # hour 0-23). body는 mysql 수작업 set-backup verbatim 이전.
      - {name: setbackup,
         endpoint: "POST /v1/clusters/{cluster_id}/backups",
         json: {archive_frequency_minute: "30", retention_period_day: "8",
                starting_time_hour: "3"},
         expect_status: [200, 202]}
      # setauditlog — AuditLogRequest {use_audit_log REQ bool} (api_docs
      # verbatim; mariadb/epas/pg에만 있는 op — mysql 카탈로그에 없음).
      # 생성 body audit_enabled:false에서 켜는 실변경 — 1회용 클러스터 허용.
      - {name: setauditlog,
         endpoint: "PUT /v1/clusters/{cluster_id}/audit-log",
         json: {use_audit_log: true},
         expect_status: [200, 202]}
      # setmaintenance — MaintenanceRequest 4필드 전부 REQUIRED (api_docs
      # verbatim). body는 mysql 수작업 set-maintenance 라이브-2xx verbatim
      # 이전 (run 27258520218 non-optional 통과).
      - {name: setmaintenance,
         endpoint: "POST /v1/clusters/{cluster_id}/maintenance",
         json: {start_day_of_week: SUN, start_minute: "00",
                start_time: "03", term_hour: "4"},
         expect_status: [200, 202]}
      # unsetmaintenance — body 없음 (mysql 수작업 unset-maintenance expect
      # verbatim). set 직후 해제: 1회용 클러스터라 윈도우 부재 무해.
      - {name: unsetmaintenance,
         endpoint: "DELETE /v1/clusters/{cluster_id}/maintenance",
         expect_status: [200, 202, 204]}
      # syncclusterstate — mysql 수작업 sync-cluster-state expect verbatim
      # (409 = 변경 없음 관용). setter들 뒤 상태 재동기화로 마지막.
      - {name: syncclusterstate,
         endpoint: "POST /v1/clusters/{cluster_id}/sync-state",
         expect_status: [200, 201, 202, 409]}
    delete: {endpoint: "DELETE /v1/clusters/{cluster_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-dbaas,
             steps: [maria-create, maria-wait, maria-delete]}
    notes: "HEAVY 과금. capture 변수는 소스의 maria_cid를 노드 표준 cluster_id로 개명(공유 lifecycle의 충돌회피 명명 — envelope $.resource.id 동일). 소스 body는 instances에 service_ip_address가 없다(자동 할당; mysql/pg 표준형과의 차이) — verbatim 유지. 삭제가 매우 느림: run e3ba190에서 소멸까지 ~90분 — 기존 delete 시맨틱 유지(재시도 스택 추가 안 함): -gone 폴은 900s 캡 + 잔여는 subnet 삭제 409 재시도로 흡수(소스 _note); 합성 teardown은 composer 기본(의존 노드 있는 delete에 409×40×30s)에 맡긴다 — 90분 drain이 그 예산(20분)을 넘으면 cleanup 패스가 백스톱 (라이브 정제 예상). 폴딩 setter body들은 mysql 체인 검증형 이전이지만 mariadb에서는 미검증 — guarded sub-op가 placeholder id에 500을 던진 비대칭(HANDOFF-fail-new-triage §B)도 있어 라이브 정제 예상. 알려진 quirk family: backups/backup-histories 401 (services/database__*.yaml). MySQL과 마찬가지로 비번 정책/2866 포트; character_set은 utf8 (mysql은 utf8mb4). requires는 body 소비 기준 subnet + lookup 2종 (cross-service 발산 경고 의도)."

  # detail-LOOKUP — 클러스터 상세에서 instance_group/block_storage_group id
  # 캡처 (lookup-on-detail 패턴). PG pg-instance-group 미러.
  mariadb-instance-group:
    code: "db-mariadb-instance-group"
    service: database/mariadb
    requires: [mariadb-cluster]
    create:
      endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}"
    capture:
      instance_group_id: "$.instance_groups[0].id"
      block_storage_group_id: "$.instance_groups[0].block_storage_groups[0].id"
    verify:
      - {name: detail-read,
         endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
         expect_status: [200]}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded,
             steps: [capture-subop-ids]}
    notes: "InstanceGroupResponse {id, block_storage_groups[].id, ...} (api_docs show DTO — PG run 27258520218 라이브 캡처와 동일 envelope; mariadb 자체는 미검증). addblockstorages/setblockstoragesize/setservertype 액션 노드들이 여기 매달린다."

  # 읽기 전용 LOOKUP — listparametergroups + listparameters 커버리지.
  mariadb-parameter-group:
    code: "db-mariadb-parameter-group"
    service: database/mariadb
    requires: []
    create:
      endpoint: "GET /v1/parameter-groups"
    capture:
      dbaas_parameter_group_id: {list: "$.contents", get: "id"}
    verify:
      # listparameters — dbaas_parameter_group_id는 REQUIRED query (api_docs)
      - {name: listparameters,
         endpoint: "GET /v1/parameters?dbaas_parameter_group_id={dbaas_parameter_group_id}&size=20&page=0",
         expect_status: [200]}
    provenance: docs
    notes: "ParameterGroupListResponse $.contents[] {id, major_version, name, ...} (api_docs — PG와 동일 DTO). dbaas_parameter_group_id는 cluster detail DTO에 없어 여기서만 발견 가능 (PG와 동일). guarded probe에 동등 스텝이 없어 source 생략."

  # detail-LOOKUP — 수정 가능한 첫 파라미터의 id+applied_value 캡처 → 같은
  # 값으로 set (safe no-op write). PG pg-parameter 미러.
  mariadb-parameter:
    code: "db-mariadb-parameter"
    service: database/mariadb
    requires: [mariadb-cluster]
    create:
      endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}/parameters"
    capture:
      param_id:
        list: "$.contents"
        where_prefix: {is_modifiable: "True"}
        get: "id"
      param_value:
        list: "$.contents"
        where_prefix: {is_modifiable: "True"}
        get: "applied_value"
    verify:
      # ParametersRequest {parameters: [ParameterRequest {id, new_value,
      #  old_value} 전부 REQUIRED]} (api_docs verbatim). 같은-값 set = no-op.
      - {name: setparametervalues,
         endpoint: "PUT /v1/clusters/{mariadb-cluster.cluster_id}/parameters",
         json: {parameters: [{id: "{param_id}", new_value: "{param_value}",
                              old_value: "{param_value}"}]},
         expect_status: [200, 202]}
      - {name: syncparametervalues,
         endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/parameters/sync",
         expect_status: [200, 202, 409]}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded,
             steps: [set-parameters, sync-parameters]}
    notes: "create=GET listparametervalues — ParametersResponse $.contents[] {id, applied_value, is_modifiable, ...} (PG와 동일 DTO). where_prefix 'True'는 엔진 _capture의 str(bool) prefix 매칭. applied_value 빈 문자열 첫 매치 시 set 400 가능 — 라이브 정제 예상 (PG와 동일 주의)."

  # ---- 액션 노드들 (SKE 패턴: create=호출, ready=재폴링) — PG 미러 ---------
  mariadb-add-block-storage:
    code: "db-mariadb-add-block-storage"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster, mariadb-instance-group]
    create:
      endpoint: "POST /v1/instance-groups/{mariadb-instance-group.instance_group_id}/block-storage-groups"
      body: {role_type: DATA, size_gb: 104, volume_type: SSD}
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded,
             steps: [add-block-storages]}
    notes: "AddBlockStoragesRequest {role_type REQ enum(OS,DATA,ARCHIVE,TEMP,BACKUP), size_gb REQ 16-5120, volume_type opt default SSD} (api_docs verbatim — PG와 동일 DTO). DATA 볼륨 추가 비가역 — 1회용 클러스터 전용."

  mariadb-resize-block-storage:
    code: "db-mariadb-resize-block-storage"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster, mariadb-instance-group]
    create:
      endpoint: "POST /v1/block-storage-groups/{mariadb-instance-group.block_storage_group_id}/resize"
      body: {size_gb: 112}
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded,
             steps: [resize-block-storage]}
    notes: "ResizeBlockStorageGroupRequest {size_gb REQ} (api_docs — PG와 동일 DTO). 104→112 GB 증설 — 축소 불가(비가역), 1회용 클러스터 전용."

  mariadb-resize-server-type:
    code: "db-mariadb-resize-server-type"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster, mariadb-instance-group, mariadb-server-type]
    create:
      endpoint: "POST /v1/instance-groups/{mariadb-instance-group.instance_group_id}/resize"
      body: {server_type_name: "{opt.server_type}"}
      options:
        server_type: {type: string, required: true,
                      default: "{mariadb-server-type.db_server_type}",
                      note: "기본 = lookup contents[0] = 생성 시 타입과 동일 가능 — same-type resize 400이면 합성 시 다른 NAME으로 override (라이브 정제 예상; PG와 동일 주의)"}
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded,
             steps: [resize-instance-group]}
    notes: "InstanceGroupResizeRequest {server_type_name REQ} (api_docs verbatim — PG와 동일 DTO). composer create expect [200,201,202] 고정 — same-type 400은 의도된 hard."

  # log-export — 계정 자격 게이트. PG pg-log-export-config 미러.
  mariadb-log-export-config:
    code: "db-mariadb-log-export-config"
    service: database/mariadb
    requires: [mariadb-cluster]
    create:
      endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/log-export-configs"
      body:
        access_key: "{opt.access_key}"
        bucket_name: "{opt.bucket_name}"
        delete_on_export: false
        log_type: "{opt.log_type}"
        schedule_day_of_month: "28"
        schedule_day_of_week: MON
        schedule_frequency_type: DAY
        schedule_hour: "12"
        secret_key: "{opt.secret_key}"
      options:
        access_key: {type: string, required: true,
                     note: "OBS 접근 access key — 계정 자격, 기본값 없음(의도된 게이트)"}
        secret_key: {type: string, required: true,
                     note: "OBS 접근 secret key — 계정 자격, 기본값 없음(의도된 게이트)"}
        bucket_name: {type: string, default: "apitest-logsink",
                      note: "공유 OBS 싱크 (워크플로 보장; trails/network-logging과 동일 — owner). 엔진별 버킷 요건 다르면 라이브 정제"}
        log_type: {type: string, default: "general",
                   note: "DTO Example은 'alert'; PG 수작업 probe는 'general' — string 자유형 (enum 아님, api_docs)"}
    delete: {endpoint: "DELETE /v1/clusters/{mariadb-cluster.cluster_id}/log-export-configs/{opt.log_type}",
             destructive: true}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded,
             steps: [register-log-export-config]}
    notes: "LogExportConfigCreateRequest 9필드 전부 REQUIRED (nullable이어도 키 필수, api_docs verbatim — PG와 동일 DTO). PG userguide 확정 준용: Object Storage Bucket 대상, 인증키 만료 시 적재 중단. teardown = unregisterlogexportconfig DELETE .../log-export-configs/{log_type}."

  # ---- start/stop/restart (mariadb 전용 추가 면; PG 모델에는 없음) ---------
  # stop→start→restart 순서를 requires 엣지로 강제. replica 체인 합성 제외
  # (origin 정지 중 replica 경합 회피 — 별도 윈도우용).
  mariadb-stop:
    code: "db-mariadb-stop"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster]
    create:
      endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/stop"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [STOPPED],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [stop-cluster]}
    notes: "body 없음, 202 AsyncResponse (api_docs). ready until STOPPED는 docs 추정 (service_state enum 미문서 — 라이브 정제 예상; guarded probe는 무폴링 wide-expect). 정지 중 과금 정책 미확인 — 1회용 클러스터 전용."

  mariadb-start:
    code: "db-mariadb-start"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster, mariadb-stop]
    create:
      endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/start"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [start-cluster]}
    notes: "body 없음, 202 (api_docs). requires 엣지로 stop 이후 보장 — RUNNING 클러스터에 start는 4xx 예상."

  mariadb-restart:
    code: "db-mariadb-restart"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster, mariadb-start]
    create:
      endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/restart"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [restart-cluster]}
    notes: "body 없음, 202 (api_docs). requires 엣지로 start 이후 (stop→start→restart 풀 사이클)."

  # ---- replica 체인 (PG owner 승인 2026-06-13 이전 적용, 동일 리전) --------
  mariadb-replica:
    code: "db-mariadb-replica"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster, mariadb-server-type]
    create:
      endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/replicas"
      body:
        allowable_ip_addresses: []
        replica_count: 1
        replicas:
          - name: "regrmrep{ualpha}"
            instance_groups:
              - role_type: ACTIVE
                server_type_name: "{opt.server_type}"
                block_storage_groups:
                  - {role_type: OS, size_gb: 104, volume_type: SSD}
                instances:
                  - {role_type: ACTIVE, public_ip_id: ""}
        tags: []
      options:
        server_type: {type: string, required: true,
                      default: "{mariadb-server-type.db_server_type}",
                      note: "replica 인스턴스 그룹 타입 — origin과 동일 기본"}
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    capture: {replica_cluster_id: "$.resource.id"}
    ready: {endpoint: "GET /v1/clusters/{replica_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    delete: {endpoint: "DELETE /v1/clusters/{replica_cluster_id}",
             destructive: true,
             retry_on_status: [400, 401, 409, 500, 503],
             retries: 20, retry_interval: 60}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [create-replica]}
    notes: "HEAVY — 두 번째 과금 클러스터, mariadb delete drain ~90분이 둘 다 적용될 수 있음 (run e3ba190) — teardown은 replica 먼저, 잔여 drain은 subnet 409 재시도 + cleanup 패스 백스톱. ReplicasCreateRequest verbatim (api_docs — PG와 동일 DTO). instances에 service_ip_address 없음 = mariadb 검증 본체 instance 형 미러. 응답 AsyncResponse $.resource.id = replica cluster id. PG userguide 확정 준용: 동일 리전·동일 subnet, DB당 최대 5개. create 409 재시도는 직전 async setter verify reconcile 경합 대비 (mariadb는 폴딩 setter가 가장 많음 — 예산 부족 시 라이브 정제). delete 재시도 스택은 PG verbatim 승계 (401 quirk family)."

  mariadb-sync-replica-state:
    code: "db-mariadb-sync-replica-state"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster, mariadb-replica]
    create:
      endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/sync-replica-state"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 900, interval: 30}
    verify:
      - {name: replicas-list,
         endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}/replicas",
         expect_status: [200]}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded,
             steps: [sync-replica-state]}
    notes: "path param은 ORIGIN cluster id (api_docs). body 없음, 202 AsyncResponse. listreplicas verify로 replica_state 노출 확인 (PG와 동일 DTO)."

  # HA 전용 — replica 체인 제외 (PG userguide 확정 준용: HA Active↔Standby 전환).
  mariadb-switchover:
    code: "db-mariadb-switchover"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster]
    create:
      endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/switchover"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [switchover-cluster]}
    notes: "ha_enabled:false 본체에서는 4xx 예상 — HA 변형 클러스터가 모델링될 때까지 합성 제외 게이트 (PG pg-switchover와 동일 처리)."

  mariadb-reset-replica:
    code: "db-mariadb-reset-replica"
    service: database/mariadb
    heavy: true
    requires: [mariadb-replica, mariadb-sync-replica-state]
    create:
      endpoint: "POST /v1/clusters/{mariadb-replica.replica_cluster_id}/reset-replica"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mariadb-replica.replica_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [reset-replica]}
    notes: "Replica 재구성 — path param replica_cluster_id = REPLICA role 클러스터 (api_docs). 전체 재복제라 ready 1800s. body 없음, 202."

  # 비가역 — 체인 '마지막' 강제. 승격 후 둘 다 삭제.
  mariadb-promote:
    code: "db-mariadb-promote"
    service: database/mariadb
    heavy: true
    requires: [mariadb-replica, mariadb-reset-replica]
    create:
      endpoint: "POST /v1/clusters/{mariadb-replica.replica_cluster_id}/promote"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mariadb-replica.replica_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 1800, interval: 30}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [promote-replica]}
    notes: "IRREVERSIBLE — 승격 시 기존 Master와 동기화 중단 (PG userguide 준용). requires로 reset-replica 이후 '마지막' 보장; teardown은 replica delete가 origin delete보다 먼저."

  # restore — backup-timing 게이트로 비활성 합성 (PG와 동일).
  mariadb-restore:
    code: "db-mariadb-restore"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster, mariadb-server-type]
    create:
      endpoint: "POST /v1/clusters/{mariadb-cluster.cluster_id}/restore"
      body:
        name: "regrmrst{ualpha}"
        instance_name_prefix: regrmrst
        server_type_name: "{opt.server_type}"
        allowable_ip_addresses: []
        tags: []
      options:
        server_type: {type: string, required: true,
                      default: "{mariadb-server-type.db_server_type}",
                      note: "ClusterRestoreRequest.server_type_name REQUIRED — origin과 동일 기본"}
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    capture: {restore_cluster_id: "$.resource.id"}
    ready: {endpoint: "GET /v1/clusters/{restore_cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 2400, interval: 30}
    delete: {endpoint: "DELETE /v1/clusters/{restore_cluster_id}",
             destructive: true,
             retry_on_status: [400, 401, 409, 500, 503],
             retries: 20, retry_interval: 60}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [create-restore]}
    notes: "HEAVY — 백업 기반 새 과금 클러스터 (+90분 delete drain 가능). ClusterRestoreRequest verbatim (api_docs — PG와 동일 DTO). PG userguide 확정 준용: 백업은 예약 수행 — 생성 직후 restore 실패 예상 (gen-heavy-mariadb-restore enabled:false 게이트). 응답 AsyncResponse $.resource.id = 신규 클러스터 id."

  # ---- patch / kernel-upgrade — 합성 체인은 owner 구버전 확인 대기 게이트 --
  mariadb-patch:
    code: "db-mariadb-patch"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster]
    create:
      endpoint: "PUT /v1/clusters/{mariadb-cluster.cluster_id}/patch"
      body:
        backup_before_upgrade: false
        software_version: "{opt.target_software_version}"
      options:
        target_software_version: {type: string, required: true,
                                  note: "패치 대상 마이너 버전 — 기본값 없음(의도된 게이트): 현재 마이너보다 높아야 함. 합성 시 명시"}
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 3600, interval: 60}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [patch-minor-version]}
    notes: "MinorPatchRequest {backup_before_upgrade REQ bool, software_version REQ string} (api_docs verbatim — PG와 동일 DTO). PG userguide 준용: 동일 메이저 내 마이너만; replica 먼저 패치. backup_before_upgrade=false: 1회용 + 완료 백업 미존재 리스크 회피. IRREVERSIBLE."

  mariadb-kernel-upgrade:
    code: "db-mariadb-kernel-upgrade"
    service: database/mariadb
    heavy: true
    requires: [mariadb-cluster]
    create:
      endpoint: "PUT /v1/clusters/{mariadb-cluster.cluster_id}/kernel-upgrade"
      retry_on_status: [409]
      retries: 8
      retry_interval: 30
    ready: {endpoint: "GET /v1/clusters/{mariadb-cluster.cluster_id}",
            field: "$.service_state", until: [RUNNING, ACTIVE, AVAILABLE],
            timeout: 3600, interval: 60}
    provenance: docs
    source: {lifecycle: mariadb-cluster-subops-guarded, steps: [upgrade-kernel]}
    notes: "body 없음 (api_docs — upgradekernel). PG userguide 준용: 진행 중 서비스 중단, 실패 시 원복, 성공 시 IRREVERSIBLE. 전제 is_kernel_patchable=true. mariadb 구버전 라이브 유무 owner 미확인 → gen-heavy-mariadb-upgrade는 'owner가 콘솔에서 엔진 구버전 유무 확인 대기'로 비활성."
