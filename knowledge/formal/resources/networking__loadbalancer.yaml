# Resource-task model — networking/loadbalancer (nw-lb group, the LB chain).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from heavy-shared-networking
# (enabled, live-validated bodies/captures) + networking-loadbalancer-members-nat.
#
# requires here follow what each VALIDATED body actually consumes (subnet_id +
# vpc_id fields), which diverges from cross-service.yaml's coarser edges for
# lb-health-check ([], region-scoped) and lb-server-group ([load-balancer]) —
# the validator reports those as reconcile-during-R3 warnings by design.
version: 1
resources:
  lb-health-check:
    code: "nw-lb-health-check"
    service: networking/loadbalancer
    requires: [vpc, subnet]
    create:
      endpoint: "POST /v1/lb-health-checks"
      body:
        lb_health_check:
          name: "regrhc{ualpha}"
          description: "API regression suite"
          protocol: TCP
          health_check_count: 3
          health_check_interval: 5
          health_check_port: 80
          health_check_timeout: 5
          subnet_id: "{subnet.subnet_id}"
          vpc_id: "{vpc.vpc_id}"
          tags: []
    capture: {lb_health_check_id: "$.lb_health_check.id"}
    verify:
      - {name: read, endpoint: "GET /v1/lb-health-checks/{lb_health_check_id}",
         expect_status: [200]}
      # LbHealthCheckSetRequest {lb_health_check REQ LbHealthCheckSet — 전부
      # optional 필드} (api_docs verbatim) — 동일 값 set = no-op (wave5 setter
      # 커버: setlbhealthcheck).
      - {name: set, endpoint: "PUT /v1/lb-health-checks/{lb_health_check_id}",
         json: {lb_health_check: {description: "API regression suite (set)",
                                  health_check_count: 3,
                                  health_check_interval: 5,
                                  health_check_timeout: 5}},
         expect_status: [200, 202]}
    delete: {endpoint: "DELETE /v1/lb-health-checks/{lb_health_check_id}",
             destructive: true}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-networking,
             steps: [lb-healthcheck-create, lb-healthcheck-delete]}
    notes: "region 스코프 재사용 자원 — 참조할 server group보다 먼저 생성 (run 27306490231 LbHealthCheckNotFoundError 교훈)"

  load-balancer:
    code: "nw-lb-lb"
    service: networking/loadbalancer
    heavy: true
    requires: [vpc, subnet]
    create:
      endpoint: "POST /v1/loadbalancers"
      body:
        loadbalancer:
          name: "regrlb{ualpha}"
          description: "API regression suite"
          layer_type: L4
          firewall_enabled: false
          firewall_logging_enabled: false
          publicip_id: ""
          service_ip: "{opt.service_ip}"
          source_nat_ip: ""
          subnet_id: "{subnet.subnet_id}"
          vpc_id: "{vpc.vpc_id}"
          tags: []
      options:
        service_ip: {type: string, required: true, default: "10.124.0.100",
                     note: "서비스 subnet cidr 내부의 빈 IP — 기본값은 공유 subnet(10.124.0.0/24, engine._SHARED_SUBNET_CIDR) 재호밍 규칙을 따른다 (구 기본 10.140.6.100은 소스 lifecycle의 자체 subnet에 묶인 값이었음; 수작업 members-nat의 10.124.0.30과 충돌 회피로 .100 선택). adopt 없이 자가 생성 subnet(10.160.8.0/24)으로 합성 시 override 필요. subnet에서 4개 IP 소비(service+SNAT+HC 2), SNAT/HC IP는 생성 후 불변"}
    capture: {loadbalancer_id: "$.loadbalancer.id"}
    ready: {field: "$.loadbalancer.state",
            until: [ACTIVE, CREATED, RUNNING, AVAILABLE], timeout: 600, interval: 20}
    verify:
      - {name: read-static-nats,
         endpoint: "GET /v1/loadbalancers/{loadbalancer_id}/static-nats",
         expect_status: [200]}
      - {name: read-private-static-nats,
         endpoint: "GET /v1/loadbalancers/{loadbalancer_id}/private-static-nats",
         expect_status: [200]}
      # LoadbalancerUpdateRequest {loadbalancer REQ {description REQ}}
      # (api_docs verbatim — description이 유일한 수정 필드; wave5 setter 커버:
      # setloadbalancer).
      - {name: set, endpoint: "PUT /v1/loadbalancers/{loadbalancer_id}",
         json: {loadbalancer: {description: "API regression suite (set)"}},
         expect_status: [200, 202]}
    delete: {endpoint: "DELETE /v1/loadbalancers/{loadbalancer_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-networking, steps: [lb-create, lb-wait, lb-delete]}

  lb-server-group:
    code: "nw-lb-server-group"
    service: networking/loadbalancer
    requires: [vpc, subnet, lb-health-check]
    create:
      endpoint: "POST /v1/lb-server-groups"
      body:
        lb_server_group:
          name: "regrsg{ualpha}"
          description: "API regression suite"
          lb_health_check_id: "{lb-health-check.lb_health_check_id}"
          lb_method: ROUND_ROBIN
          protocol: TCP
          subnet_id: "{subnet.subnet_id}"
          vpc_id: "{vpc.vpc_id}"
          tags: []
    capture: {lb_server_group_id: "$.lb_server_group.id"}
    verify:
      - {name: read, endpoint: "GET /v1/lb-server-groups/{lb_server_group_id}",
         expect_status: [200]}
      - {name: read-members,
         endpoint: "GET /v1/lb-server-groups/{lb_server_group_id}/members",
         expect_status: [200]}
      # LbServerGroupSetRequest {lb_server_group REQ {description/
      # lb_health_check_id/lb_method 전부 optional}} (api_docs verbatim) —
      # 동일 값 set = no-op (wave5 setter 커버: setlbservergroup).
      - {name: set, endpoint: "PUT /v1/lb-server-groups/{lb_server_group_id}",
         json: {lb_server_group: {description: "API regression suite (set)",
                                  lb_method: ROUND_ROBIN}},
         expect_status: [200, 202]}
    delete: {endpoint: "DELETE /v1/lb-server-groups/{lb_server_group_id}",
             destructive: true}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-networking,
             steps: [lb-servergroup-create, lb-servergroup-delete]}

  lb-listener:
    code: "nw-lb-listener"
    service: networking/loadbalancer
    requires: [load-balancer, lb-server-group]
    create:
      endpoint: "POST /v1/lb-listeners"
      body:
        listener:
          name: "regrls{ualpha}"
          description: "API regression suite"
          loadbalancer_id: "{load-balancer.loadbalancer_id}"
          protocol: TCP
          routing_action: LB_SERVER_GROUP
          server_group_id: "{lb-server-group.lb_server_group_id}"
          service_port: "80"
          session_duration_time: 120
          support_http2: false
          tags: []
    capture: {listener_id: "$.listener.id"}
    verify:
      - {name: read, endpoint: "GET /v1/lb-listeners/{listener_id}",
         expect_status: [200]}
      # LbListenerSetRequestV1Dot3 {listener REQ ListenerForSetV1Dot3 — 전부
      # optional 필드} (api_docs verbatim): 생성값과 동일한 최소 set = no-op.
      # heavy-shared-networking의 setlblistener는 빈 문자열 다발로 UNPROVEN —
      # 여기는 타입에 맞는 필드만 보낸다 (wave5 setter 커버: setlblistener).
      - {name: set, endpoint: "PUT /v1/lb-listeners/{listener_id}",
         json: {listener: {description: "API regression suite (set)",
                           session_duration_time: 120}},
         expect_status: [200, 202]}
    delete: {endpoint: "DELETE /v1/lb-listeners/{listener_id}", destructive: true}
    provenance: VALIDATED
    source: {lifecycle: heavy-shared-networking,
             steps: [lb-listener-create, lb-listener-delete]}

  lb-member:
    code: "nw-lb-member"
    service: networking/loadbalancer
    requires: [lb-server-group]
    create:
      endpoint: "POST /v1/lb-server-groups/{lb-server-group.lb_server_group_id}/members"
      # MemberListCreateRequestV1Dot1 {members REQ [MemberCreateRequestV1Dot1
      # {member_ip REQ, member_port REQ, name REQ, object_type REQ,
      # member_state/member_weight/object_id opt}]} (api_docs verbatim).
      # member_ip는 subnet 내 임의 IP 직접 입력 가능 — 실 VM 불필요 (수작업
      # members-nat _note 검증 사항: "no backend VM required").
      body:
        members:
          - name: regrmember1
            member_ip: "{opt.member_ip}"
            member_port: 80
            member_state: ENABLE
            member_weight: 100
            object_id: ""
            object_type: VM
      options:
        member_ip: {type: string, required: true, default: "10.124.0.101",
                    note: "LB와 같은 VPC의 VS/BM 서버 IP 또는 직접 입력 IP (직접 입력이 테스트 최저비용 — VM 불필요). 기본값은 공유 subnet(10.124.0.0/24) 재호밍 규칙 (수작업 members-nat의 10.124.0.31과 충돌 회피로 .101). 자가 생성 subnet 합성 시 override 필요"}
    capture: {member_id: "$.members[0].id"}
    verify:
      - {name: show,
         endpoint: "GET /v1/lb-server-groups/{lb-server-group.lb_server_group_id}/members/{member_id}",
         expect_status: [200]}
      # MemberSetRequest {member REQ {member_port/member_state/member_weight
      # 전부 optional}} (api_docs verbatim) — 동일 값 set = no-op (wave5 setter
      # 커버: setlbservergroupmember).
      - {name: set,
         endpoint: "PUT /v1/lb-server-groups/{lb-server-group.lb_server_group_id}/members/{member_id}",
         json: {member: {member_port: 80, member_state: ENABLE,
                         member_weight: 100}},
         expect_status: [200, 202]}
    delete: {endpoint: "DELETE /v1/lb-server-groups/{lb-server-group.lb_server_group_id}/members/{member_id}",
             destructive: true}
    provenance: docs
    source: {lifecycle: networking-loadbalancer-members-nat,
             steps: [members-add, members-set, members-remove-single]}
    notes: "capture는 소스에서 capture_soft($.members[0].id, envelope UNPROVEN) — docs 유지. delete = removelbservergroupmember(단건); bulk 삭제는 lb-member-bulk 노드가 커버"

  # 두 번째 member — 같은 add API로 생성하되 teardown이 BULK 삭제
  # (DELETE .../members + member_id_list body = removelbservergroupmembers)를
  # 커버한다. lb-member와 ip/이름만 다르다.
  lb-member-bulk:
    code: "nw-lb-member-bulk"
    service: networking/loadbalancer
    requires: [lb-server-group]
    create:
      endpoint: "POST /v1/lb-server-groups/{lb-server-group.lb_server_group_id}/members"
      body:
        members:
          - name: regrmember2
            member_ip: "{opt.member_ip}"
            member_port: 80
            member_state: ENABLE
            member_weight: 100
            object_id: ""
            object_type: VM
      options:
        member_ip: {type: string, required: true, default: "10.124.0.102",
                    note: "lb-member와 동일 규칙 — 공유 subnet 재호밍, .102로 분리 (동일 ip:port 중복 등록 회피)"}
    capture: {member_bulk_id: "$.members[0].id"}
    # MemberDeleteBulkRequestV1Dot2 {member_id_list REQ [string]} (api_docs
    # verbatim) — bulk 삭제가 이 노드의 teardown.
    delete: {endpoint: "DELETE /v1/lb-server-groups/{lb-server-group.lb_server_group_id}/members",
             json: {member_id_list: ["{member_bulk_id}"]},
             destructive: true}
    provenance: docs
    source: {lifecycle: networking-loadbalancer-members-nat,
             steps: [members-add, members-remove-bulk]}
    notes: "removelbservergroupmembers(벌크) 커버 전용 노드 — capture envelope $.members[0].id UNPROVEN(docs)"

  # public static-NAT — PF-13 교훈: LB에 Public NAT IP를 붙이려면 그 VPC에
  # IGW가 있어야 한다 (수작업 members-nat _note: "attaching a Public NAT IP
  # requires an IGW on the VPC" — IGW 없는 VPC에서 4xx). internet-gateway를
  # requires로 배선해 closure에 강제 포함시킨다.
  lb-static-nat:
    code: "nw-lb-static-nat"
    service: networking/loadbalancer
    requires: [load-balancer, public-ip, internet-gateway]
    create:
      endpoint: "POST /v1/loadbalancers/{load-balancer.loadbalancer_id}/static-nats"
      # StaticNatCreateRequest {static_nat REQ {publicip_id REQ}} (api_docs
      # verbatim) — 수작업 members-nat은 빈 publicip_id로 4xx-tolerant였고,
      # 실 public-ip 주입은 이 모델이 처음 제공.
      body: {static_nat: {publicip_id: "{public-ip.publicip_id}"}}
    capture: {static_nat_id: "$.static_nat.id"}
    verify:
      - {name: read,
         endpoint: "GET /v1/loadbalancers/{load-balancer.loadbalancer_id}/static-nats",
         expect_status: [200]}
    # deleteloadbalancerpublicnatip: DELETE .../static-nats (path param만 문서화;
    # 수작업 members-nat은 static_nat_id_list body를 보냈다 — 그 형식 승계).
    delete: {endpoint: "DELETE /v1/loadbalancers/{load-balancer.loadbalancer_id}/static-nats",
             json: {static_nat_id_list: ["{static_nat_id}"]},
             destructive: true}
    provenance: docs
    source: {lifecycle: networking-loadbalancer-members-nat,
             steps: [static-nat-create, static-nat-delete]}
    notes: "createloadbalancerpublicnatip/deleteloadbalancerpublicnatip 커버. capture envelope $.static_nat.id는 api_docs response_example 기반 UNPROVEN. private-static-nats(createloadbalancerprivatenatip)는 private_nat_id + private_nat_ip_id가 필요 — private-nat IP 하위자원 모델이 없어 미배선 (owner 질문: private NAT IP 발급 경로)"
