# Resource-task model — security/secretsmanager (sec-sm group).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from
# security-secretsmanager-secret (enabled, live-validated) by extract.py,
# curated by hand: the source's inline create-kms step became a requires edge
# on the sec-kms kms-key node ({kms_id} -> {kms-key.key_id}).
#
# The per-secret WRITE ops (reveal-value, set-kmsid, restore, label, acl-cidr,
# private-acl) and the standalone POSTs (kms-key, random-password) are
# operations, not resources — they stay in security-secretsmanager-secret /
# security-secretsmanager-writes.
version: 1
resources:
  secret:
    code: "sec-sm-secret"
    service: security/secretsmanager
    requires: [kms-key]
    create:
      endpoint: "POST /v1/secrets"
      body: {acl_cidr: "{opt.acl_cidr}", description: "API regression suite",
             kms_id: "{kms-key.key_id}", name: "regrsec{unique}",
             private_acl_enabled: "false", private_acl_resources: [],
             secret_value: "{\"k\":\"v\"}", tags: []}
      options:
        acl_cidr: {type: string, required: true, default: "10.0.0.0/25",
                   note: "퍼블릭 접근 제어 IP — create의 REQUIRED 필드 (없으면 400 가능성, 최대 10개 comma-separated CIDR). 기본값은 라이브 검증된 소스 값"}
    capture: {secret_id: "$.secret.id"}
    delete:
      endpoint: "DELETE /v1/secrets/{secret_id}"
      json: {waiting_time_ndays: 7}
      destructive: true
    provenance: VALIDATED
    source: {lifecycle: security-secretsmanager-secret, steps: [create-kms, create, delete, delete-kms]}
    notes: "kms-key는 encrypt-capable spec이어야 한다 (rsa-2048 기본값 OK; sign-only ECDSA/HMAC은 거부 — services/security__secretsmanager.yaml). 소스는 KMS 생성 후 wait 15s를 두고 secret을 만든다(키 settle) — composer의 wait 반영은 R3 과제. secret_value는 JSON **문자열**, private_acl_enabled는 문자열 'false' (검증된 형태 유지). DELETE는 body {waiting_time_ndays: 7-30} REQUIRED — 7~30일 해지 대기 후 영구 삭제, 대기 중 동명 재생성 불가; composer teardown의 delete-body 지원은 R3 과제. teardown 순서: secret 먼저, kms-key 나중 (소스와 동일 역순)."
