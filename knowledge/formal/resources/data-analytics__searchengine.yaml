# Resource-task model — data-analytics/searchengine (da-se group, OpenSearch
# DBaaS). Schema: docs/RESOURCE-MODEL-PLAN.md §1.
#
# The hand-written lifecycles (searchengine-cluster-subops-guarded /
# searchengine-read-coverage) are COVERAGE-ONLY: they adopt an existing cluster
# and never create one, so the create below comes from data/api_bodies.json
# searchenginecreatecluster (docs provenance, UNPROVEN).
version: 1
resources:
  searchengine-cluster:
    code: "da-se-cluster"
    service: data-analytics/searchengine
    heavy: true
    requires: [subnet]
    create:
      endpoint: "POST /v1/clusters"
      body:
        name: "regrse{ualpha}"
        allowable_ip_addresses: []
        dbaas_engine_version_id: "{opt.engine_version_id}"
        init_config_option:
          backup_option: {retention_period_day: "7", starting_time_hour: "2"}
          database_port: 9200
          database_user_name: "{opt.db_user_name}"
          database_user_password: "{opt.db_user_password}"
        instance_groups:
          - role_type: ACTIVE
            server_type_name: "{opt.server_type_name}"
            block_storage_groups:
              - {role_type: OS, size_gb: 104, volume_type: SSD}
            instances:
              - {public_ip_id: "", role_type: ACTIVE,
                 service_ip_address: "192.168.10.10/32"}
        instance_name_prefix: "regrse"
        is_combined: false
        license: ""
        maintenance_option: {period_hour: "5", starting_day_of_week: MON,
                             starting_time: "0000"}
        nat_enabled: false
        subnet_id: "{subnet.subnet_id}"
        tags: []
        timezone: "Asia/Seoul"
      options:
        engine_version_id: {type: string, required: true,
                            note: "lookup — GET /v1/engine-versions $.contents[0].id (searchengine-read-coverage capture). userguide 확정 (2026-06-14, overview): Elasticsearch 8.15.0/8.19.7, OpenSearch 2.19.3 (3.4.0은 2026-03 이후 예정). 엔진 2종(Elasticsearch Enterprise / OpenSearch) 혼재 — Elasticsearch 선택 시 license(BYOL) 필요"}
        server_type_name: {type: string, required: true,
                           note: "lookup — DBaaS server-type 목록; api_bodies sample은 빈 문자열. userguide 확정 (2026-06-14, overview/servertype): Standard(ses1/ses2, 최대 16 vCore/256GB) · High Capacity(seh2, 24+ vCore, 최대 72 vCore/288GB). 최소 ses1v1m2 (1 vCore/2GB)"}
        db_user_name: {type: string, required: true,
                       note: "OpenSearch/Elasticsearch 관리자 계정명. userguide 확정 (2026-06-14) + api_docs SearchEngineInitConfigOptionRequest.database_user_name: 영문 소문자만 ^[a-z]*$ 2-20자"}
        db_user_password: {type: string, required: true,
                           note: "관리자 비밀번호. userguide 확정 (2026-06-14): 영문·숫자·특수문자(\\\", ', \\ 제외) 포함 8-30자 (api_docs도 length 8-30)"}
        license: {type: string, default: "",
                  note: "userguide 확정 (2026-06-14, overview): \"Elasticsearch Enterprise는 사용자 보유 라이선스(BYOL)\". api_docs SearchEngineClusterCreateRequest.license = optional any-of[string,null]. OpenSearch 엔진은 라이선스 불요라 빈 문자열 기본 — Elasticsearch 변형은 BYOL 키 주입 필요 (계정 자격, R3 게이트)"}
    capture: {cluster_id: "$.resource.id"}
    delete: {endpoint: "DELETE /v1/clusters/{cluster_id}", destructive: true}
    provenance: docs
    source: {lifecycle: searchengine-cluster-subops-guarded,
             steps: [list-clusters, capture-subop-ids, add-instances]}
    notes: "소스 lifecycle은 기존 cluster adopt형 coverage probe — create body는 api_bodies searchenginecreatecluster 형상의 UNPROVEN(docs) 템플릿 (role_type ACTIVE는 doc sample 그대로; subops의 add-instances도 ACTIVE를 보냈다). backup_option 값은 se-backup 스텝의 값(7일/02시)을 재사용. capture envelope $.resource.id는 DBaaS AsyncResponse 패턴 추론(eventstreams quirk와 동일 프레임워크) — UNPROVEN. userguide 확정 (2026-06-14, overview + how_to_guides): 선행=VPC/Subnet (전용 가상망 필수); 노드 구성=master+data, data 노드 최소1/최대10(전용 master 없을 때)·최대50(전용 master 설치 시), is_combined=false면 master/data 분리, dual-role은 is_combined 변형; cluster name ^[a-zA-Z]*$ 3-20 (api_docs), instance_name_prefix ^[a-z][a-zA-Z0-9\\-]*$ 3-13 (api_docs, postfix 001/002 자동), database_port 9200 기본; storage block_storage_groups[].size_gb 16-5120 GB 8의 배수, tags 최대 50; default port 9200. add-instances는 SearchEngineClusterAddInstancesRequest {instance_count REQ, service_ip_addresses REQ, public_ip_ids opt} (eventstreams add-instances 모델과 동일 — instances[] 배열 아님). 대시보드 재시작(dashboard-restart) 등 sub-op은 task가 아닌 lifecycle 영역. 라이프사이클: create→(modify: add-instances/resize-server-type/resize-block-storage)·start/stop/restart→backup/restore·patch(minor)→delete."
