# Resource-task model — compute/baremetal (cp-bm group, Bare Metal Server).
# Schema: docs/RESOURCE-MODEL-PLAN.md §1 · extracted from
# baremetal-server-coverage (enabled+heavy but COVERAGE-ONLY: docs-derived
# bodies, synthetic ids, no real server ever provisioned -> provenance docs).
version: 1
resources:
  baremetal-server:
    code: "cp-bm-server"
    service: compute/baremetal
    heavy: true
    requires: [vpc, subnet]
    create:
      endpoint: "POST /v1/baremetals"
      body:
        vpc_id: "{vpc.vpc_id}"
        subnet_id: "{subnet.subnet_id}"
        image_id: "IMAGE-regrCoverageProbe000000"
        region_id: "{region}"
        os_user_id: regruser
        os_user_password: "RegrCoverageProbe!1"
        lock_enabled: false
        use_placement_group: false
        server_details:
          - {bare_metal_server_name: "regrbm{unique}",
             server_type_id: "PRODUCT-regrCoverageProbe00",
             nat_enabled: false, use_hyper_threading: true}
        tags:
          - {key: regr_coverage, value: probe}
    delete: {endpoint: "DELETE /v1/baremetals", destructive: true}
    provenance: docs
    source: {lifecycle: baremetal-server-coverage,
             steps: [create-baremetals, delete-baremetals]}
    notes: "UNPROVEN 전체 (api_bodies 엔트리 없음; 소스는 synthetic id로 4xx 보장하는 커버리지 전용 — capture/response envelope 미관측이라 capture 없음). vpc/subnet은 이 모델이 처음 배선; image_id/server_type_id는 BM 전용 카탈로그 lookup 엔드포인트가 미확인이라 synthetic literal 유지 (R3: BM image/server-type lookup 노드 추가 후 배선). 삭제는 path-id 없는 BULK DELETE로 body {baremetal_id_list: [...]}가 필요한데 모델 delete 스키마는 body를 못 싣는다 — capture+bulk-delete-body 지원 전까지 합성 불가에 가깝다. 제약 (services/compute__baremetal.yaml): 서버명 lowercase 3-15자 '-'금지(끝), 계정당 동시 BM 관리작업 1개(병렬 lifecycle 충돌 — 직렬 lane 필수), Security Group 미지원(Firewall+TGW 전용, VS와 별도 VPC), 단일 삭제는 Block Storage(BM) orphan을 남긴다. NAT/Public IP는 서버 1대 + VPC에 IGW 있을 때만. HEAVY: billable + slow."
