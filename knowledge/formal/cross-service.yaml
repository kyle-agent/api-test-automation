# Layer 2 — CROSS-SERVICE knowledge: the resource dependency graph + constraints
# that span more than one service. (Per-service knowledge lives in services/;
# flow-level knowledge in flows.yaml.) Schema: knowledge/formal/FORMAT.md.
# Validate with: python knowledge/formal/validate.py
#
# requires: = must exist BEFORE this resource is created (scenarios create them
#             inline and tear down in reverse order).
# lookups:  = read-only finds the create needs (no resource is created).

version: 1

# Constraints that only make sense ACROSS services (one service's resource
# affecting another service's API behaviour).
#
# Docs source: every userguide service page has a 선행 서비스 (prerequisite
# services) section — https://docs.e.samsungsdscloud.com/userguide/<cat>/<svc>/overview/
# Confirmed so far: virtual_server -> VPC + Security Group; k8s_engine -> VPC +
# Security Group + File Storage; container_registry/security_group -> none.
# These MATCH the validated graph below (graph stays VALIDATED, the stronger tag).
cross_constraints:
  - id: ske-volume-is-filestorage
    services: [container/ske, storage/filestorage]
    rule: "an SKE cluster's volume_id must be a storage/filestorage volume id (created first; torn down after the cluster)"
    provenance: VALIDATED
  - id: server-needs-networking-bundle
    services: [compute/virtualserver, networking/vpc, networking/security-group]
    rule: "a VM create needs live vpc + subnet (networking/vpc) and a security-group (networking/security-group) plus keypair/image/server-type lookups from its own service"
    provenance: VALIDATED
  - id: shared-path-roots-need-per-service-hosts
    services: [container/ske, database/mysql, database/mariadb, database/postgresql, database/epas, database/sqlserver, database/cachestore]
    rule: "path roots collide across services (/v1/clusters, /v1/parameters are used by ske + every DBaaS engine) — every call MUST target its own per-service host; coverage matching by (method, path) alone over-counts (each engine needs its own lifecycle)"
    provenance: VALIDATED
  - id: shared-subnet-fixed-ip-no-collision
    services: [networking/vpc, networking/loadbalancer]
    rule: "lifecycles adopting the ONE shared subnet must pin fixed host IPs at DISTINCT addresses (dependencies.json vpc_schedule.fixed_ip_map; .1 reserved for gateway) so parallel adopters never claim the same IP"
    provenance: VALIDATED
  - id: firewall-implicit-on-gateway-resources
    services: [networking/firewall, networking/vpc, networking/direct-connect, networking/loadbalancer]
    rule: "a Firewall is never created standalone — it is minted by enabling 'Firewall 사용' on an Internet Gateway, Transit Gateway (Uplink Firewall), Direct Connect or Load Balancer (userguide firewall how_to). Firewall-rule scenarios must first create one of those carriers and capture its firewall_id"
    provenance: docs
  - id: gslb-monitoring-needs-target-allowlist
    services: [networking/gslb, networking/firewall, networking/security-group]
    rule: "GSLB health monitoring only reaches a connection target if the target's Firewall AND Security Group allow the GSLB monitor traffic (userguide) — combo scenarios pairing GSLB with LB/VM targets need allow rules on both layers"
    provenance: docs
  - id: dc-prereq-security-group
    services: [networking/direct-connect, networking/security-group]
    rule: "Security Group is a documented 선행 서비스 of Direct Connect (userguide) — the DC create body itself only needs the VPC, but workloads behind the DC are expected to be SG-protected; keep an SG in DC combo scenarios"
    provenance: docs

resources:
  # --- networking ------------------------------------------------------------
  vpc:
    service: networking/vpc
    requires: []
    quota: vpc
    provenance: VALIDATED
    notes: "cidr e.g. 10.x.0.0/20; poll $.vpc.state == ACTIVE; CIDRs must not overlap across live VPCs"
  subnet:
    service: networking/vpc
    requires: [vpc]
    provenance: VALIDATED
    notes: "type GENERAL; CIDR must be a sub-range of the VPC CIDR; poll $.subnet.state == ACTIVE"
  port:
    service: networking/vpc
    requires: [subnet]
    provenance: VALIDATED
    notes: "security_groups: [] is accepted"
  internet-gateway:
    service: networking/vpc
    requires: [vpc]
    provenance: VALIDATED
  public-ip:
    service: networking/vpc
    requires: []
    provenance: VALIDATED
    notes: "type IGW; standalone"
  security-group:
    service: networking/security-group
    requires: []
    provenance: VALIDATED
    notes: "account/region-scoped — NO vpc needed"
  load-balancer:
    service: networking/loadbalancer
    requires: [vpc, subnet]
    provenance: docs
    notes: "consumes 4 IPs from the service subnet (service + SNAT + 2 health-check); SNAT/HC IPs immutable after create; public NAT additionally needs an internet-gateway on the VPC"
  lb-health-check:
    service: networking/loadbalancer
    requires: []
    provenance: docs
    notes: "region-scoped (quota 500/region); reusable across server groups — create BEFORE the server group that references it (run 27306490231 LbHealthCheckNotFoundError was an ordering/capture miss)"
  lb-server-group:
    service: networking/loadbalancer
    requires: [load-balancer]
    lookups: [lb-health-check]
    provenance: docs
    notes: "attaches to exactly ONE load balancer; selects a default or pre-created lb-health-check"
  lb-member:
    service: networking/loadbalancer
    requires: [lb-server-group]
    provenance: docs
    notes: "must be a VS/BM server in the SAME VPC as the LB, or a directly entered IP (cheapest for tests)"
  private-dns:
    service: networking/dns
    requires: []
    quota: private-dns
    provenance: VALIDATED
    notes: "needs an activate sub-flow before hosted-zone use. CREATE/DELETE are VERY slow (hours observed) — isolate on its own lane/VPC, create-first/delete-last (see services/networking__dns.yaml)"
  hosted-zone:
    service: networking/dns
    requires: [private-dns]
    provenance: docs
    notes: "private hosted zone targets VPCs connected to the (Active) private-dns; max 20 zones/account, 100 records/zone; private-dns cannot be terminated while a hosted-zone exists (delete zone first)"
  vpn-gateway:
    service: networking/vpn
    requires: [vpc, public-ip]
    provenance: docs
    notes: "create needs name (3-20 ALNUM ONLY) + vpc + public ip; max 3/account; kr-west1/east1/south3 only; cannot delete while tunnels exist or state is Creating/Editing"
  vpn-tunnel:
    service: networking/vpn
    requires: [vpn-gateway]
    provenance: docs
    notes: "max 5 per gateway; needs peer GW IP + remote subnet CIDR(s, max 10) + PSK(8-64) + IKE/IPSec/DPD blocks"
  direct-connect:
    service: networking/direct-connect
    requires: [vpc]
    provenance: docs
    notes: "1:1 per VPC in a service zone (second create on the shared VPC must fail); max 5/account; name 3-20 alnum only; uplink 1G|10G required"
  gslb:
    service: networking/gslb
    requires: []
    provenance: docs
    notes: "account-scoped, no prereqs; kr-west1/east1 only; domain label 4-40 lowercase+digits; max 20 domains/account, 8 targets/domain"
  cdn:
    service: networking/cdn
    requires: []
    provenance: docs
    notes: "account-scoped, no prereqs; kr-west1/east1 only; Akamai-backed async workflow; max 20 domains/account"

  # --- compute ----------------------------------------------------------------
  keypair:
    service: compute/virtualserver
    requires: []
    provenance: VALIDATED
    notes: "standalone, zero-cost"
  server:
    service: compute/virtualserver
    requires: [vpc, subnet, security-group, keypair]
    lookups: [image, server-type]
    provenance: VALIDATED
    notes: "heavy (~17 min, billable)"
  block-volume:
    service: compute/virtualserver
    requires: []
    provenance: VALIDATED
    notes: "standalone (no vpc)"
  volume-snapshot:
    service: compute/virtualserver
    requires: [block-volume]
    provenance: VALIDATED

  # --- container --------------------------------------------------------------
  ske-cluster:
    service: container/ske
    requires: [vpc, subnet, security-group, keypair, filestorage-volume]
    lookups: [kubernetes-version, server-type]
    provenance: VALIDATED
    notes: "heavy (~27 min, billable)"
  ske-nodepool:
    service: container/ske
    requires: [ske-cluster]
    provenance: VALIDATED
  scr-registry:
    service: container/scr
    requires: []
    provenance: VALIDATED
    notes: "poll $.state == Running; DELETE 500-races for minutes — retry"
  scr-repository:
    service: container/scr
    requires: [scr-registry]
    provenance: VALIDATED

  # --- storage ----------------------------------------------------------------
  filestorage-volume:
    service: storage/filestorage
    requires: []
    provenance: VALIDATED
    notes: "standalone NFS volume (no vpc)"

  # --- database ---------------------------------------------------------------
  mysql-cluster:
    service: database/mysql
    requires: [vpc, subnet]
    provenance: VALIDATED
    notes: "heavy, billable"
  postgresql-cluster:
    service: database/postgresql
    requires: [vpc, subnet]
    provenance: VALIDATED
    notes: "heavy, billable"

  # --- security ---------------------------------------------------------------
  certificate:
    service: security/certificatemanager
    requires: []
    provenance: VALIDATED
    notes: "self-sign flow is standalone; import flow currently unsatisfiable"
  kms-key:
    service: security/kms
    requires: []
    provenance: VALIDATED
  secret:
    service: security/secretsmanager
    requires: []
    provenance: VALIDATED

  # --- application / management -------------------------------------------
  queue:
    service: application-service/queueservice
    requires: []
    provenance: VALIDATED
  resource-group:
    service: management/resourcemanager
    requires: []
    provenance: VALIDATED
    notes: "global (account-scoped) service — no region segment in host"

  # --- security/management/storage prerequisites (userguide ingestion 2026-06-11,
  # provenance docs — see knowledge/formal/services/* for the page-level facts) --
  archive-storage-account:
    service: storage/archivestorage
    requires: []
    provenance: docs
    notes: "needs its OWN 인증키 (IAM My Info > 인증키 관리) — platform HMAC creds alone 401; key expiry/suspension revokes access"
  backup-policy:
    service: storage/backup
    requires: [server]
    provenance: docs
    notes: "agent-type backups need a Backup Agent installed on the target server first; retention enum 14/31/93/186/365 days"
  kms-key:
    service: security/kms
    requires: []
    provenance: docs
  secretsmanager-secret:
    service: security/secretsmanager
    requires: [kms-key]
    provenance: docs
    notes: "encrypt-capable KMS key required; 퍼블릭 접근 제어 IP list is a REQUIRED create field; delete enters 7-30 day waiting period"
  secretvault-vault:
    service: security/secretvault
    requires: []
    provenance: docs
    notes: "needs a pre-existing IAM auth key in 임시키 mode (not expired, >=30d left); 1 key per vault; vault blocks deletion of its auth key"
  certificate:
    service: security/certificatemanager
    requires: []
    provenance: docs
    notes: "PEM validated at create (decrypted RSA key, single body cert, Intermediate->Root chain order); delete blocked while attached to LB listeners"
  iam-identity-center:
    service: management/iam-identity-center
    requires: []
    provenance: docs
    notes: "only the Organization MANAGEMENT account can create (Organization prereq); single region; not in kr-south3 — explains smoke 400s (entitlement, not body)"
  cloudcontrol-landing-zone:
    service: management/cloudcontrol
    requires: [iam-identity-center]
    provenance: docs
    notes: "needs Organization + ID Center + Object Storage + Logging&Audit and management-account privileges; provisions real shared accounts/OUs — waiver class like organization; explains smoke 403s"
  scf-function:
    service: compute/scf
    requires: []
    provenance: docs
    notes: "kr-west1/kr-east1 only; every config/code change flips status to Deploying (poll before next write); Java runtime additionally needs Object Storage + auth key"
  baremetal-server:
    service: compute/baremetal
    requires: [vpc]
    provenance: docs
    notes: "ONE BM management op per account at a time (parallel lifecycles collide); no Security Groups (Firewall+TGW only); single-server delete orphans attached Block Storage(BM)"
  cloud-ml:
    service: ai-ml/cloud-ml
    requires: [ske-cluster, container-registry]
    provenance: docs
    notes: "owner 2026-06-11: references an EXISTING ske cluster (no create-along fork — corrected) + needs the container registry's console-issued 인증키 (credential precondition, not a create step)"
  container-registry:
    service: container/scr
    requires: []
    provenance: docs
    notes: "registry itself is API-creatable; its 인증키 is console-issued (credential class — see ai-ml__cloud-ml.yaml / SCR-push blocker)"
  aimlops-platform:
    service: ai-ml/aimlops-platform
    requires: [ske-cluster]
    provenance: docs
    notes: "owner 2026-06-11: ske-cluster prerequisite has a REAL existing-or-create fork — reference an existing cluster OR provision a new one inside the aimlops create (branch carries SKE's full closure + cost). See ai-ml__aimlops-platform.yaml"
quotas:
  vpc:
    limit: 5
    scope: account
    provenance: VALIDATED
    notes: "cap is 5, validated live by 'The number(5) of VPCs ... exceeded' (run 27306490231); the earlier limit=3 was wrong. See dependencies.json vpc_schedule (per_run_vpc_cap=4 leaves 1 slot headroom) and the shared-VPC adopt strategy"
  private-dns:
    limit: 3
    scope: account
    provenance: VALIDATED
