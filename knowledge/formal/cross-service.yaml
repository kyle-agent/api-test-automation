# Layer 2 — CROSS-SERVICE knowledge: the resource dependency graph + constraints
# that span more than one service. (Per-service knowledge lives in services/;
# flow-level knowledge in flows.yaml.) Schema: knowledge/formal/FORMAT.md.
# Validate with: python knowledge/formal/validate.py
#
# requires: = must exist BEFORE this resource is created (scenarios create them
#             inline and tear down in reverse order).
# lookups:  = read-only finds the create needs (no resource is created).

version: 1

# Constraints that only make sense ACROSS services (one service's resource
# affecting another service's API behaviour).
#
# Docs source: every userguide service page has a 선행 서비스 (prerequisite
# services) section — https://docs.e.samsungsdscloud.com/userguide/<cat>/<svc>/overview/
# Confirmed so far: virtual_server -> VPC + Security Group; k8s_engine -> VPC +
# Security Group + File Storage; container_registry/security_group -> none.
# These MATCH the validated graph below (graph stays VALIDATED, the stronger tag).
cross_constraints:
  - id: ske-volume-is-filestorage
    services: [container/ske, storage/filestorage]
    rule: "an SKE cluster's volume_id must be a storage/filestorage volume id (created first; torn down after the cluster)"
    provenance: VALIDATED
  - id: server-needs-networking-bundle
    services: [compute/virtualserver, networking/vpc, networking/security-group]
    rule: "a VM create needs live vpc + subnet (networking/vpc) and a security-group (networking/security-group) plus keypair/image/server-type lookups from its own service"
    provenance: VALIDATED
  - id: shared-path-roots-need-per-service-hosts
    services: [container/ske, database/mysql, database/mariadb, database/postgresql, database/epas, database/sqlserver, database/cachestore]
    rule: "path roots collide across services (/v1/clusters, /v1/parameters are used by ske + every DBaaS engine) — every call MUST target its own per-service host; coverage matching by (method, path) alone over-counts (each engine needs its own lifecycle)"
    provenance: VALIDATED
  - id: shared-subnet-fixed-ip-no-collision
    services: [networking/vpc, networking/loadbalancer]
    rule: "lifecycles adopting the ONE shared subnet must pin fixed host IPs at DISTINCT addresses (dependencies.json vpc_schedule.fixed_ip_map; .1 reserved for gateway) so parallel adopters never claim the same IP"
    provenance: VALIDATED

resources:
  # --- networking ------------------------------------------------------------
  vpc:
    service: networking/vpc
    requires: []
    quota: vpc
    provenance: VALIDATED
    notes: "cidr e.g. 10.x.0.0/20; poll $.vpc.state == ACTIVE; CIDRs must not overlap across live VPCs"
  subnet:
    service: networking/vpc
    requires: [vpc]
    provenance: VALIDATED
    notes: "type GENERAL; CIDR must be a sub-range of the VPC CIDR; poll $.subnet.state == ACTIVE"
  port:
    service: networking/vpc
    requires: [subnet]
    provenance: VALIDATED
    notes: "security_groups: [] is accepted"
  internet-gateway:
    service: networking/vpc
    requires: [vpc]
    provenance: VALIDATED
  public-ip:
    service: networking/vpc
    requires: []
    provenance: VALIDATED
    notes: "type IGW; standalone"
  security-group:
    service: networking/security-group
    requires: []
    provenance: VALIDATED
    notes: "account/region-scoped — NO vpc needed"
  load-balancer:
    service: networking/loadbalancer
    requires: [vpc, subnet]
    provenance: docs
  private-dns:
    service: networking/dns
    requires: []
    quota: private-dns
    provenance: VALIDATED
    notes: "needs an activate sub-flow before hosted-zone use. CREATE/DELETE are VERY slow (hours observed) — isolate on its own lane/VPC, create-first/delete-last (see services/networking__dns.yaml)"

  # --- compute ----------------------------------------------------------------
  keypair:
    service: compute/virtualserver
    requires: []
    provenance: VALIDATED
    notes: "standalone, zero-cost"
  server:
    service: compute/virtualserver
    requires: [vpc, subnet, security-group, keypair]
    lookups: [image, server-type]
    provenance: VALIDATED
    notes: "heavy (~17 min, billable)"
  block-volume:
    service: compute/virtualserver
    requires: []
    provenance: VALIDATED
    notes: "standalone (no vpc)"
  volume-snapshot:
    service: compute/virtualserver
    requires: [block-volume]
    provenance: VALIDATED

  # --- container --------------------------------------------------------------
  ske-cluster:
    service: container/ske
    requires: [vpc, subnet, security-group, keypair, filestorage-volume]
    lookups: [kubernetes-version, server-type]
    provenance: VALIDATED
    notes: "heavy (~27 min, billable)"
  ske-nodepool:
    service: container/ske
    requires: [ske-cluster]
    provenance: VALIDATED
  scr-registry:
    service: container/scr
    requires: []
    provenance: VALIDATED
    notes: "poll $.state == Running; DELETE 500-races for minutes — retry"
  scr-repository:
    service: container/scr
    requires: [scr-registry]
    provenance: VALIDATED

  # --- storage ----------------------------------------------------------------
  filestorage-volume:
    service: storage/filestorage
    requires: []
    provenance: VALIDATED
    notes: "standalone NFS volume (no vpc)"

  # --- database ---------------------------------------------------------------
  mysql-cluster:
    service: database/mysql
    requires: [vpc, subnet]
    provenance: VALIDATED
    notes: "heavy, billable"
  postgresql-cluster:
    service: database/postgresql
    requires: [vpc, subnet]
    provenance: VALIDATED
    notes: "heavy, billable"

  # --- security ---------------------------------------------------------------
  certificate:
    service: security/certificatemanager
    requires: []
    provenance: VALIDATED
    notes: "self-sign flow is standalone; import flow currently unsatisfiable"
  kms-key:
    service: security/kms
    requires: []
    provenance: VALIDATED
  secret:
    service: security/secretsmanager
    requires: []
    provenance: VALIDATED

  # --- application / management -------------------------------------------
  queue:
    service: application-service/queueservice
    requires: []
    provenance: VALIDATED
  resource-group:
    service: management/resourcemanager
    requires: []
    provenance: VALIDATED
    notes: "global (account-scoped) service — no region segment in host"

quotas:
  vpc:
    limit: 5
    scope: account
    provenance: VALIDATED
    notes: "cap is 5, validated live by 'The number(5) of VPCs ... exceeded' (run 27306490231); the earlier limit=3 was wrong. See dependencies.json vpc_schedule (per_run_vpc_cap=4 leaves 1 slot headroom) and the shared-VPC adopt strategy"
  private-dns:
    limit: 3
    scope: account
    provenance: VALIDATED
