[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --html=reports/report.html --self-contained-html --junitxml=reports/junit.xml
markers =
    smoke: catalog-driven reachability/regression checks (read-only by default)
    crud: ordered create-read-update-delete lifecycle tests (mutating, opt-in)
