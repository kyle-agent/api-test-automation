name: SCP API Test (orchestrator)

# Single orchestrator for the two-axis architecture (see ARCHITECTURE.md).
# It calls the NEW package entrypoints (the legacy tools/ scripts were deleted).
#
#   refresh spec (catalog)                          [support A · spec/]
#     -> AXIS 1 regression  (smoke + read-chains, then opt-in CRUD)   [regression/]
#     -> sweep              (registry-driven reconciler, tag-scoped)  [support C · cleanup/]
#     -> AXIS 2 conformance (static + runtime + baseline)             [conformance/]
#     -> build + publish dashboard                                    [support B · dashboard/]
#
# Secrets/vars are configured in the repo settings (see README). Every job
# exports APITEST_RUN_ID so core.registry stamps an owner+run tag on every
# created resource and the reconciler deletes ONLY this run's tag (no cross-run
# nuking).
on:
  # NOTE: scheduled (cron) triggers removed on request — no daily automation.
  # LIVE runs are expensive (~15-60 min), so they are ON-DEMAND only:
  #   * touch .github/run-request and push  -> runs on that branch
  #     (this is how a chat session triggers a run: edit the file, push)
  #   * workflow_dispatch                   -> runs with explicit inputs
  # Ordinary pushes/PRs do NOT trigger this workflow — the cheap offline
  # validation lives in validate.yml and runs on every PR instead.
  # File-triggered runs read KEY=VALUE options from the run-request file
  # itself (mutations/destructive/heavy/conformance/category/service/
  # crud_filter) — parsed by the spec job, honored by every gate. So a chat
  # session can start ANY kind of run by writing the file and pushing.
  push:
    # The file does not need to pre-exist: creating or editing it in a push is
    # the trigger. Keep it OUT of unrelated commits so merges stay silent.
    # SEQUENCING RULE (owner, 2026-06-10): do NOT push ANY run-request-touching
    # commit (including the consume/delete) while a previous workflow run —
    # INCLUDING its sweep job — is still in progress. Wait for the whole run
    # to conclude first.
    paths: [".github/run-request"]
  workflow_dispatch:
    inputs:
      suite:
        description: "Named suite from suites/*.yaml (e.g. smoke, full). Suite values OR into the gates below; explicit inputs still apply on top."
        required: false
        default: ""
      profile:
        description: "Environment profile from environments/*.yaml (e.g. stage-kr-west1). Blank = repo vars (current behaviour)."
        required: false
        default: ""
      category:
        description: "Limit to one category (e.g. compute). Blank = all."
        required: false
        default: ""
      service:
        description: "Limit to one service (e.g. virtualserver). Blank = all."
        required: false
        default: ""
      refresh_catalog:
        description: "Re-scrape the API Reference (catalog) before testing"
        type: boolean
        default: false
      allow_mutations:
        description: "Run mutating CRUD lifecycles (creates/updates REAL resources)"
        type: boolean
        default: false
      allow_destructive:
        description: "Also allow DELETE in CRUD lifecycles + the cleanup sweep"
        type: boolean
        default: false
      run_heavy:
        description: "Also run HEAVY lifecycles (real VM + K8s cluster + DB, ~40+ min each)"
        type: boolean
        default: false
      crud_filter:
        description: "Limit CRUD lifecycles to a -k expression (e.g. database-mysql-cluster). Blank = all enabled."
        required: false
        default: ""
      probe:
        description: "Axis-2 runtime probe to run (conformance.runtime --probe)."
        type: choice
        required: false
        default: "all"
        options:
          - all
          - schema
          - status
          - notfound
          - errors
          - pagination
          - options
          - l10n
          - validation
          - schema-live
      probe_category:
        description: "Limit runtime probes to one category (e.g. database). Blank = all. Falls back to `category` if blank."
        required: false
        default: ""
      probe_limit:
        description: "Stop each runtime probe after N targets (0 = all)."
        required: false
        default: "0"
      probe_filter:
        description: "schema-live only: limit lifecycles whose id contains this (blank = all light)."
        required: false
        default: ""
      run_schema_live:
        description: "Enable the data-based, BILLABLE schema-live probe (creates+deletes REAL resources). Opt-in gate."
        type: boolean
        default: false
      run_conformance:
        description: "Run AXIS 2 conformance. Default OFF — conformance only runs when the spec changed, on run-conformance branch pushes, or with this flag."
        type: boolean
        default: false
      update_baseline:
        description: "Re-baseline conformance (treat current defects as the new baseline)"
        type: boolean
        default: false

# One concurrency group per ref+run keeps the two axes from colliding while
# still letting independent runs proceed (no single global group).
concurrency:
  group: scp-api-test-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  # --- endpoint (per-service hosts: <service>.<region>.<env>.samsungsdscloud.com) ---
  SCP_REGION: ${{ vars.SCP_REGION || 'kr-west1' }}
  SCP_ENV: ${{ vars.SCP_ENV || 'e' }}
  SCP_HOST_TEMPLATE: ${{ vars.SCP_HOST_TEMPLATE }}
  SCP_SERVICE_HOSTS: ${{ vars.SCP_SERVICE_HOSTS }}
  SCP_BASE_URL: ${{ secrets.SCP_BASE_URL }}
  # --- credentials (repository secrets) ---
  SCP_ACCESS_KEY: ${{ secrets.SCP_ACCESS_KEY }}
  SCP_SECRET_KEY: ${{ secrets.SCP_SECRET_KEY }}
  SCP_PROJECT_ID: ${{ secrets.SCP_PROJECT_ID }}
  SCP_AUTH_SCHEME: ${{ vars.SCP_AUTH_SCHEME || 'hmac' }}
  # --- run behaviour ---
  SCP_TIMEOUT: ${{ vars.SCP_TIMEOUT || '20' }}
  SCP_MAX_RETRIES: ${{ vars.SCP_MAX_RETRIES || '2' }}
  PYTHONPATH: ${{ github.workspace }}
  # core.registry stamps (owner, run_id, axis, ttl) on every created resource
  # so the reconciler deletes only THIS run's tag.
  APITEST_RUN_ID: ${{ github.run_id }}
  # --- ops log (core/oplog.py): persistent S3-compatible bucket where every
  # job drops progress events; the static ops dashboard reads it directly.
  # Same access/secret keys as the Open APIs (owner-confirmed 2026-06-11).
  # Override the endpoint with the Object Storage Public URL if the
  # per-service-host default guess is wrong.
  SCP_OPLOG_BUCKET: ${{ vars.SCP_OPLOG_BUCKET || 'apitest-oplog-permanent' }}
  SCP_OPLOG_S3_ENDPOINT: ${{ vars.SCP_OPLOG_S3_ENDPOINT }}
  # --- platform control plane mirror (core/oplog.py): when the var is set,
  # every milestone/resource event is ALSO POSTed to the platform server's
  # /api/ingest/events (fire-and-forget; a down server never affects the run).
  APITEST_PLATFORM_URL: ${{ vars.APITEST_PLATFORM_URL }}
  APITEST_PLATFORM_TOKEN: ${{ secrets.APITEST_PLATFORM_TOKEN }}

jobs:
  # ---------------------------------------------------------------------------
  # support A · spec/  — refresh the catalog (and diff vs the published one).
  # ---------------------------------------------------------------------------
  spec:
    name: Refresh spec (catalog)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      ran: "true"
      # 'true' only when a catalog refresh actually changed the spec — used to
      # gate the conformance job (no point re-judging an unchanged spec).
      spec_changed: ${{ steps.specdiff.outputs.spec_changed || 'false' }}
      # Options resolved from the suite (suites/*.yaml) + .github/run-request
      # (file-triggered runs) — the chat-controllable equivalent of
      # workflow_dispatch inputs. Suite defaults apply first; explicit
      # run-request lines override them.
      req_suite: ${{ steps.req.outputs.suite }}
      req_profile: ${{ steps.req.outputs.profile }}
      req_mutations: ${{ steps.req.outputs.mutations }}
      req_destructive: ${{ steps.req.outputs.destructive }}
      req_sweep_force: ${{ steps.req.outputs.sweep_force }}
      req_heavy: ${{ steps.req.outputs.heavy }}
      req_conformance: ${{ steps.req.outputs.conformance }}
      req_category: ${{ steps.req.outputs.category }}
      req_service: ${{ steps.req.outputs.service }}
      req_crud_filter: ${{ steps.req.outputs.crud_filter }}
      req_docker_probe: ${{ steps.req.outputs.docker_probe }}
      req_sweep_extra_names: ${{ steps.req.outputs.sweep_extra_names }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Resolve run options (suite + .github/run-request)
        id: req
        # A run is "suite × profile" (docs/PLATFORM-PLAN.md). The suite
        # (suites/*.yaml, via the dispatch input or a `suite=<id>` line in the
        # run-request file) expands to KEY=VALUE defaults; explicit KEY=VALUE
        # lines in .github/run-request (push events) override them — last one
        # wins, # comments ignored. An unknown suite id fails here, BEFORE
        # anything touches the live API.
        run: |
          f=.github/run-request
          SUITE="${{ github.event.inputs.suite }}"
          if [ -z "$SUITE" ] && [ "${{ github.event_name }}" = "push" ] && [ -f "$f" ]; then
            SUITE="$(grep -E '^suite=' "$f" 2>/dev/null | tail -1 | cut -d= -f2- | tr -d '[:space:]')"
          fi
          : > /tmp/suite.req
          if [ -n "$SUITE" ]; then
            python -m core.suites render "$SUITE" > /tmp/suite.req
            echo "suite $SUITE expands to:"; grep -E '^[a-z_]+=' /tmp/suite.req
          fi
          # trim only LEADING/TRAILING whitespace — crud_filter values contain
          # spaces ("a or b") that must survive.
          get() { { cat /tmp/suite.req; if [ "${{ github.event_name }}" = "push" ] && [ -f "$f" ]; then cat "$f"; fi; } | grep -E "^$1=" 2>/dev/null | tail -1 | cut -d= -f2- | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          PROFILE="${{ github.event.inputs.profile }}"
          [ -z "$PROFILE" ] && PROFILE="$(get profile)"
          {
            echo "suite=$SUITE"
            echo "profile=$PROFILE"
            echo "mutations=$(get mutations)"
            echo "destructive=$(get destructive)"
            echo "sweep_force=$(get sweep_force)"
            echo "heavy=$(get heavy)"
            echo "conformance=$(get conformance)"
            echo "category=$(get category)"
            echo "service=$(get service)"
            echo "crud_filter=$(get crud_filter)"
            echo "docker_probe=$(get docker_probe)"
            echo "sweep_extra_names=$(get sweep_extra_names)"
          } >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ] && [ -f "$f" ]; then
            echo "run-request options:"; grep -E '^[a-z_]+=' "$f" || echo "(none — read-only smoke run)"
          fi
      - name: Apply environment profile
        if: ${{ steps.req.outputs.profile != '' }}
        # environments/<id>.yaml -> SCP_* vars for every later step in THIS job
        # (the other jobs apply the same profile themselves). Values are not
        # echoed: the export resolves credential references.
        run: |
          python -m core.profiles export "${{ steps.req.outputs.profile }}" >> "$GITHUB_ENV"
          echo "applied environment profile: ${{ steps.req.outputs.profile }}"
      - name: Validate scenario data (merged fragments, ids, paths)
        # Offline guard: catches duplicate lifecycle ids / unresolvable paths /
        # broken captures across scenarios.json + lifecycles/*.json fragments
        # BEFORE anything touches the live API.
        run: |
          python -m regression.scenarios.validate
          python knowledge/formal/validate.py
      - name: Verify configuration
        run: |
          if [ -z "$SCP_ACCESS_KEY" ] || [ -z "$SCP_SECRET_KEY" ]; then
            echo "::error::Missing credentials. Set SCP_ACCESS_KEY and SCP_SECRET_KEY in repo Settings > Secrets."
            exit 1
          fi
          if [ -z "$SCP_REGION" ] && [ -z "$SCP_BASE_URL" ] && [ -z "$SCP_SERVICE_HOSTS" ]; then
            echo "::error::Set SCP_REGION (variable) so per-service hosts can be built, or SCP_BASE_URL/SCP_SERVICE_HOSTS."
            exit 1
          fi
      - name: Oplog — ensure bucket + run-start event
        continue-on-error: true
        run: |
          python -m core.oplog ensure || true
          python -m core.oplog ensure-logsink || true
          python -m core.oplog emit --stage run-start --status running --job spec \
            --detail "event=${{ github.event_name }} mutations=${{ steps.req.outputs.mutations }} destructive=${{ steps.req.outputs.destructive }} heavy=${{ steps.req.outputs.heavy }}" || true
      - name: Diff catalog vs published (incremental signal)
        id: specdiff
        if: ${{ github.event.inputs.refresh_catalog == 'true' }}
        continue-on-error: true
        run: |
          # Stash the current committed catalog, re-scrape, then diff old->new so
          # only changed endpoints need re-evaluation (smaller blast radius).
          cp data/api_catalog.json /tmp/catalog_old.json 2>/dev/null || true
          python -m spec.extract_catalog
          python -m spec.extract_bodies || true
          if [ -f /tmp/catalog_old.json ]; then
            python -m spec.diff /tmp/catalog_old.json data/api_catalog.json | tee -a "$GITHUB_STEP_SUMMARY" || true
            if ! cmp -s /tmp/catalog_old.json data/api_catalog.json; then
              echo "spec_changed=true" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Catalog summary
        run: python -m spec.summary >> "$GITHUB_STEP_SUMMARY" || true
      - name: Upload refreshed catalog
        if: ${{ github.event.inputs.refresh_catalog == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: api-catalog
          path: |
            data/api_catalog.json
            data/spec
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # AXIS 1 · regression/  — does the API work? smoke + read-chains, then
  # opt-in CRUD. Followed by the registry-driven cleanup sweep (support C).
  # ---------------------------------------------------------------------------
  regression:
    name: AXIS1 regression (smoke + read-chains, opt-in CRUD)
    needs: spec
    runs-on: ubuntu-latest
    # SHARED-INFRA PARALLEL design, JOB A of the A∥B split. This job runs smoke
    # + read-chains (read-only), then the ADOPT-class CRUD pass (PARALLEL_K):
    # one shared VPC + one shared subnet provisioned ONCE, every lifecycle
    # adopts them (SCP_SHARED_VPC_ID/SCP_SHARED_SUBNET_ID env so every xdist
    # worker adopts the SAME live infra) and creates only its own child ->
    # safe with pytest-xdist `-n 6`.
    # The complementary VPC-CRUD class (VPC_CRUD_K — lifecycles that MUST
    # self-create/mutate/peer VPCs) runs in the PARALLEL `regression-vpc-crud`
    # job (B) so the full run's wall-clock is max(A, B), not A+B.
    # VPC math while A∥B overlap: account cap = 5 (VALIDATED live, run
    # 27306490231). A holds exactly 1 (shared) VPC; B is serial and its worst
    # lifecycle holds 2 (vpc-peering) -> 3 of 5, leaving headroom for leftovers
    # and the slow heavy-shared-networking teardown. PARALLEL_K and
    # VPC_CRUD_K are exact complements (derived from dependencies.json via
    # shared_infra --print-filters) so A+B partition ALL enabled CRUD
    # lifecycles with no overlap/orphan.
    timeout-minutes: 300
    permissions:
      contents: read
      pull-requests: write
    env:
      # --- safety gates (default OFF) -------------------------------------
      # Enabled by manual dispatch OR repo var SCP_RUN_CRUD=true (opt a PR in).
      SCP_ALLOW_MUTATIONS: ${{ (github.event.inputs.allow_mutations == 'true' || needs.spec.outputs.req_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
      SCP_ALLOW_DESTRUCTIVE: ${{ (github.event.inputs.allow_destructive == 'true' || needs.spec.outputs.req_destructive == 'true' || vars.SCP_RUN_CRUD == 'true') }}
      # Heavy lifecycles run ONLY via dispatch run_heavy=true (or repo var).
      SCP_RUN_HEAVY: ${{ (github.event.inputs.run_heavy == 'true' || needs.spec.outputs.req_heavy == 'true' || vars.SCP_RUN_HEAVY == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply environment profile
        if: ${{ (github.event.inputs.profile || needs.spec.outputs.req_profile) != '' }}
        run: |
          P="${{ github.event.inputs.profile || needs.spec.outputs.req_profile }}"
          python -m core.profiles export "$P" >> "$GITHUB_ENV"
          echo "applied environment profile: $P"
      - name: Verify configuration
        run: |
          if [ -z "$SCP_ACCESS_KEY" ] || [ -z "$SCP_SECRET_KEY" ]; then
            echo "::error::Missing credentials. Set SCP_ACCESS_KEY and SCP_SECRET_KEY in repo Settings > Secrets."
            exit 1
          fi

      - name: Derive lane filters (adopt vs vpc-crud partition)
        # ADOPT_K / VPC_CRUD_K / PARALLEL_K are derived from dependencies.json so
        # the workflow never hardcodes the classification. PARALLEL_K is the exact
        # complement of VPC_CRUD_K -> the two CRUD passes partition all enabled
        # CRUD lifecycles. Written to $GITHUB_ENV for the run steps below.
        if: ${{ !cancelled() && (github.event.inputs.allow_mutations == 'true' || needs.spec.outputs.req_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
        run: |
          python -m regression.scenarios.shared_infra --print-filters >> "$GITHUB_ENV"
          echo "derived ADOPT_K / VPC_CRUD_K / PARALLEL_K -> \$GITHUB_ENV"

      - name: Provision shared VPC + subnet (BEFORE smoke, with retry)
        # Creates ONE shared VPC + ONE shared subnet and appends SCP_SHARED_* to
        # $GITHUB_ENV so every xdist worker ADOPTS the same live infra. Runs
        # BEFORE the ~14-min smoke phase on purpose: run 27314355676 provisioned
        # AFTER smoke and collided with job B's VPC churn at its peak — the
        # provision failed silently, every adopt lifecycle fell back to
        # self-create, and 8 lifecycles (incl. heavy-shared-dbaas) skipped on
        # the 5-VPC cap. Provisioning at minute 0 (B holds at most 1 VPC then)
        # plus a 10x45s retry (B keeps freeing slots) wins the slot reliably.
        # Only well-formed SCP_SHARED_*= lines reach $GITHUB_ENV.
        if: ${{ !cancelled() && (github.event.inputs.allow_mutations == 'true' || needs.spec.outputs.req_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
        run: |
          for i in $(seq 1 10); do
            python -m regression.scenarios.shared_infra --provision > shared_ids.txt || true
            cat shared_ids.txt
            if grep -qE '^SCP_SHARED_VPC_ID=' shared_ids.txt; then
              grep -E '^SCP_SHARED_[A-Za-z0-9_]+=' shared_ids.txt >> "$GITHUB_ENV"
              echo "provisioned shared VPC/subnet on attempt $i"
              break
            fi
            echo "provision attempt $i got no ids (likely VPC cap while job B churns) — retry in 45s"
            sleep 45
          done

      - name: Run read-only smoke + read-chains regression
        # Read-only — runs once for every event (PR/smoke-only and CRUD runs).
        id: smoke
        env:
          PR_CATEGORY: ${{ vars.SCP_PR_CATEGORY }}
          PR_SERVICE: ${{ vars.SCP_PR_SERVICE }}
          DISPATCH_CATEGORY: ${{ github.event.inputs.category || needs.spec.outputs.req_category }}
          DISPATCH_SERVICE: ${{ github.event.inputs.service || needs.spec.outputs.req_service }}
        run: |
          mkdir -p reports
          ARGS="tests/smoke -m smoke"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            [ -n "$PR_CATEGORY" ] && ARGS="$ARGS --category $PR_CATEGORY"
            [ -n "$PR_SERVICE" ]  && ARGS="$ARGS --service $PR_SERVICE"
          else
            [ -n "$DISPATCH_CATEGORY" ] && ARGS="$ARGS --category $DISPATCH_CATEGORY"
            [ -n "$DISPATCH_SERVICE" ]  && ARGS="$ARGS --service $DISPATCH_SERVICE"
          fi
          echo "event=${{ github.event_name }} -> python -m pytest $ARGS" | tee reports/pytest.log
          set -o pipefail
          python -m pytest $ARGS 2>&1 | tee -a reports/pytest.log

      - name: Oplog — smoke milestone
        if: ${{ always() }}
        continue-on-error: true
        run: python -m core.oplog emit --stage smoke --status "${{ steps.smoke.outcome }}" --job regression-A || true

      - name: Comment smoke result on PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          from collections import Counter, defaultdict
          rows=[]  # (status, category, key, path)
          try:
              for ln in open("reports/smoke_status.tsv"):
                  p=ln.rstrip("\n").split("\t")
                  if len(p)>=5:
                      rows.append((int(p[0]), p[1], p[2], p[4]))
          except FileNotFoundError:
              pass
          if not rows:
              body=("### Read-only smoke — no results\n"
                    "No statuses recorded (run failed before calling endpoints).")
          else:
              called=len(rows)
              cat=Counter(c for _,c,_,_ in rows)
              dist=Counter(s for s,_,_,_ in rows)
              lines=[f"### Read-only smoke result ({called} endpoints called)",
                     f"- ok(2xx): **{cat.get('ok',0)}**   "
                     f"soft(params/permission/entitlement): **{cat.get('soft',0)}**   "
                     f"fail(real auth/5xx): **{cat.get('fail',0)}**",
                     "- status distribution: " + ", ".join(f"`{s}`x{n}" for s,n in sorted(dist.items()))]
              groups=defaultdict(list)
              for s,c,key,path in rows:
                  if c!="ok":
                      groups[(c,s)].append((key,path))
              label={"fail":"FAIL","soft":"soft"}
              for (c,s) in sorted(groups, key=lambda x:(x[0]!="fail", x[1])):
                  items=groups[(c,s)][:25]
                  lines.append(f"\n<details><summary>{label.get(c,c)} <code>{s}</code> x{len(groups[(c,s)])}</summary>\n")
                  lines += [f"- `{k}` — `{p}`" for k,p in items]
                  if len(groups[(c,s)])>len(items): lines.append(f"- … and {len(groups[(c,s)])-len(items)} more")
                  lines.append("\n</details>")
              body="\n".join(lines)
          data=json.dumps({"body":body}).encode()
          req=urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR']}/comments",
              data=data, method="POST",
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                       "Accept":"application/vnd.github+json"})
          urllib.request.urlopen(req)
          print("posted smoke summary")
          PY

      - name: Heavy self-trigger (file flag)
        if: ${{ !cancelled() }}
        run: |
          # A committed .github/heavy.txt lets a heavy lifecycle run be driven by
          # a plain `git push`: the first non-comment line is a pytest -k filter
          # and its presence turns on SCP_RUN_HEAVY for this run. Clear to stop.
          if [ -s .github/heavy.txt ]; then
            f="$(grep -vE '^[[:space:]]*#' .github/heavy.txt | head -1 | tr -d '[:space:]')"
            if [ -n "$f" ]; then
              echo "SCP_RUN_HEAVY=true" >> "$GITHUB_ENV"
              echo "HEAVY_FILTER_FILE=$f" >> "$GITHUB_ENV"
              echo "heavy self-trigger active: run_heavy=true, crud_filter=$f"
            fi
          fi

      - name: Run ADOPT-class CRUD (parallel)
        id: crud
        # PARALLEL_K selects every CRUD lifecycle that is NOT a vpc-crud one (the
        # adopt-class + all non-VPC CRUD). They adopt the shared VPC+subnet via
        # env ids, so they only create their own child resource -> safe to run in
        # parallel with pytest-xdist -n 6. A manual crud_filter (dispatch) or the
        # heavy.txt self-trigger filter is ANDed in to NARROW within the pass.
        if: ${{ !cancelled() && (github.event.inputs.allow_mutations == 'true' || needs.spec.outputs.req_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
        env:
          CRUD_FILTER: ${{ github.event.inputs.crud_filter || needs.spec.outputs.req_crud_filter }}
        run: |
          echo "Running ADOPT-class CRUD in parallel (-n 6)" | tee reports/crud.log
          MANUAL="${CRUD_FILTER:-$HEAVY_FILTER_FILE}"
          if [ -n "$MANUAL" ]; then FILTER="($PARALLEL_K) and ($MANUAL)"; else FILTER="$PARALLEL_K"; fi
          echo "adopt-pass -> -k \"$FILTER\"" | tee -a reports/crud.log
          ARGS=(tests/crud -m crud -n 6 --junitxml=reports/junit-crud-parallel.xml)
          [ -n "$FILTER" ] && ARGS+=(-k "$FILTER")
          set -o pipefail
          rc=0; python -m pytest "${ARGS[@]}" 2>&1 | tee -a reports/crud.log || rc=$?
          # exit 5 = no tests matched the filter — normal for scoped runs, not a failure
          if [ "$rc" = "5" ]; then echo "no lifecycles matched this pass's filter — skipping" | tee -a reports/crud.log; rc=0; fi
          exit "$rc"

      - name: SCR docker-auth probe (run-request docker_probe=true)
        if: ${{ always() && needs.spec.outputs.req_docker_probe == 'true' }}
        # owner hypothesis 2026-06-12: docker login with the SCP keys. One-shot
        # experiment, never fails the job — verdict lines SCR-DOCKER-PROBE: in
        # the log decide whether image/tag surface + cloud-ml unblock.
        run: python -m regression.scr_docker_probe || true
      - name: Oplog — adopt-class CRUD milestone
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python -m core.oplog emit --stage adopt-crud --status "${{ steps.crud.outcome }}" --job regression-A \
            --detail "$(tail -3 reports/crud.log 2>/dev/null | tr '\n' ' ' | head -c 300)" || true

      - name: Merge per-worker results
        # Under xdist each worker wrote its own shards (observations-gw*.jsonl,
        # smoke_status-gw*.tsv, registry/<run>-gw*.jsonl). Fold the observation
        # shards into the canonical reports/results/observations.jsonl (and remove
        # them) so the dashboard reads one file and never double-counts; concat the
        # smoke TSV shards into reports/smoke_status.tsv; and merge the two CRUD
        # junit files into one reports/junit-crud.xml. Registry shards are left
        # as-is (the reconciler globs reports/registry/*.jsonl).
        if: ${{ !cancelled() && (github.event.inputs.allow_mutations == 'true' || needs.spec.outputs.req_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
        run: |
          python - <<'PY'
          from pathlib import Path
          from core import results
          n = results.merge_worker_shards()
          print(f"merged {n} results shard(s) into canonical observations/findings")
          # smoke TSV shards -> canonical
          tsv = Path("reports/smoke_status.tsv")
          shards = sorted(Path("reports").glob("smoke_status-*.tsv"))
          if shards:
              with open(tsv, "a") as out:
                  for s in shards:
                      out.write(s.read_text()); s.unlink()
              print(f"merged {len(shards)} smoke TSV shard(s)")
          # fold this job's CRUD junit shard(s) into one junit-crud.xml (the
          # serial VPC-CRUD pass produces its own in the regression-vpc-crud job)
          import glob, xml.etree.ElementTree as ET
          cases = []
          for f in sorted(glob.glob("reports/junit-crud-*.xml")):
              try: cases.extend(ET.parse(f).getroot().iter("testcase"))
              except (ET.ParseError, OSError): pass
          if cases:
              suites = ET.Element("testsuites")
              suite = ET.SubElement(suites, "testsuite", {"name": "crud", "tests": str(len(cases))})
              for tc in cases: suite.append(tc)
              ET.ElementTree(suites).write("reports/junit-crud.xml", encoding="utf-8", xml_declaration=True)
              print(f"merged {len(cases)} crud testcase(s) into reports/junit-crud.xml")
          PY

      - name: Teardown shared VPC + subnet
        # Always tear down (subnet then vpc) so a failed CRUD pass doesn't strand
        # the shared infra; the tag-scoped reconciler sweep is the backstop. No-op
        # without SCP_ALLOW_DESTRUCTIVE.
        if: ${{ always() && (github.event.inputs.allow_mutations == 'true' || needs.spec.outputs.req_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
        run: |
          python -m regression.scenarios.shared_infra --teardown || true

      - name: Comment CRUD result on PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' && (github.event.inputs.allow_mutations == 'true' || needs.spec.outputs.req_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          try:
              log = open("reports/crud.log").read()
          except FileNotFoundError:
              log = "(no crud.log — step did not run)"
          tail = "\n".join(log.splitlines()[-70:])
          body = ("### CRUD lifecycle result (real resources created & deleted)\n\n"
                  "```\n" + tail[-6000:] + "\n```")
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR']}/comments",
              data=data, method="POST",
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                       "Accept": "application/vnd.github+json"})
          urllib.request.urlopen(req)
          print("posted CRUD result to PR")
          PY

      - name: Upload regression reports + results store
        # ONE artifact (single job again, no lanes). The "Merge per-worker results"
        # step already folded the xdist shards into the canonical files, so the
        # sweep + dashboard jobs download this one `regression-reports` artifact.
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: |
            reports/report.html
            reports/junit.xml
            reports/junit-crud.xml
            reports/smoke_status.tsv
            reports/results
            reports/registry
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # AXIS 1 · regression/ — JOB B of the A∥B split: the VPC-CRUD class, run in
  # PARALLEL with job A so the full run's wall-clock is max(A, B) instead of
  # A+B (formerly this pass ran serially inside the regression job after the
  # adopt pass finished).
  # VPC_CRUD_K lifecycles MUST self-create their own VPC/subnet (their purpose
  # is vpc/subnet/peering creation, they mutate a VPC, or they need >1 VPC), so
  # they run SERIALLY (-n 0). Capacity while A∥B overlap: account cap = 5
  # (VALIDATED live, run 27306490231); A holds 1 (shared) VPC, B's worst single
  # lifecycle holds 2 (vpc-peering). Each VPC-creating lifecycle uses a UNIQUE,
  # non-overlapping CIDR (knowledge/domain-constraints.md).
  # ---------------------------------------------------------------------------
  regression-vpc-crud:
    name: AXIS1 regression (VPC-CRUD class, serial)
    needs: spec
    # Pure CRUD job: nothing to do on read-only runs (smoke lives in job A).
    if: ${{ !cancelled() && (github.event.inputs.allow_mutations == 'true' || needs.spec.outputs.req_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: read
    env:
      SCP_ALLOW_MUTATIONS: ${{ (github.event.inputs.allow_mutations == 'true' || needs.spec.outputs.req_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
      SCP_ALLOW_DESTRUCTIVE: ${{ (github.event.inputs.allow_destructive == 'true' || needs.spec.outputs.req_destructive == 'true' || vars.SCP_RUN_CRUD == 'true') }}
      SCP_RUN_HEAVY: ${{ (github.event.inputs.run_heavy == 'true' || needs.spec.outputs.req_heavy == 'true' || vars.SCP_RUN_HEAVY == 'true') }}
      # VPC-CRUD lifecycles never adopt the shared VPC — suppress the conftest
      # fixture's single-process self-provisioning so this job doesn't burn a
      # 3rd VPC slot while job A's shared VPC is live.
      SCP_SHARED_VPC_DISABLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply environment profile
        if: ${{ (github.event.inputs.profile || needs.spec.outputs.req_profile) != '' }}
        run: |
          P="${{ github.event.inputs.profile || needs.spec.outputs.req_profile }}"
          python -m core.profiles export "$P" >> "$GITHUB_ENV"
          echo "applied environment profile: $P"
      - name: Verify configuration
        run: |
          if [ -z "$SCP_ACCESS_KEY" ] || [ -z "$SCP_SECRET_KEY" ]; then
            echo "::error::Missing credentials. Set SCP_ACCESS_KEY and SCP_SECRET_KEY in repo Settings > Secrets."
            exit 1
          fi
      - name: Heavy self-trigger (file flag)
        # Mirrors job A so a heavy.txt filter narrows this pass identically.
        run: |
          if [ -s .github/heavy.txt ]; then
            f="$(grep -vE '^[[:space:]]*#' .github/heavy.txt | head -1 | tr -d '[:space:]')"
            if [ -n "$f" ]; then
              echo "SCP_RUN_HEAVY=true" >> "$GITHUB_ENV"
              echo "HEAVY_FILTER_FILE=$f" >> "$GITHUB_ENV"
              echo "heavy self-trigger active: run_heavy=true, crud_filter=$f"
            fi
          fi
      - name: Derive lane filters (adopt vs vpc-crud partition)
        run: |
          python -m regression.scenarios.shared_infra --print-filters >> "$GITHUB_ENV"
          echo "derived ADOPT_K / VPC_CRUD_K / PARALLEL_K -> \$GITHUB_ENV"
      - name: Run VPC-CRUD class (serial)
        id: vpccrud
        # Two sequential pytest passes: everything except heavy-shared-networking
        # first, then heavy-shared-networking LAST — it is the slow-provisioner
        # lifecycle (private-dns create/delete can take hours; flows.yaml
        # slow-provisioners-isolated) and it holds its VPC while it grinds, so
        # running it last keeps VPC slots free for the cheap lifecycles (run
        # 27306490231 hit the 5-VPC account cap and skipped 3 lifecycles when it
        # ran early).
        env:
          CRUD_FILTER: ${{ github.event.inputs.crud_filter || needs.spec.outputs.req_crud_filter }}
        run: |
          mkdir -p reports
          echo "Running VPC-CRUD class serially (-n 0; heavy-shared-networking last)" | tee reports/crud.log
          MANUAL="${CRUD_FILTER:-$HEAVY_FILTER_FILE}"
          overall=0
          for PASS in "not heavy-shared-networking" "heavy-shared-networking"; do
            FILTER="($VPC_CRUD_K) and ($PASS)"
            [ -n "$MANUAL" ] && FILTER="$FILTER and ($MANUAL)"
            echo "vpc-crud-pass -> -k \"$FILTER\"" | tee -a reports/crud.log
            ARGS=(tests/crud -m crud -n 0 --junitxml="reports/junit-crud-$(echo "$PASS" | tr -dc 'a-z-').xml")
            ARGS+=(-k "$FILTER")
            set -o pipefail
            rc=0; python -m pytest "${ARGS[@]}" 2>&1 | tee -a reports/crud.log || rc=$?
            # exit 5 = no tests matched the filter — normal for scoped runs, not a failure
            if [ "$rc" = "5" ]; then echo "no lifecycles matched this pass's filter — skipping" | tee -a reports/crud.log; rc=0; fi
            [ "$rc" != "0" ] && overall="$rc"
          done
          # fold the two junit files into the canonical junit-crud.xml
          python - <<'PY'
          import glob, xml.etree.ElementTree as ET
          cases = []
          for f in sorted(glob.glob("reports/junit-crud-*.xml")):
              try: cases.extend(ET.parse(f).getroot().iter("testcase"))
              except (ET.ParseError, OSError): pass
          if cases:
              suites = ET.Element("testsuites")
              suite = ET.SubElement(suites, "testsuite", {"name": "crud", "tests": str(len(cases))})
              for tc in cases: suite.append(tc)
              ET.ElementTree(suites).write("reports/junit-crud.xml", encoding="utf-8", xml_declaration=True)
              print(f"merged {len(cases)} crud testcase(s) into reports/junit-crud.xml")
          PY
          exit "$overall"
      - name: Oplog — VPC-CRUD milestone
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python -m core.oplog emit --stage vpc-crud --status "${{ steps.vpccrud.outcome }}" --job regression-B \
            --detail "$(tail -3 reports/crud.log 2>/dev/null | tr '\n' ' ' | head -c 300)" || true

      - name: Upload VPC-CRUD reports + results store
        # Separate artifact (same inner layout as regression-reports): the
        # dashboard job downloads it NEXT TO job A's and concatenates the
        # observations + smoke TSV before building.
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports-vpccrud
          path: |
            reports/junit-crud.xml
            reports/smoke_status.tsv
            reports/results
            reports/registry
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # support C · cleanup/  — registry-driven reconciler sweep. Deletes ONLY this
  # run's tagged resources (owner+run). Needs SCP_ALLOW_DESTRUCTIVE.
  # ---------------------------------------------------------------------------
  sweep:
    name: Sweep (cleanup.reconciler, tag-scoped)
    # Must wait for BOTH regression jobs (A∥B) so the sweep never reaps while a
    # mutating pass is still live.
    needs: [spec, regression, regression-vpc-crud]
    if: ${{ always() && (github.event.inputs.allow_mutations == 'true' || github.event.inputs.allow_destructive == 'true' || needs.spec.outputs.req_mutations == 'true' || needs.spec.outputs.req_destructive == 'true' || vars.SCP_RUN_CRUD == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    env:
      # The client blocks DELETE unless BOTH gates are set; the reconciler is
      # safe because it is tag-scoped (deletes only this run's owned/expired
      # resources), not because of these gates.
      SCP_ALLOW_MUTATIONS: ${{ (github.event.inputs.allow_mutations == 'true' || github.event.inputs.allow_destructive == 'true' || needs.spec.outputs.req_mutations == 'true' || needs.spec.outputs.req_destructive == 'true' || vars.SCP_RUN_CRUD == 'true') }}
      SCP_ALLOW_DESTRUCTIVE: ${{ (github.event.inputs.allow_destructive == 'true' || needs.spec.outputs.req_destructive == 'true' || vars.SCP_RUN_CRUD == 'true') }}
      # run-request sweep_force=true: reap tagged-but-unexpired orphans too
      # (finished runs' resources keep a 6h TTL). Use ONLY when no mutating
      # run is live.
      SCP_SWEEP_EXTRA_NAMES: ${{ needs.spec.outputs.req_sweep_extra_names }}
      SCP_SWEEP_IGNORE_TTL: ${{ needs.spec.outputs.req_sweep_force == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply environment profile
        if: ${{ (github.event.inputs.profile || needs.spec.outputs.req_profile) != '' }}
        run: |
          P="${{ github.event.inputs.profile || needs.spec.outputs.req_profile }}"
          python -m core.profiles export "$P" >> "$GITHUB_ENV"
          echo "applied environment profile: $P"
      - name: Download regression registry manifest
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          # The reconciler sweeps the ACCOUNT by owner tag (is_owned +
          # is_expired) and never reads these manifests — this download (and
          # the job-B one below) is for completeness / debugging only.
          name: regression-reports
          path: reports
      - name: Download VPC-CRUD registry manifest (job B)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: regression-reports-vpccrud
          path: reports-vpccrud
      - name: Reconcile leftover resources (tag-scoped)
        continue-on-error: true
        run: |
          mkdir -p reports
          python -u -m cleanup.reconciler 2>&1 | tee reports/sweep.log
      - name: Oplog — sweep milestone
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python -m core.oplog emit --stage sweep --status done --job sweep \
            --detail "$(grep 'sweep done' reports/sweep.log 2>/dev/null | tail -1 | head -c 200)" || true
      - name: Comment sweep result on PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          try: log=open("reports/sweep.log").read()
          except FileNotFoundError: log="(no sweep.log)"
          body="### Registry-driven sweep (tag-scoped)\n\n```\n"+log[-5000:]+"\n```"
          req=urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR']}/comments",
              data=json.dumps({"body":body}).encode(), method="POST",
              headers={"Authorization":f"Bearer {os.environ['GH_TOKEN']}","Accept":"application/vnd.github+json"})
          urllib.request.urlopen(req); print("posted sweep result")
          PY

  # ---------------------------------------------------------------------------
  # AXIS 2 · conformance/  — is the API well designed & built? static analysis
  # + read-only/empty-body runtime probes, then diff vs baseline (only NEW
  # defects alarm). Runs in parallel with axis 1 (depends only on spec).
  # ---------------------------------------------------------------------------
  conformance:
    name: AXIS2 conformance (static + runtime + baseline)
    needs: spec
    # The spec doesn't change between builds, so re-judging it every run is
    # wasted CI. Conformance runs ONLY when: the catalog refresh detected a
    # spec change · a run-conformance/run-schema-live branch push (those
    # branches exist for this) · dispatch run_conformance=true · repo var
    # SCP_RUN_CONFORMANCE=true (for future schedules). When skipped, the
    # dashboard falls back to the last committed data/conformance.json and the
    # conformance files on dashboard-data stay untouched — the two jobs write
    # disjoint files there, so nothing is clobbered.
    if: ${{ !cancelled() && (
          (github.event_name == 'push' && (github.ref_name == 'claude/run-conformance' || github.ref_name == 'claude/run-schema-live')) ||
          github.event.inputs.run_conformance == 'true' ||
          needs.spec.outputs.req_conformance == 'true' ||
          vars.SCP_RUN_CONFORMANCE == 'true' ||
          needs.spec.outputs.spec_changed == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      # read-only + empty-body probes only by default (no resource creation).
      # `status`/`validation` send empty bodies that fail validation BEFORE
      # anything is created, so they opt into the mutation gate for themselves.
      SCP_PROBE_RUNTIME: "true"
      SCP_PROBE_VALIDATION: "true"
      SCP_ALLOW_MUTATIONS: "true"
      # --- schema-live gate (data-based, BILLABLE: creates+deletes REAL
      # resources). Stays OPT-IN: destructive is enabled ONLY when schema-live
      # is explicitly requested. Never on the default scheduled read-only path.
      # Enabled by: dispatch run_schema_live=true, dispatch probe=schema-live,
      # a push to claude/run-schema-live, or repo var SCP_RUN_SCHEMA_LIVE=true.
      SCP_RUN_SCHEMA_LIVE: ${{ (github.event.inputs.run_schema_live == 'true' || github.event.inputs.probe == 'schema-live' || github.ref == 'refs/heads/claude/run-schema-live' || vars.SCP_RUN_SCHEMA_LIVE == 'true') }}
      # Destructive is gated behind the schema-live opt-in. Read-only/empty-body
      # probes do NOT create resources, so this is false unless schema-live runs.
      SCP_ALLOW_DESTRUCTIVE: ${{ (github.event.inputs.run_schema_live == 'true' || github.event.inputs.probe == 'schema-live' || github.ref == 'refs/heads/claude/run-schema-live' || vars.SCP_RUN_SCHEMA_LIVE == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply environment profile
        if: ${{ (github.event.inputs.profile || needs.spec.outputs.req_profile) != '' }}
        run: |
          P="${{ github.event.inputs.profile || needs.spec.outputs.req_profile }}"
          python -m core.profiles export "$P" >> "$GITHUB_ENV"
          echo "applied environment profile: $P"
      - name: Verify configuration
        run: |
          [ -n "$SCP_ACCESS_KEY" ] && [ -n "$SCP_SECRET_KEY" ] || { echo "::error::missing creds"; exit 1; }
      - name: Static conformance analysis (spec)
        run: python -m conformance.static | tee -a "$GITHUB_STEP_SUMMARY" || true
      - name: Runtime probes (read-only / empty-body)
        # Read-only + empty-body probes:
        #   schema status notfound errors pagination options l10n validation all
        # `schema-live` is data-based + BILLABLE and is handled by the gated step
        # below, never here. If `probe` is left at schema-live without the gate,
        # fall back to `all` so the default read-only path still runs safely.
        env:
          PROBE: ${{ github.event.inputs.probe }}
          # probe_category is the runtime-probe-specific override; fall back to
          # the shared `category` input when it's blank.
          PROBE_CATEGORY: ${{ github.event.inputs.probe_category || github.event.inputs.category }}
          PROBE_LIMIT: ${{ github.event.inputs.probe_limit }}
          RUN_SCHEMA_LIVE: ${{ env.SCP_RUN_SCHEMA_LIVE }}
        run: |
          PROBE="${PROBE:-all}"
          # schema-live is gated below; do not run the billable probe here.
          if [ "$PROBE" = "schema-live" ] && [ "$RUN_SCHEMA_LIVE" != "true" ]; then
            echo "::notice::probe=schema-live requested without the schema-live gate; running read-only 'all' instead."
            PROBE="all"
          fi
          if [ "$PROBE" = "schema-live" ]; then
            echo "schema-live handled by the gated step; skipping read-only runtime invocation."
            exit 0
          fi
          python -m conformance.runtime \
            --probe "$PROBE" \
            --category "${PROBE_CATEGORY}" \
            --limit "${PROBE_LIMIT:-0}" | tee -a "$GITHUB_STEP_SUMMARY" || true
      - name: Runtime probe — schema-live (data-based, BILLABLE; gated)
        # Creates LIGHT real resources, GETs them, diffs live vs documented model,
        # then tears everything down. Runs ONLY when the schema-live gate is set
        # (run_schema_live / probe=schema-live / claude/run-schema-live branch /
        # repo var). Never on the default scheduled read-only path.
        if: ${{ env.SCP_RUN_SCHEMA_LIVE == 'true' }}
        env:
          PROBE_CATEGORY: ${{ github.event.inputs.probe_category || github.event.inputs.category }}
          PROBE_LIMIT: ${{ github.event.inputs.probe_limit }}
          PROBE_FILTER: ${{ github.event.inputs.probe_filter }}
        run: |
          set -o pipefail
          python -m conformance.runtime \
            --probe schema-live \
            --category "${PROBE_CATEGORY}" \
            --limit "${PROBE_LIMIT:-0}" \
            --filter "${PROBE_FILTER}" | tee -a "$GITHUB_STEP_SUMMARY" || true
      - name: Pull prior baseline
        # Baselines are split PER ENVIRONMENT PROFILE (PLATFORM-PLAN §6 확정:
        # 파일 분리): the published name carries the profile suffix
        # (conformance_baseline.<profile>.json); the local working name stays
        # fixed so the snapshot/publish plumbing is unchanged.
        run: |
          mkdir -p data
          P="${{ github.event.inputs.profile || needs.spec.outputs.req_profile }}"
          BN="conformance_baseline${P:+.$P}.json"
          echo "BASELINE_NAME=$BN" >> "$GITHUB_ENV"
          git fetch origin dashboard-data --depth=1 >/dev/null 2>&1 || true
          git show "origin/dashboard-data:$BN" > data/conformance_baseline.json 2>/dev/null || true
          [ -s data/conformance_baseline.json ] || rm -f data/conformance_baseline.json
      - name: Baseline diff (only NEW defects alarm)
        # --baseline points at the file the pull step ACTUALLY wrote. The
        # module default (data/baselines/...) never matched the pulled path, so
        # CI re-seeded every run and NEW-defect detection silently no-opped.
        run: |
          EXTRA=""
          [ "${{ github.event.inputs.update_baseline }}" = "true" ] && EXTRA="--update"
          python -m conformance.baseline --baseline data/conformance_baseline.json \
            --init-if-missing $EXTRA | tee -a "$GITHUB_STEP_SUMMARY" || true
      - name: Publish conformance data (non-destructive)
        continue-on-error: true
        run: |
          url="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          tmp=$(mktemp -d)
          git clone --depth=1 --branch dashboard-data "$url" "$tmp/dd" 2>/dev/null || { mkdir -p "$tmp/dd"; ( cd "$tmp/dd" && git init -q -b dashboard-data ); }
          cd "$tmp/dd"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # update ONLY the conformance axis's own data files (HTML stays owned by the dashboard job)
          cp "$GITHUB_WORKSPACE/data/conformance.json" . 2>/dev/null || true
          # baseline publishes under its per-profile name (BASELINE_NAME from the pull step)
          cp "$GITHUB_WORKSPACE/data/conformance_baseline.json" "./${BASELINE_NAME:-conformance_baseline.json}" 2>/dev/null || true
          cp "$GITHUB_WORKSPACE/reports/conformance_new.json" . 2>/dev/null || true
          touch .nojekyll
          git add -A
          git commit -q -m "conformance data @ ${{ github.sha }} (${{ github.event_name }})" || { echo "no change"; exit 0; }
          for i in 1 2 3 4 5; do
            if git push "$url" HEAD:dashboard-data 2>/dev/null; then echo pushed; break; fi
            echo "push race, rebasing ($i)"; git fetch "$url" dashboard-data 2>/dev/null && git rebase FETCH_HEAD 2>/dev/null || git rebase --abort 2>/dev/null || true
            sleep 3
          done
      - name: Upload conformance artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: conformance
          path: |
            data/conformance.json
            reports/conformance_new.json
            reports/runtime_*.json
            reports/validation_probe.json
            reports/csv/runtime_*.csv
            reports/results
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # support B · dashboard/  — build the unified dashboard (reads core.results,
  # legacy fallback) and publish to the dashboard-data branch / Pages. Runs
  # after both axes so it sees observations (axis 1) + findings (axis 2).
  # ---------------------------------------------------------------------------
  dashboard:
    name: Build + publish dashboard
    # spec is in needs (its outputs carry suite/profile for the snapshot);
    # regression already depends on it, so this adds no serialization.
    needs: [spec, regression, regression-vpc-crud, conformance]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply environment profile
        if: ${{ (github.event.inputs.profile || needs.spec.outputs.req_profile) != '' }}
        run: |
          P="${{ github.event.inputs.profile || needs.spec.outputs.req_profile }}"
          python -m core.profiles export "$P" >> "$GITHUB_ENV"
          echo "applied environment profile: $P"
      - name: Download regression results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          # Job A's artifact. The regression job already folded its xdist
          # per-worker shards into the canonical files (observations.jsonl,
          # smoke_status.tsv, junit-crud.xml) via "Merge per-worker results", so
          # the dashboard reads them directly.
          name: regression-reports
          path: reports
      - name: Download VPC-CRUD results (job B)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          # Job B (the parallel VPC-CRUD pass) writes the SAME inner layout, so
          # it lands in a sibling dir and gets concatenated below.
          name: regression-reports-vpccrud
          path: reports-vpccrud
      - name: Fold job B results into job A's canonical files
        continue-on-error: true
        run: |
          mkdir -p reports/results
          for f in results/observations.jsonl results/findings.jsonl smoke_status.tsv; do
            if [ -s "reports-vpccrud/$f" ]; then
              cat "reports-vpccrud/$f" >> "reports/$f"
              echo "folded reports-vpccrud/$f"
            fi
          done
          # keep B's junit visible to the summary step under a distinct name
          [ -s reports-vpccrud/junit-crud.xml ] && cp reports-vpccrud/junit-crud.xml reports/junit-crud-vpccrud.xml || true
      - name: Download conformance results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: conformance
          path: .
      - name: Build dashboard
        if: ${{ !cancelled() }}
        run: |
          mkdir -p dashboard reports data
          # pull cumulative trend history from the data branch (if it exists)
          git fetch origin dashboard-data --depth=1 >/dev/null 2>&1 || true
          git show origin/dashboard-data:history.jsonl > dashboard/history.jsonl 2>/dev/null || true
          # cumulative verified set -> C3 builds across runs (docs/COVERAGE-CRITERIA.md)
          git show origin/dashboard-data:verified_endpoints.json > data/verified_endpoints.json 2>/dev/null || true
          [ -s data/verified_endpoints.json ] || rm -f data/verified_endpoints.json
          # cumulative last-known per-endpoint observation (status/elapsed/run)
          # -> drill-down status cells survive scoped runs
          git show origin/dashboard-data:endpoint_status.json > data/endpoint_status.json 2>/dev/null || true
          [ -s data/endpoint_status.json ] || rm -f data/endpoint_status.json
          # consume conformance data published by the conformance axis
          # (keep the committed data/conformance.json as fallback if the pull is empty/absent)
          git show origin/dashboard-data:conformance.json > /tmp/conf.json 2>/dev/null && [ -s /tmp/conf.json ] && cp /tmp/conf.json data/conformance.json || true
          P="${{ github.event.inputs.profile || needs.spec.outputs.req_profile }}"
          git show "origin/dashboard-data:conformance_baseline${P:+.$P}.json" > data/conformance_baseline.json 2>/dev/null || true
          git show origin/dashboard-data:conformance_new.json > reports/conformance_new.json 2>/dev/null || true
          [ -s data/conformance_baseline.json ] || rm -f data/conformance_baseline.json
          [ -s reports/conformance_new.json ] || rm -f reports/conformance_new.json
          # build.py reads core.results (observations/findings) then legacy fallback
          python -m dashboard.build \
            --run-type "${{ github.event_name }}" \
            --sha "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --out dashboard/index.html
      - name: Export static platform views for Pages (/platform/)
        # Read-only Planning/coverage pages rendered through the real app —
        # view-only on Pages; actions need the live server (controlplane/).
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          pip install -q -r controlplane/requirements.txt httpx
          python -m controlplane.static_export --out reports/platform-static || true
      - name: Publish dashboard to data branch
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          pub=$(mktemp -d)
          cp dashboard/index.html "$pub"/ 2>/dev/null || true
          cp dashboard/history.jsonl "$pub"/ 2>/dev/null || true
          # per-service drill-down pages (dashboard/services/*.html)
          cp -r dashboard/services "$pub"/services 2>/dev/null || true
          cp dashboard/verified_endpoints.json "$pub"/ 2>/dev/null || true
          cp dashboard/endpoint_status.json "$pub"/ 2>/dev/null || true
          # static ops viewer (reads the persistent oplog bucket directly)
          cp dashboard/ops.html "$pub"/ 2>/dev/null || true
          # view-only platform pages (controlplane/static_export.py)
          cp -r reports/platform-static "$pub"/platform 2>/dev/null || true
          cp reports/smoke_status.tsv "$pub"/ 2>/dev/null || true
          cp data/conformance.json "$pub"/ 2>/dev/null || true
          cp data/conformance_baseline.json "$pub"/ 2>/dev/null || true
          cp reports/conformance_new.json "$pub"/ 2>/dev/null || true
          # nojekyll so GitHub Pages serves the raw HTML as-is
          touch "$pub/.nojekyll"
          cd "$pub"
          git init -q -b dashboard-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "dashboard @ ${{ github.sha }} (${{ github.event_name }})" || exit 0
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            dashboard-data
          echo "published dashboard-data (enable Pages -> Deploy from branch -> dashboard-data /root)"
      - name: Snapshot run results (per-run archive on the oplog bucket)
        # docs/PLATFORM-PLAN.md M0: every run's canonical outputs (results
        # JSONL + dashboard HTML + meta incl. catalog version) are archived
        # under runs/<run_id>/snapshot/ so past dashboards can be reopened.
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python -m core.snapshot upload \
            --suite "${{ github.event.inputs.suite || needs.spec.outputs.req_suite }}" \
            --profile "${{ github.event.inputs.profile || needs.spec.outputs.req_profile }}" || true
      - name: Oplog — finalize run (summary + index.json)
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python -m core.oplog emit --stage dashboard --status done --job dashboard || true
          python -m core.oplog finalize --history dashboard/history.jsonl || true

      - name: Test result summary
        if: ${{ always() }}
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import glob, xml.etree.ElementTree as ET
          tot=fail=err=skip=0
          for f in glob.glob("reports/junit.xml") + glob.glob("reports/junit-crud*.xml"):
              try:
                  for ts in ET.parse(f).getroot().iter("testsuite"):
                      tot+=int(ts.get("tests",0)); fail+=int(ts.get("failures",0))
                      err+=int(ts.get("errors",0)); skip+=int(ts.get("skipped",0))
              except Exception:
                  pass
          print("\n## SCP API Test (orchestrator)\n")
          print(f"- total: {tot}\n- passed: {tot-fail-err-skip}\n- failed: {fail}\n- errors: {err}\n- skipped: {skip}")
          PY
      - name: Upload dashboard
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: |
            dashboard/index.html
            dashboard/history.jsonl
          if-no-files-found: warn
