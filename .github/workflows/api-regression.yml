name: SCP API Regression

# Scheduled regression run + on-demand manual runs.
# Secrets/vars are configured in the repo settings (see bottom of README).
on:
  pull_request:
    # PR runs a small, read-only subset (default: the 'platform' category =
    # 2 GETs). Override the PR scope with the SCP_PR_CATEGORY repo variable.
    paths-ignore:
      - "**/*.md"
  schedule:
    # 18:00 UTC daily (03:00 KST). Read-only smoke regression.
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      category:
        description: "Limit to one category (e.g. compute). Blank = all."
        required: false
        default: ""
      service:
        description: "Limit to one service (e.g. virtualserver). Blank = all."
        required: false
        default: ""
      refresh_catalog:
        description: "Re-scrape the API Reference before testing"
        type: boolean
        default: false
      allow_mutations:
        description: "Run mutating CRUD lifecycles (creates/updates REAL resources)"
        type: boolean
        default: false
      allow_destructive:
        description: "Also allow DELETE in CRUD lifecycles"
        type: boolean
        default: false

concurrency:
  group: scp-api-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    env:
      # --- endpoint (per-service hosts: <service>.<region>.<env>.samsungsdscloud.com) ---
      SCP_REGION: ${{ vars.SCP_REGION || 'kr-west1' }}
      SCP_ENV: ${{ vars.SCP_ENV || 'e' }}
      SCP_HOST_TEMPLATE: ${{ vars.SCP_HOST_TEMPLATE }}
      SCP_SERVICE_HOSTS: ${{ vars.SCP_SERVICE_HOSTS }}
      SCP_BASE_URL: ${{ secrets.SCP_BASE_URL }}
      # --- credentials (repository secrets) ---
      SCP_ACCESS_KEY: ${{ secrets.SCP_ACCESS_KEY }}
      SCP_SECRET_KEY: ${{ secrets.SCP_SECRET_KEY }}
      SCP_PROJECT_ID: ${{ secrets.SCP_PROJECT_ID }}
      # --- auth scheme (repository variables; safe defaults if unset) ---
      SCP_AUTH_SCHEME: ${{ vars.SCP_AUTH_SCHEME || 'hmac' }}
      SCP_HMAC_ACCESS_HEADER: ${{ vars.SCP_HMAC_ACCESS_HEADER || 'x-cmp-accesskey' }}
      SCP_HMAC_SIGNATURE_HEADER: ${{ vars.SCP_HMAC_SIGNATURE_HEADER || 'x-cmp-signature' }}
      SCP_HMAC_TIMESTAMP_HEADER: ${{ vars.SCP_HMAC_TIMESTAMP_HEADER || 'x-cmp-timestamp' }}
      SCP_PROJECT_HEADER: ${{ vars.SCP_PROJECT_HEADER || 'x-cmp-project-id' }}
      # --- run behaviour: fail slow hosts fast so a broad run fits the budget ---
      SCP_TIMEOUT: ${{ vars.SCP_TIMEOUT || '20' }}
      SCP_MAX_RETRIES: ${{ vars.SCP_MAX_RETRIES || '2' }}
      # --- safety gates (default OFF) ---------------------------------------
      # Enabled by a manual dispatch (allow_mutations / allow_destructive) OR by
      # setting the repo variable SCP_RUN_CRUD=true to opt a PR run into CRUD.
      SCP_ALLOW_MUTATIONS: ${{ (github.event.inputs.allow_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
      SCP_ALLOW_DESTRUCTIVE: ${{ (github.event.inputs.allow_destructive == 'true' || vars.SCP_RUN_CRUD == 'true') }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify configuration
        run: |
          if [ -z "$SCP_ACCESS_KEY" ] || [ -z "$SCP_SECRET_KEY" ]; then
            echo "::error::Missing credentials. Set SCP_ACCESS_KEY and SCP_SECRET_KEY in repo Settings > Secrets."
            exit 1
          fi
          if [ -z "$SCP_REGION" ] && [ -z "$SCP_BASE_URL" ] && [ -z "$SCP_SERVICE_HOSTS" ]; then
            echo "::error::Set SCP_REGION (variable) so per-service hosts can be built, or SCP_BASE_URL/SCP_SERVICE_HOSTS."
            exit 1
          fi

      - name: Refresh API catalog
        if: ${{ github.event.inputs.refresh_catalog == 'true' }}
        run: python tools/build_catalog.py

      - name: Catalog summary
        run: python tools/catalog_summary.py >> "$GITHUB_STEP_SUMMARY" || true

      - name: Run read-only smoke regression
        env:
          # PR runs the full read-only smoke by default. Narrow it by setting
          # the SCP_PR_CATEGORY / SCP_PR_SERVICE repo variables.
          PR_CATEGORY: ${{ vars.SCP_PR_CATEGORY }}
          PR_SERVICE: ${{ vars.SCP_PR_SERVICE }}
          DISPATCH_CATEGORY: ${{ github.event.inputs.category }}
          DISPATCH_SERVICE: ${{ github.event.inputs.service }}
        run: |
          ARGS="tests/smoke -m smoke"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            [ -n "$PR_CATEGORY" ] && ARGS="$ARGS --category $PR_CATEGORY"
            [ -n "$PR_SERVICE" ]  && ARGS="$ARGS --service $PR_SERVICE"
          else
            [ -n "$DISPATCH_CATEGORY" ] && ARGS="$ARGS --category $DISPATCH_CATEGORY"
            [ -n "$DISPATCH_SERVICE" ]  && ARGS="$ARGS --service $DISPATCH_SERVICE"
          fi
          echo "event=${{ github.event_name }} -> pytest $ARGS" | tee reports/pytest.log
          set -o pipefail
          pytest $ARGS 2>&1 | tee -a reports/pytest.log

      - name: Comment result summary on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import glob, json, os, urllib.request, xml.etree.ElementTree as ET
          tot=fail=err=skip=0
          failed=[]
          files=glob.glob("reports/junit.xml")
          for f in files:
              for tc in ET.parse(f).getroot().iter("testcase"):
                  tot+=1
                  name=tc.get("name","").replace("test_endpoint_reachable","").strip("[]")
                  fnode=tc.find("failure"); enode=tc.find("error"); snode=tc.find("skipped")
                  if fnode is not None or enode is not None:
                      node=fnode if fnode is not None else enode
                      if fnode is not None: fail+=1
                      else: err+=1
                      msg=(node.get("message") or "").strip().splitlines()
                      failed.append((name, msg[0][:160] if msg else node.tag))
                  elif snode is not None:
                      skip+=1
          called=tot-skip
          passed=tot-fail-err-skip
          if not files:
              body=("### Read-only smoke — run could not produce results\n"
                    "No junit.xml (failed before tests ran). Check the earlier steps.")
          else:
              lines=[f"### Read-only smoke result",
                     f"- endpoints collected: **{tot}**",
                     f"- actually called (read-only GET): **{called}**",
                     f"- ✅ passed: **{passed}**  ❌ failed: **{fail}**  ⚠️ errors: **{err}**  ⏭️ skipped: **{skip}**"]
              if failed:
                  shown=failed[:50]
                  lines.append("\n<details><summary>Failing endpoints "
                               f"({len(failed)} shown {len(shown)})</summary>\n")
                  for nm,reason in shown:
                      lines.append(f"- `{nm}` — {reason}")
                  if len(failed)>len(shown):
                      lines.append(f"- … and {len(failed)-len(shown)} more")
                  lines.append("\n</details>")
              else:
                  lines.append("\nAll called endpoints returned a non-error, "
                               "authenticated response. 🎉")
              body="\n".join(lines)
          data=json.dumps({"body":body}).encode()
          req=urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR']}/comments",
              data=data, method="POST",
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                       "Accept":"application/vnd.github+json"})
          urllib.request.urlopen(req)
          print(f"posted result summary: called={called} passed={passed} fail={fail} err={err}")
          PY

      - name: Run CRUD lifecycles (opt-in only)
        id: crud
        if: ${{ github.event.inputs.allow_mutations == 'true' || vars.SCP_RUN_CRUD == 'true' }}
        run: |
          echo "Running CRUD lifecycles (creates/deletes REAL resources)" | tee reports/crud.log
          set -o pipefail
          pytest tests/crud -m crud --junitxml=reports/junit-crud.xml 2>&1 | tee -a reports/crud.log

      - name: Comment CRUD result on PR
        if: ${{ always() && github.event_name == 'pull_request' && (github.event.inputs.allow_mutations == 'true' || vars.SCP_RUN_CRUD == 'true') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          try:
              log = open("reports/crud.log").read()
          except FileNotFoundError:
              log = "(no crud.log — step did not run)"
          tail = "\n".join(log.splitlines()[-70:])
          body = ("### CRUD lifecycle result (real resources created & deleted)\n\n"
                  "```\n" + tail[-6000:] + "\n```")
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR']}/comments",
              data=data, method="POST",
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                       "Accept": "application/vnd.github+json"})
          urllib.request.urlopen(req)
          print("posted CRUD result to PR")
          PY

      - name: Test result summary
        if: ${{ always() }}
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import glob, xml.etree.ElementTree as ET
          tot=fail=err=skip=0
          for f in glob.glob("reports/junit.xml"):
              for ts in ET.parse(f).getroot().iter("testsuite"):
                  tot+=int(ts.get("tests",0)); fail+=int(ts.get("failures",0))
                  err+=int(ts.get("errors",0)); skip+=int(ts.get("skipped",0))
          print("\n## SCP API Regression\n")
          print(f"- total: {tot}\n- passed: {tot-fail-err-skip}\n- failed: {fail}\n- errors: {err}\n- skipped: {skip}")
          PY

      - name: Upload reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: api-regression-reports
          path: |
            reports/report.html
            reports/junit.xml
          if-no-files-found: warn
