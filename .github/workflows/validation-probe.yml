name: SCP Validation Probe (runtime)

# RUNTIME counterpart to the STATIC tools/analyze_validation.py.
# For each create (POST) op with required fields, sends an empty {} body and
# records whether the 400 ValidationError names the offending field.
# Empty bodies fail validation before anything is created — no resource is made.
on:
  workflow_dispatch:
    inputs:
      category:
        description: "Limit to one category (e.g. database). Blank = all."
        required: false
        default: ""
      limit:
        description: "Stop after N endpoints (0 = all ~135)."
        required: false
        default: "0"

concurrency:
  group: scp-validation-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCP_REGION: ${{ vars.SCP_REGION || 'kr-west1' }}
      SCP_ENV: ${{ vars.SCP_ENV || 'e' }}
      SCP_HOST_TEMPLATE: ${{ vars.SCP_HOST_TEMPLATE }}
      SCP_SERVICE_HOSTS: ${{ vars.SCP_SERVICE_HOSTS }}
      SCP_BASE_URL: ${{ secrets.SCP_BASE_URL }}
      SCP_ACCESS_KEY: ${{ secrets.SCP_ACCESS_KEY }}
      SCP_SECRET_KEY: ${{ secrets.SCP_SECRET_KEY }}
      SCP_PROJECT_ID: ${{ secrets.SCP_PROJECT_ID }}
      SCP_AUTH_SCHEME: ${{ vars.SCP_AUTH_SCHEME || 'hmac' }}
      SCP_TIMEOUT: ${{ vars.SCP_TIMEOUT || '20' }}
      SCP_MAX_RETRIES: ${{ vars.SCP_MAX_RETRIES || '2' }}
      # This probe sends empty bodies that fail validation (no resource created),
      # so it opts into the mutation gate for itself only.
      SCP_PROBE_VALIDATION: "true"
      SCP_ALLOW_MUTATIONS: "true"
      SCP_ALLOW_DESTRUCTIVE: "false"
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Verify configuration
        run: |
          if [ -z "$SCP_ACCESS_KEY" ] || [ -z "$SCP_SECRET_KEY" ]; then
            echo "::error::Missing SCP_ACCESS_KEY/SCP_SECRET_KEY in repo secrets."; exit 1
          fi
      - name: Run validation probe
        run: |
          python tools/probe_validation.py \
            --category "${{ github.event.inputs.category }}" \
            --limit "${{ github.event.inputs.limit }}" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Upload result
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-probe
          path: reports/validation_probe.json
