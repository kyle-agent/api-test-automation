<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}SCP API Regression Test Platform{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
  :root { --fg:#1c2733; --muted:#6b7a8d; --line:#dde4ec; --accent:#0b62a4; --bg:#f6f8fa; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
         color:var(--fg); background:var(--bg); }
  header { background:#fff; border-bottom:1px solid var(--line); padding:10px 24px;
           display:flex; gap:18px; align-items:baseline; }
  header h1 { font-size:16px; margin:0; }
  header nav a { color:var(--accent); text-decoration:none; margin-right:12px; }
  main { max-width:1100px; margin:20px auto; padding:0 24px; }
  section { background:#fff; border:1px solid var(--line); border-radius:8px;
            padding:16px 20px; margin-bottom:18px; }
  h2 { font-size:14px; margin:0 0 10px; color:var(--muted); text-transform:uppercase;
       letter-spacing:.04em; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line);
           font-size:13px; }
  th { color:var(--muted); font-weight:600; }
  .status { padding:1px 8px; border-radius:10px; font-size:12px; }
  .status.dispatched { background:#fff3cd; }
  .status.running    { background:#cfe2ff; }
  .status.done       { background:#d1e7dd; }
  .status.failed     { background:#f8d7da; }
  form.inline { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  select, input[type=text] { padding:5px 8px; border:1px solid var(--line);
                             border-radius:6px; font-size:13px; }
  button { padding:5px 14px; border:0; border-radius:6px; background:var(--accent);
           color:#fff; font-size:13px; cursor:pointer; }
  button.ghost { background:#eef2f6; color:var(--fg); }
  .muted { color:var(--muted); }
  .warn { color:#9a3412; font-size:12px; }
  a { color:var(--accent); }
  pre { background:#f1f4f8; padding:10px; border-radius:6px; overflow-x:auto;
        font-size:12px; }
  .cat { font-size:12px; padding:1px 6px; border-radius:8px; background:#eef2f6; }
  .cat.real_regression { background:#f8d7da; }
  .cat.test_bug        { background:#fff3cd; }
  .cat.spec_change     { background:#e2d9f3; }
  .cat.environment     { background:#d1e7dd; }
</style>
</head>
<body>
<header>
  <h1>SCP API Regression Test Platform</h1>
  <nav>
    <a href="/">개요</a>
    <a href="/runs">Run 히스토리</a>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
